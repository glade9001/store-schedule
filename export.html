<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--accent:#34a853;
  --danger:#d93025;--warn:#f9ab00;--bg:#f0f4ff;
  --text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--radius:14px;
}
html,body{min-height:100%;background:var(--bg);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--text);}

/* Loading */
#loadingOverlay{display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#1a73e8,#0d47a1);z-index:99999;flex-direction:column;justify-content:center;align-items:center;color:white;transition:opacity 0.4s;}
#loadingOverlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingText{font-size:14px;font-weight:600;opacity:0.9;text-align:center;padding:0 24px;}

/* Header */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(26,115,232,0.3);}
.header-back{background:rgba(255,255,255,0.2);border:none;color:white;height:34px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;padding:0 12px;}
.header-title{font-size:16px;font-weight:800;flex:1;}

/* Content */
.content{max-width:600px;margin:0 auto;padding:20px 16px 40px;}

/* Card */
.card{background:white;border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.card-title{font-size:15px;font-weight:900;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* Form rows */
.form-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.form-label{font-size:13px;font-weight:700;color:var(--text-muted);width:72px;flex-shrink:0;}
.form-select,.form-input{flex:1;min-width:0;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;background:white;color:var(--text);}
.form-select:focus,.form-input:focus{outline:none;border-color:var(--primary);}

/* Month selectors */
.month-row{display:flex;gap:8px;align-items:center;}
.month-select{padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;background:white;flex:1;}

/* 資料項目勾選 */
.check-list{display:flex;flex-direction:column;gap:10px;}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:border-color 0.2s,background 0.2s;}
.check-item.checked{border-color:var(--primary);background:#eff6ff;}
.check-item input[type=checkbox]{width:18px;height:18px;margin-top:1px;cursor:pointer;flex-shrink:0;accent-color:var(--primary);}
.check-item-text{flex:1;}
.check-item-title{font-size:13px;font-weight:800;color:var(--text);}
.check-item-desc{font-size:11px;color:var(--text-muted);margin-top:2px;line-height:1.5;}

/* 格式選擇 */
.format-row{display:flex;gap:8px;}
.format-btn{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:10px;background:white;font-size:13px;font-weight:700;cursor:pointer;text-align:center;color:var(--text-muted);transition:all 0.2s;}
.format-btn.active{border-color:var(--primary);background:#eff6ff;color:var(--primary);}

/* Export button */
.export-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(26,115,232,0.35);transition:opacity 0.2s;}
.export-btn:hover{opacity:0.92;}
.export-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Progress */
.progress-area{margin-top:16px;display:none;}
.progress-bar-wrap{background:#e2e8f0;border-radius:8px;height:8px;overflow:hidden;margin-bottom:8px;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:8px;transition:width 0.3s;}
.progress-text{font-size:12px;color:var(--text-muted);font-weight:600;}
.progress-log{margin-top:8px;font-size:11px;color:var(--text-muted);line-height:1.8;max-height:120px;overflow-y:auto;}

/* Toast */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* 摘要卡片 */
.summary-card{background:#f0f7ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:12px 16px;margin-top:12px;display:none;}
.summary-title{font-size:12px;font-weight:800;color:#1e3a8a;margin-bottom:8px;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.summary-item{text-align:center;background:white;border-radius:8px;padding:8px;}
.summary-num{font-size:20px;font-weight:900;color:var(--primary);}
.summary-label{font-size:10px;color:var(--text-muted);font-weight:600;}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><div id="loadingText">載入中...</div></div>

<div class="header">
  <button class="header-back" onclick="window.location.href='home.html'">← 首頁</button>
  <div class="header-title">📊 資料匯出</div>
</div>

<div class="content">

  <!-- 月份選擇 -->
  <div class="card">
    <div class="card-title">📅 選擇匯出月份</div>
    <div class="form-row">
      <span class="form-label">年份</span>
      <select class="form-select" id="selYear"></select>
    </div>
    <div class="form-row">
      <span class="form-label">月份</span>
      <select class="form-select" id="selMonth">
        <option value="01">1 月</option><option value="02">2 月</option>
        <option value="03">3 月</option><option value="04">4 月</option>
        <option value="05">5 月</option><option value="06">6 月</option>
        <option value="07">7 月</option><option value="08">8 月</option>
        <option value="09">9 月</option><option value="10">10 月</option>
        <option value="11">11 月</option><option value="12">12 月</option>
      </select>
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">
      ※ 特補休紀錄將匯出所選年度 1 月至所選月份的完整紀錄
    </div>
  </div>

  <!-- 匯出內容 -->
  <div class="card">
    <div class="card-title">📋 匯出內容（三個工作表）</div>
    <div class="check-list">
      <label class="check-item checked" id="ci-emp">
        <input type="checkbox" id="chk-emp" checked onchange="toggleCheck('emp')">
        <div class="check-item-text">
          <div class="check-item-title">① 員工資料</div>
          <div class="check-item-desc">姓名・職稱・到職日・底薪/時薪・勞保・健保・勞退自提<br>來源：salary/{month} 薪資記錄</div>
        </div>
      </label>
      <label class="check-item checked" id="ci-leave">
        <input type="checkbox" id="chk-leave" checked onchange="toggleCheck('leave')">
        <div class="check-item-text">
          <div class="check-item-title">② 特休紀錄</div>
          <div class="check-item-desc">當年度特休取得／使用明細 + 各員工統計表 + 特休到期日<br>來源：leaveLog / leaveBatches</div>
        </div>
      </label>
      <label class="check-item checked" id="ci-salary">
        <input type="checkbox" id="chk-salary" checked onchange="toggleCheck('salary')">
        <div class="check-item-text">
          <div class="check-item-title">③ 薪資明細</div>
          <div class="check-item-desc">底薪・加班費・獎金・代扣・實發金額完整明細<br>來源：stores/{store}/salary/{month}</div>
        </div>
      </label>
    </div>
  </div>

  <!-- 匯出格式 -->
  <div class="card">
    <div class="card-title">💾 匯出格式</div>
    <div class="format-row">
      <button class="format-btn active" id="fmt-xlsx" onclick="setFormat('xlsx')">📊 Excel (.xlsx)</button>
      <button class="format-btn" id="fmt-csv" onclick="setFormat('csv')">📄 CSV (.csv)</button>
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:10px;" id="fmt-note">
      Excel 格式：三個工作表整合在同一個檔案，含格式與顏色標記
    </div>
  </div>

  <!-- 匯出按鈕 -->
  <button class="export-btn" id="exportBtn" onclick="startExport()">
    <span>⬇️</span><span id="exportBtnText">開始匯出</span>
  </button>

  <!-- 進度 -->
  <div class="progress-area" id="progressArea">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">準備中...</div>
    <div class="progress-log" id="progressLog"></div>
  </div>

  <!-- 摘要 -->
  <div class="summary-card" id="summaryCard">
    <div class="summary-title">✅ 匯出完成</div>
    <div class="summary-grid">
      <div class="summary-item"><div class="summary-num" id="sum-emp">0</div><div class="summary-label">員工人數</div></div>
      <div class="summary-item"><div class="summary-num" id="sum-leave">0</div><div class="summary-label">特休紀錄筆數</div></div>
      <div class="summary-item"><div class="summary-num" id="sum-salary">0</div><div class="summary-label">薪資記錄筆數</div></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== 狀態 =====
let currentUser = null;
let appConfig = { stores: [] };
let exportFormat = 'xlsx';

// ===== 工具 =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function showLoading(msg) {
  document.getElementById('loadingOverlay').classList.remove('hidden');
  document.getElementById('loadingText').textContent = msg || '載入中...';
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}
function setProgress(pct, msg, log) {
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = msg;
  if(log) {
    const el = document.getElementById('progressLog');
    el.innerHTML += `<div>• ${log}</div>`;
    el.scrollTop = el.scrollHeight;
  }
}
function toggleCheck(key) {
  const chk = document.getElementById('chk-' + key);
  const ci  = document.getElementById('ci-'  + key);
  ci.classList.toggle('checked', chk.checked);
}
function setFormat(fmt) {
  exportFormat = fmt;
  document.getElementById('fmt-xlsx').classList.toggle('active', fmt === 'xlsx');
  document.getElementById('fmt-csv').classList.toggle('active', fmt === 'csv');
  document.getElementById('fmt-note').textContent = fmt === 'xlsx'
    ? 'Excel 格式：三個工作表整合在同一個檔案，含格式與顏色標記'
    : 'CSV 格式：每個工作表個別下載為獨立 .csv 檔案（不含格式）';
}

// ===== 民國年轉換 =====
function toROC(dateStr) {
  if(!dateStr) return '--';
  try {
    const [y, m, d] = dateStr.split('-').map(Number);
    return `${y - 1911}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
  } catch { return dateStr; }
}

// ===== 特休到期日計算（依到職日）=====
// 台灣勞基法：6個月後首批，之後每年週年日
// 到期日 = 到職週年日 + 2年（特休有效期2年）
function calcAnnualLeaveExpire(startDate, year) {
  if(!startDate) return '--';
  try {
    const [sy, sm, sd] = startDate.split('-').map(Number);
    // 當年度的週年日
    const anniversaryYear = parseInt(year);
    // 找本年度或上一個週年日（取得時間點）
    // 特休到期：取得日起2年內使用
    // 回傳：本年度週年日起算2年到期
    const expireY = anniversaryYear + 1; // 到職週年日的次年底到期（簡化：取得年+1年底）
    // 實際計算：特休取得日=週年日，到期=取得後2年
    // 找最近一個週年日
    let grantYear = anniversaryYear;
    const grantDate = new Date(grantYear, sm - 1, sd);
    const now = new Date(anniversaryYear, 11, 31); // 年底
    // 到期 = 取得日 + 2年
    const expire = new Date(grantDate);
    expire.setFullYear(expire.getFullYear() + 2);
    return `${expire.getFullYear() - 1911}/${String(expire.getMonth()+1).padStart(2,'0')}/${String(expire.getDate()).padStart(2,'0')}`;
  } catch { return '--'; }
}

// ===== 格式工具：數字 =====
function n(v) { return parseFloat(v) || 0; }
function fmt(v) { return n(v) === 0 ? '-' : n(v).toLocaleString(); }

// ===== 初始化 =====
window.onload = async () => {
  showLoading('驗證登入...');
  const saved = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
  if(!saved) { window.location.replace('home.html'); return; }
  try { currentUser = JSON.parse(saved); } catch(e) { window.location.replace('home.html'); return; }

  // 只有加盟主/管理者能用
  if(!['owner','admin'].includes(currentUser?.permission)) {
    alert('⚠️ 此功能僅限加盟主以上權限');
    window.location.replace('home.html');
    return;
  }

  try {
    const snap = await window.db.collection('settings').doc('globalConfig').get();
    if(snap.exists) appConfig = snap.data();
  } catch(e) {}

  // 填充年份選單（近3年）
  const now = new Date();
  const selYear = document.getElementById('selYear');
  for(let y = now.getFullYear(); y >= now.getFullYear() - 2; y--) {
    selYear.innerHTML += `<option value="${y}">${y} 年（民國 ${y-1911} 年）</option>`;
  }
  selYear.value = now.getFullYear();

  // 預設當月
  const curM = String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('selMonth').value = curM;

  hideLoading();
};

// ===== 主匯出流程 =====
async function startExport() {
  const doEmp    = document.getElementById('chk-emp').checked;
  const doLeave  = document.getElementById('chk-leave').checked;
  const doSalary = document.getElementById('chk-salary').checked;
  if(!doEmp && !doLeave && !doSalary) { showToast('⚠️ 請至少選擇一項匯出內容'); return; }

  const year  = document.getElementById('selYear').value;
  const month = document.getElementById('selMonth').value;
  const ym    = `${year}-${month}`;
  const stores = appConfig.stores || [];
  if(!stores.length) { showToast('⚠️ 無門市資料'); return; }

  // UI 重置
  document.getElementById('exportBtn').disabled = true;
  document.getElementById('exportBtnText').textContent = '匯出中...';
  const progressArea = document.getElementById('progressArea');
  progressArea.style.display = 'block';
  document.getElementById('progressLog').innerHTML = '';
  document.getElementById('summaryCard').style.display = 'none';
  setProgress(0, '開始讀取資料...');

  try {
    // ===== 步驟 1：讀取所有門市員工 =====
    setProgress(5, '讀取員工名單...', `讀取 ${stores.length} 間門市`);
    let allEmps = []; // { name, store, role, startDate, sortKey, ... }
    for(const store of stores) {
      const snap = await window.db.collection('stores').doc(store).collection('employees').get();
      snap.forEach(d => {
        const data = d.data();
        if(['離職','調走'].includes(data.status)) return;
        // 到職日篩選：當月前到職才算
        if(data.startDate) {
          const [sy, sm] = data.startDate.split('-').map(Number);
          const [cy, cm] = ym.split('-').map(Number);
          if(sy > cy || (sy === cy && sm > cm)) return;
        }
        allEmps.push({ name: d.id, store, ...data });
      });
    }
    allEmps.sort((a,b) => {
      const si = stores.indexOf(a.store) - stores.indexOf(b.store);
      if(si !== 0) return si;
      return (a.sortKey||0) - (b.sortKey||0);
    });
    setProgress(12, `讀取員工完成，共 ${allEmps.length} 人`, `員工名單：${allEmps.length} 人`);

    // ===== 步驟 2：讀取薪資記錄 =====
    setProgress(15, '讀取薪資記錄...');
    let salaryRecMap = {}; // { empName: record }
    for(const store of stores) {
      try {
        const snap = await window.db.collection('stores').doc(store).collection('salary').doc(ym).get();
        if(snap.exists) {
          (snap.data().records || []).forEach(r => { salaryRecMap[r.empName] = { ...r, _store: store }; });
        }
      } catch(e) {}
    }
    setProgress(25, '薪資記錄讀取完成', `薪資記錄：${Object.keys(salaryRecMap).length} 筆`);

    // ===== 步驟 3：讀取特休資料 =====
    setProgress(28, '讀取特補休資料...');
    let leaveStatMap  = {}; // { empName: { annualDays, usedAnnual, earnedComp, usedComp } }
    let leaveLogAll   = []; // [ { empName, store, role, date, type, days, note, ... } ]
    let batchMap      = {}; // { empName: [ batch ] }

    const empChunks = chunkArray(allEmps, 6);
    let chunkIdx = 0;
    for(const chunk of empChunks) {
      chunkIdx++;
      setProgress(28 + chunkIdx * 3, `讀取特休資料 ${Math.min(chunkIdx*6, allEmps.length)}/${allEmps.length}...`);
      await Promise.all(chunk.map(async emp => {
        try {
          // leaves/{year} 統計
          const lSnap = await window.db.collection('employees').doc(emp.name).collection('leaves').doc(year).get();
          leaveStatMap[emp.name] = lSnap.exists ? lSnap.data() : { annualDays:0, usedAnnual:0, earnedComp:0, usedComp:0 };

          // leaveBatches（計算到期日）
          const bSnap = await window.db.collection('employees').doc(emp.name).collection('leaveBatches').get();
          const batches = [];
          bSnap.forEach(d => batches.push({ id: d.id, ...d.data() }));
          batchMap[emp.name] = batches.sort((a,b) => (a.grantDate||'').localeCompare(b.grantDate||''));

          // leaveLog：當年度 1 月 ~ 選取月份
          const months = [];
          for(let m = 1; m <= parseInt(month); m++) {
            months.push(`${year}-${String(m).padStart(2,'0')}`);
          }
          await Promise.all(months.map(async ym2 => {
            try {
              const logSnap = await window.db.collection('employees').doc(emp.name).collection('leaveLog').doc(ym2).get();
              if(!logSnap.exists) return;
              (logSnap.data().records || []).forEach(r => {
                // 只紀錄特休相關 type（排除補休）
                const allowTypes = ['annual_use','annual_encash','annual_use_cancel'];
                if(!allowTypes.includes(r.type)) return;
                leaveLogAll.push({
                  empName: emp.name,
                  store:   emp.store,
                  role:    emp.role || '',
                  date:    r.date   || ym2 + '-01',
                  type:    r.type,
                  days:    r.days   || 0,
                  note:    r.note   || '',
                  logMonth: ym2
                });
              });
            } catch(e) {}
          }));
        } catch(e) {}
      }));
    }

    // leaveLog 依日期排序
    leaveLogAll.sort((a,b) => a.date.localeCompare(b.date));
    setProgress(65, '特休資料讀取完成', `特休紀錄：${leaveLogAll.length} 筆`);

    // ===== 步驟 4：產生工作表 =====
    setProgress(70, '產生工作表...');
    const wb = XLSX.utils.book_new();

    // --- Sheet 1：員工資料 ---
    if(doEmp) {
      setProgress(72, '產生員工資料工作表...', '建立員工資料 Sheet');
      const empSheet = buildEmpSheet(allEmps, salaryRecMap, leaveStatMap, batchMap, year, ym);
      XLSX.utils.book_append_sheet(wb, empSheet, '員工資料');
    }

    // --- Sheet 2：特休紀錄 ---
    if(doLeave) {
      setProgress(80, '產生特休紀錄工作表...', '建立特休紀錄 Sheet');
      const leaveSheet = buildLeaveSheet(allEmps, leaveLogAll, leaveStatMap, batchMap, year, ym);
      XLSX.utils.book_append_sheet(wb, leaveSheet, '特休紀錄');
    }

    // --- Sheet 3：薪資明細 ---
    if(doSalary) {
      setProgress(90, '產生薪資明細工作表...', '建立薪資明細 Sheet');
      const salarySheet = buildSalarySheet(allEmps, salaryRecMap, ym);
      XLSX.utils.book_append_sheet(wb, salarySheet, '薪資明細');
    }

    // ===== 步驟 5：下載 =====
    setProgress(96, '產生檔案中...');
    const rocYear  = parseInt(year) - 1911;
    const fileName = `莉學商行-民國${rocYear}年${parseInt(month)}月薪資清冊`;

    if(exportFormat === 'xlsx') {
      XLSX.writeFile(wb, `${fileName}.xlsx`);
    } else {
      // CSV：每個 Sheet 分開下載
      wb.SheetNames.forEach((name, i) => {
        setTimeout(() => {
          const csv = XLSX.utils.sheet_to_csv(wb.Sheets[name]);
          const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `${fileName}_${name}.csv`;
          a.click();
        }, i * 600);
      });
    }

    setProgress(100, '✅ 匯出完成！');

    // 摘要
    document.getElementById('sum-emp').textContent    = allEmps.length;
    document.getElementById('sum-leave').textContent  = leaveLogAll.length;
    document.getElementById('sum-salary').textContent = Object.keys(salaryRecMap).length;
    document.getElementById('summaryCard').style.display = 'block';
    showToast('✅ 匯出成功！');

  } catch(e) {
    setProgress(0, '❌ 匯出失敗：' + e.message);
    showToast('❌ 匯出失敗：' + e.message);
    console.error(e);
  }

  document.getElementById('exportBtn').disabled = false;
  document.getElementById('exportBtnText').textContent = '再次匯出';
}

// ===== 輔助：切分陣列 =====
function chunkArray(arr, size) {
  const out = [];
  for(let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

// ===== 取得員工底薪/時薪（優先薪資記錄）=====
function getWage(emp, rec) {
  if(!rec) return emp.baseSalary || emp.wage || 0;
  if(emp.role === '工讀') return rec.wage || emp.wage || 0;
  return rec.baseSalary || emp.baseSalary || 0;
}

// ===== 特休到期日（從 leaveBatches 計算）=====
// 到職後 6 個月取得第一批，之後每年週年日取得
// 每批到期 = 取得日起 2 年（依勞基法）
function getAnnualExpire(empName, batchMap, year) {
  const batches = (batchMap[empName] || []).filter(b => !b.carried);
  if(!batches.length) return '--';
  // 找當年度取得的批次（grantDate 在當年）
  const yearBatch = batches.find(b => b.grantDate && b.grantDate.startsWith(year));
  if(yearBatch) {
    if(yearBatch.expireDate) {
      return toROC(yearBatch.expireDate);
    }
    // 計算到期日：取得日+2年
    try {
      const d = new Date(yearBatch.grantDate);
      d.setFullYear(d.getFullYear() + 2);
      return toROC(d.toISOString().split('T')[0]);
    } catch { return '--'; }
  }
  // 否則取最新一批
  const latest = batches[batches.length - 1];
  if(latest.expireDate) return toROC(latest.expireDate);
  try {
    const d = new Date(latest.grantDate);
    d.setFullYear(d.getFullYear() + 2);
    return toROC(d.toISOString().split('T')[0]);
  } catch { return '--'; }
}

// ===== XLSX 樣式工具 =====
// SheetJS 社群版不支援 cellStyles，改用 html2canvas 模式
// 此處直接用 aoa_to_sheet，格式透過 !cols 控制欄寬

function makeCell(v, t='s') {
  return { v, t };
}

// ===== Sheet 1：員工資料 =====
function buildEmpSheet(allEmps, salaryRecMap, leaveStatMap, batchMap, year, ym) {
  const [y, m] = ym.split('-').map(Number);
  const rocY = y - 1911;

  // 標題列
  const headers = [
    '編號', '門市', '姓名', '職稱', '到職日',
    '底薪/時薪', '勞保費', '健保費', '勞退個人自提',
    '年度剩餘特休', '年度剩餘補休', '剩餘特+補休',
    '特休到期日'
  ];

  const rows = [];
  // 第一列：標題
  rows.push([`莉學商行 民國${rocY}年${m}月 員工資料`]);
  rows.push([]);
  rows.push(headers);

  let seq = 1;
  allEmps.forEach(emp => {
    const rec  = salaryRecMap[emp.name] || {};
    const stat = leaveStatMap[emp.name] || {};
    const wage = getWage(emp, rec);
    const remainAnnual = Math.max(0, n(stat.annualDays) - n(stat.usedAnnual));
    const remainComp   = Math.max(0, n(stat.earnedComp) - n(stat.usedComp));
    const expireDate   = getAnnualExpire(emp.name, batchMap, year);

    rows.push([
      seq++,
      emp.store,
      emp.name,
      emp.role || '',
      toROC(emp.startDate),
      wage,
      n(rec.laborInsurance),
      n(rec.healthInsurance) + n(rec.dependentInsurance),
      n(rec.laborPension),
      remainAnnual,
      remainComp,
      remainAnnual + remainComp,
      expireDate
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  // 合併標題列
  ws['!merges'] = [{ s:{r:0,c:0}, e:{r:0,c:headers.length-1} }];
  // 欄寬
  ws['!cols'] = [
    {wch:6},{wch:8},{wch:10},{wch:8},{wch:12},
    {wch:12},{wch:10},{wch:10},{wch:12},
    {wch:12},{wch:12},{wch:14},{wch:14}
  ];
  return ws;
}

// ===== Sheet 2：特休紀錄 =====
function buildLeaveSheet(allEmps, leaveLogAll, leaveStatMap, batchMap, year, ym) {
  const [y, m] = ym.split('-').map(Number);
  const rocY = y - 1911;

  // === 左側：流水明細 ===
  const LEFT_COLS = 8; // A~H
  const logHeaders = ['日期','門市','姓名','職稱','類型','天數','備註','到期日'];

  // type 轉中文
  const typeMap = {
    'annual_use':        '特休・使用',
    'annual_encash':     '特休・折現',
    'annual_use_cancel': '特休・取消'
  };

  // === 右側：統計表 ===
  // 從 J 欄開始（留一欄空）
  const statHeaders = ['編號','門市','姓名','職稱','取得特休','使用特休','剩餘特休','特休到期日'];

  // 計算總列數（取較大值）
  const logRows  = leaveLogAll.length;
  const statRows = allEmps.length;
  const totalDataRows = Math.max(logRows, statRows);

  // 建 aoa（rows * 16 cols）
  const STAT_START = 9; // 第 J 欄 index=9（留 I 欄空白分隔）
  const totalCols  = STAT_START + statHeaders.length;

  // 初始化空白 2D 陣列
  const data = [];
  // 第一列：大標題
  const titleRow = new Array(totalCols).fill('');
  titleRow[0] = `莉學商行 民國${rocY}年 特休紀錄（1月至${m}月）`;
  titleRow[STAT_START] = `民國${rocY}年 特休統計表`;
  data.push(titleRow);

  // 第二列：空白
  data.push(new Array(totalCols).fill(''));

  // 第三列：欄位標題
  const headerRow = new Array(totalCols).fill('');
  logHeaders.forEach((h,i)  => headerRow[i]            = h);
  statHeaders.forEach((h,i) => headerRow[STAT_START+i] = h);
  data.push(headerRow);

  // 資料列
  let seq = 1;
  for(let i = 0; i < totalDataRows; i++) {
    const row = new Array(totalCols).fill('');

    // 左側：流水
    if(i < leaveLogAll.length) {
      const log = leaveLogAll[i];
      const expDate = getAnnualExpire(log.empName, batchMap, year);
      row[0] = toROC(log.date);
      row[1] = log.store;
      row[2] = log.empName;
      row[3] = log.role;
      row[4] = typeMap[log.type] || log.type;
      row[5] = log.days;
      row[6] = log.note;
      row[7] = expDate;
    }

    // 右側：統計
    if(i < allEmps.length) {
      const emp  = allEmps[i];
      const stat = leaveStatMap[emp.name] || {};
      const remainAnnual = Math.max(0, n(stat.annualDays) - n(stat.usedAnnual));
      const expDate = getAnnualExpire(emp.name, batchMap, year);
      row[STAT_START+0] = seq++;
      row[STAT_START+1] = emp.store;
      row[STAT_START+2] = emp.name;
      row[STAT_START+3] = emp.role || '';
      row[STAT_START+4] = n(stat.annualDays);
      row[STAT_START+5] = n(stat.usedAnnual);
      row[STAT_START+6] = remainAnnual;
      row[STAT_START+7] = expDate;
    }

    data.push(row);
  }

  const ws = XLSX.utils.aoa_to_sheet(data);

  // 合併標題
  ws['!merges'] = [
    { s:{r:0,c:0},            e:{r:0,c:LEFT_COLS-1} },
    { s:{r:0,c:STAT_START},   e:{r:0,c:totalCols-1} }
  ];

  // 欄寬
  ws['!cols'] = [
    {wch:12},{wch:8},{wch:10},{wch:8},{wch:14},{wch:6},{wch:20},{wch:14}, // 左側
    {wch:2},  // 空白分隔
    {wch:6},{wch:8},{wch:10},{wch:8},{wch:10},{wch:10},{wch:10},{wch:14}  // 右側
  ];

  return ws;
}

// ===== Sheet 3：薪資明細 =====
function buildSalarySheet(allEmps, salaryRecMap, ym) {
  const [y, m] = ym.split('-').map(Number);
  const rocY = y - 1911;

  // ===== 加班費計算（與 salary.html 一致）=====
  function calcHourlyRate(rec) {
    const base      = n(rec.baseSalary);
    const attendBase = n(rec.fullAttendBase);
    const otherBase  = n(rec.otherBase);
    return (base + attendBase + otherBase) / 30 / 8;
  }
  function calcOtPay(rec) {
    const rph = calcHourlyRate(rec);
    const hasCustom = n(rec.customOtRate) > 0;
    const rate = hasCustom ? n(rec.customOtRate) : Math.ceil(rph);
    const mult = hasCustom ? (rec.customOtX134 !== false ? 1.34 : 1) : 1.34;
    return Math.ceil(rate * mult * n(rec.otHours));
  }
  function calcGross(rec, emp) {
    if(emp?.role === '工讀') {
      const wage = n(rec.wage);
      // 時數從 rec.hours 或薪資記錄裡讀
      // 這裡因為沒有排班資料，直接用 rec 裡記錄的計算結果
      const gross = n(rec.baseSalaryTotal) ||
        Math.round(wage * n(rec.hours)) +
        Math.round(wage * n(rec.holidayHours)) +
        n(rec.roleBonus) + n(rec.extraHours) * wage;
      return Math.max(0, gross - Math.abs(n(rec.personalSickLeave)));
    }
    const mgmt = ['mgmtOps','mgmtQuality','mgmtKPI','mgmtAccount','mgmtLeader'].reduce((s,k)=>s+n(rec[k]),0);
    return Math.max(0,
      n(rec.baseSalary) + n(rec.fullAttendBonus) + mgmt +
      n(rec.laborAllowance) + n(rec.performance) + n(rec.nightAllowance) +
      n(rec.roleBonus) + n(rec.otherBonus) +
      n(rec.annualLeaveEncash) + n(rec.compLeaveEncash) +
      calcOtPay(rec) + n(rec.restDayOtPay) + n(rec.holidayOtPay) +
      Math.round(n(rec.hourlySupportRate) * 0) - // hourlySupport 需排班資料，此處略
      Math.round(calcHourlyRate(rec) / 60 * n(rec.lateMinutes)) -
      Math.abs(n(rec.personalSickLeave))
    );
  }
  function calcDeduct(rec) {
    return n(rec.laborInsurance) + n(rec.healthInsurance) + n(rec.dependentInsurance) + n(rec.laborPension) + n(rec.otherDeduction);
  }

  // 欄位定義
  const headers = [
    // 基本
    '編號','門市','姓名','職稱',
    // 正常薪資
    '底薪(B1)','工讀時數','全勤獎金(B2)','正常薪資小計(A)',
    // 加給
    '管理責任獎金(C1)','勞務津貼(C2)','績效獎金(C3)','夜點費(C4)','其他津貼(C5)','職務津貼',
    // 特補休結算
    '特休結算金額(F)','補休結算金額',
    // 加班
    '加班時數(G1)','國假時數(G2)','加班費(H1)','休息日加班費(H2)','國假加班費(H3)',
    // 考勤
    '遲到分鐘','遲到扣款','事病假扣款',
    // 應發
    '應發薪資(I)',
    // 代扣
    '勞保費(J1)','健保費(J2)','眷屬健保','勞退自提(J3)','其他扣款',
    // 實發
    '實發金額'
  ];

  const rows = [];
  rows.push([`莉學商行 民國${rocY}年${m}月 薪資明細`]);
  rows.push([]);
  rows.push(headers);

  let seq = 1;
  allEmps.forEach(emp => {
    const rec = salaryRecMap[emp.name];
    if(!rec) {
      // 無薪資記錄：填基本資料，其餘空白
      const row = new Array(headers.length).fill('');
      row[0] = seq++; row[1] = emp.store; row[2] = emp.name; row[3] = emp.role || '';
      rows.push(row);
      return;
    }

    const isPart = emp.role === '工讀';
    const mgmtTotal = ['mgmtOps','mgmtQuality','mgmtKPI','mgmtAccount','mgmtLeader'].reduce((s,k)=>s+n(rec[k]),0);
    const rph = isPart ? 0 : calcHourlyRate(rec);
    const lateDeduct = isPart ? 0 : Math.round(rph / 60 * n(rec.lateMinutes));
    const otPay = isPart ? 0 : calcOtPay(rec);
    const gross = calcGross(rec, emp);
    const deduct = calcDeduct(rec);
    const net = gross - deduct;

    // 正常薪資小計 A = B1 + B2（正職）或 工讀本薪
    const normalWage = isPart
      ? Math.round(n(rec.wage) * n(rec.hours || 0))
      : n(rec.baseSalary) + n(rec.fullAttendBonus);

    rows.push([
      seq++, emp.store, emp.name, emp.role || '',
      // 正常薪資
      isPart ? '' : n(rec.baseSalary),
      isPart ? (n(rec.hours || 0) || '') : '-',
      isPart ? '' : n(rec.fullAttendBonus),
      normalWage,
      // 加給
      mgmtTotal || '',
      n(rec.laborAllowance) || '',
      n(rec.performance)    || '',
      n(rec.nightAllowance) || '',
      n(rec.otherBonus)     || '',
      n(rec.roleBonus)      || '',
      // 特補休結算
      n(rec.annualLeaveEncash) || '',
      n(rec.compLeaveEncash)   || '',
      // 加班
      n(rec.otHours)        || '',
      n(rec.holidayHours)   || '',
      otPay                 || '',
      n(rec.restDayOtPay)   || '',
      n(rec.holidayOtPay)   || '',
      // 考勤
      n(rec.lateMinutes)        || '',
      lateDeduct                || '',
      Math.abs(n(rec.personalSickLeave)) || '',
      // 應發
      gross,
      // 代扣
      n(rec.laborInsurance),
      n(rec.healthInsurance),
      n(rec.dependentInsurance) || '',
      n(rec.laborPension),
      n(rec.otherDeduction)     || '',
      // 實發
      net
    ]);
  });

  // 合計列
  const sumRow = new Array(headers.length).fill('');
  sumRow[2] = '合計';
  // 用 Excel 公式加總
  const dataStartRow = 4; // 資料從第4列開始（0-indexed=3）
  const dataEndRow   = 3 + allEmps.length;
  const numericCols  = [4,7,8,9,10,11,12,13,14,15,18,19,20,23,24,25,26,27,28,29]; // 需要加總的欄 index
  numericCols.forEach(ci => {
    const col = XLSX.utils.encode_col(ci);
    sumRow[ci] = { f: `SUM(${col}${dataStartRow}:${col}${dataEndRow})`, t:'n' };
  });
  rows.push(sumRow);

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 合併標題
  ws['!merges'] = [{ s:{r:0,c:0}, e:{r:0,c:headers.length-1} }];

  // 欄寬
  ws['!cols'] = [
    {wch:5},{wch:8},{wch:10},{wch:8},  // 基本
    {wch:10},{wch:8},{wch:10},{wch:12}, // 正常薪資
    {wch:14},{wch:10},{wch:10},{wch:8},{wch:10},{wch:8}, // 加給
    {wch:14},{wch:12}, // 特補休
    {wch:8},{wch:8},{wch:10},{wch:12},{wch:12}, // 加班
    {wch:8},{wch:10},{wch:10}, // 考勤
    {wch:12}, // 應發
    {wch:10},{wch:10},{wch:10},{wch:10},{wch:8}, // 代扣
    {wch:12}  // 實發
  ];

  // 凍結前 4 欄（門市、姓名等基本資料）
  ws['!freeze'] = { xSplit: 4, ySplit: 3 };

  return ws;
}
