  <div id="imagePreviewModal" class="modal"><div class="modal-content" style="max-width:800px;"><img id="previewImg" style="width:100%; border-radius:8px; border:1px solid #ddd;"><button id="downloadImgBtn" style="width:100%; padding:15px; background:#1a73e8; color:white; margin-top:15px; border-radius:10px; border:none; font-size:16px; cursor:pointer;">⬇️ 下載班表圖片</button><button onclick="closeModal('imagePreviewModal')" style="width:100%; border:none; background:none; margin-top:10px; color:#666; cursor:pointer;">關閉預覽</button></div></div>

  <div id="exportContainer">
    <h1 id="exportTitle" style="text-align: center; font-size: 48px; font-weight: 900; margin-bottom: 10px; letter-spacing: 4px; color: #000;">美德 職員輪班表</h1>
    <p id="exportDates" style="text-align: center; font-size: 26px; color: #333; margin-bottom: 25px; font-weight:bold; letter-spacing: 3px;"></p>
    <table id="exportTable"><thead id="exportHeader"></thead><tbody id="exportBody"></tbody></table>
    <p style="text-align: left; font-size: 20px; font-weight: bold; color: #000; margin-top: 15px; margin-left: 5px;">※每周五、六公佈下週排班表，若有變動者，請事先向店長反映，勿私自調動！</p>
  </div>

  <script>
    let appConfig = { stores: [], shifts: ["排休", "指休"], shiftHours: {} };
    let appData = { employees: [], records: [] };
    let currentWeekDates = [], virtualRowNames = [], localActiveEmps = [], localDeletedNames = [];
    let currentCell = null, isPaintMode = false, autoSaveTimer = null;
    const dayNames = ['週一','週二','週三','週四','週五','週六','週日'];

    function getNextWeekString() {
        let d = new Date(); d.setDate(d.getDate() + 7);
        let yr = d.getFullYear(); let first = new Date(yr, 0, 1);
        let w = Math.ceil((((d - first) / 86400000) + first.getDay() + 1) / 7);
        return `${yr}-W${w < 10 ? '0'+w : w}`;
    }

    function getWeekDates(wStr) {
        let p = wStr.split('-W'); let yr = parseInt(p[0]); let wk = parseInt(p[1]);
        let d = new Date(yr, 0, 1); let day = d.getDay();
        d.setDate(d.getDate() + (wk - 1) * 7);
        let offset = day <= 4 ? 1 - day : 8 - day;
        d.setDate(d.getDate() + offset);
        let res = [];
        for(let i=0; i<7; i++) { res.push((d.getMonth()+1)+'/'+d.getDate()); d.setDate(d.getDate()+1); }
        return res;
    }

    function changeWeek(offset) {
        let input = document.getElementById('weekSelector');
        if(!input.value) return;
        input.stepUp(offset); 
        loadScheduleData();
    }

    function updateLocDropdowns() {
        let currentStore = document.getElementById('storeSelector').value;
        let opts = `<option value="本店">本店</option>`;
        (appConfig.stores || []).forEach(s => {
            if (s !== currentStore) opts += `<option value="${s}">${s}</option>`;
        });
        let mLoc = document.getElementById('modalLocation'); if(mLoc) mLoc.innerHTML = opts;
        let pLoc = document.getElementById('paintLoc'); if(pLoc) pLoc.innerHTML = opts;
    }

    window.onload = async () => {
        showLoading("正在連線雲端庫...");
        document.getElementById('weekSelector').value = getNextWeekString();
        try {
            const snap = await window.db.collection('settings').doc('globalConfig').get();
            if (snap.exists) appConfig = snap.data();
            refreshStoreList(); loadScheduleData();
        } catch (e) { alert("連線失敗：" + e.message); }
        hideLoading();
    };

    function triggerAutoSave() {
        const s = document.getElementById('syncStatus');
        s.innerHTML = '<div class="dot"></div><span>☁️ 雲端同步中...</span>';
        s.className = "syncing";
        clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => { saveScheduleData(false); }, 1500);
    }

    async function saveScheduleData(isManual) {
        syncUIToMemory();
        let store = document.getElementById('storeSelector').value;
        let week = document.getElementById('weekSelector').value;
        if(!store || !week) return;
        try {
            let schedule = appData.records.filter(r => r.week === week);
            await window.db.collection('stores').doc(store).collection('weeks').doc(week).set({ records: schedule });
            const s = document.getElementById('syncStatus');
            s.innerHTML = '<div class="dot"></div><span>✅ 所有變更已儲存 (' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ')</span>';
            s.className = "";
            if(isManual) alert("💾 雲端儲存成功！");
        } catch(e) { document.getElementById('syncStatus').innerText = "❌ 同步失敗：" + e.message; }
    }

    // 🌟 原生 Canvas 產圖
    function exportNativeImage() {
        syncUIToMemory();
        showLoading("📸 正在啟動高解析度原生繪圖引擎...");

        setTimeout(() => {
            try {
                let store = document.getElementById('storeSelector').value;
                let weekStr = document.getElementById('weekSelector').value;
                let emps = [...appData.employees]; 
                virtualRowNames.forEach(n => emps.push({name: n, role: '待補'}));

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const W = 1400; 
                const startX = 80; 
                const gridW = W - startX * 2; 
                const colW = gridW / 8; 
                
                const rowH = 95; 
                const headerH = 95; 
                const numEmpRows = emps.length;
                const numEmptyRows = 5; 
                
                const gridH = headerH + (numEmpRows * rowH) + rowH + (numEmptyRows * rowH);
                const startY = 240; 
                const H = startY + gridH + 120; 

                canvas.width = W; canvas.height = H;
                ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H);

                ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillStyle = "#000000";
                ctx.font = "900 48px 'Microsoft JhengHei', sans-serif"; 
                ctx.fillText(`${store} 職員輪班表`, W / 2, 90);
                
                let startArr = currentWeekDates[0].split('/'); let endArr = currentWeekDates[6].split('/');
                ctx.font = "bold 26px 'Microsoft JhengHei', sans-serif"; ctx.fillStyle = "#333333";
                ctx.fillText(`${startArr[0]} 月 ${startArr[1]} 日 至 ${endArr[0]} 月 ${endArr[1]} 日`, W / 2, 160);

                ctx.lineWidth = 3; ctx.strokeStyle = "#000000"; ctx.strokeRect(startX, startY, gridW, gridH);
                ctx.lineWidth = 2; 
                for(let i = 1; i < 8; i++) { ctx.beginPath(); ctx.moveTo(startX + i * colW, startY); ctx.lineTo(startX + i * colW, startY + gridH); ctx.stroke(); }
                let currentY = startY + headerH;
                while (currentY < startY + gridH) { ctx.beginPath(); ctx.moveTo(startX, currentY); ctx.lineTo(startX + gridW, currentY); ctx.stroke(); currentY += rowH; }

                ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(startX + colW, startY + headerH); ctx.lineWidth = 2; ctx.stroke();

                ctx.font = "bold 20px 'Microsoft JhengHei', sans-serif"; ctx.fillStyle = "#000000"; ctx.textAlign = "right"; ctx.fillText("月/日", startX + colW - 15, startY + 30);
                ctx.textAlign = "left"; ctx.fillText("姓名", startX + 15, startY + headerH - 30);

                ctx.textAlign = "center";
                for(let i = 0; i < 7; i++) {
                    let cx = startX + (i + 1) * colW + colW / 2; let cy = startY + headerH / 2;
                    ctx.font = "900 26px 'Microsoft JhengHei', sans-serif"; ctx.fillText(currentWeekDates[i], cx, cy - 12);
                    ctx.font = "normal 20px 'Microsoft JhengHei', sans-serif"; ctx.fillText(dayNames[i], cx, cy + 20);
                }

                function drawRoundRect(x, y, w, h, r, color) {
                    ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
                    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
                    ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
                    ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.stroke();
                }

                let rowY = startY + headerH;
                emps.forEach(emp => {
                    let cy = rowY + rowH / 2;
                    ctx.fillStyle = "#000000"; ctx.font = "900 26px 'Microsoft JhengHei', sans-serif"; 
                    if(!emp.name.includes('待補')) ctx.fillText(emp.name, startX + colW / 2, cy);

                    for(let i = 0; i < 7; i++) {
                        let cx = startX + (i + 1) * colW + colW / 2;
                        let rec = appData.records.find(r => r.name === emp.name && r.day === dayNames[i] && r.week === weekStr) || {shift:'', note:'', location:''};
                        
                        let hasSubtext = (rec.note || (rec.location && rec.location !== '本店'));
                        let textY = hasSubtext ? cy - 14 : cy;

                        if (rec.shift === '指休') {
                            drawRoundRect(cx - 35, textY - 24, 70, 48, 10, '#d93025'); 
                            ctx.fillStyle = "#d93025"; ctx.font = "900 28px 'Microsoft JhengHei', sans-serif"; ctx.fillText("休", cx, textY + 2);
                        } else if (rec.shift === '排休') {
                            ctx.fillStyle = "#000000"; ctx.font = "900 28px 'Microsoft JhengHei', sans-serif"; ctx.fillText("休", cx, textY + 2);
                        } else if (rec.shift) {
                            ctx.fillStyle = "#000000"; ctx.font = "900 30px 'Arial', 'Microsoft JhengHei', sans-serif"; ctx.fillText(rec.shift.replace('-', ' / '), cx, textY);
                        }

                        if (hasSubtext) {
                            let subtextY = cy + 20; 
                            if (rec.location && rec.location !== '本店') {
                                ctx.fillStyle = "#e67e22"; ctx.font = "bold 18px 'Microsoft JhengHei', sans-serif"; 
                                ctx.fillText(rec.location, cx, subtextY); subtextY += 22; 
                            }
                            if (rec.note) {
                                ctx.fillStyle = "#0088aa"; ctx.font = "bold 18px 'Microsoft JhengHei', sans-serif"; 
                                ctx.fillText(rec.note, cx, subtextY);
                            }
                        }
                    }
                    rowY += rowH;
                });

                let cyNote = rowY + rowH / 2;
                ctx.fillStyle = "#000000"; ctx.font = "900 24px 'Microsoft JhengHei', sans-serif"; ctx.fillText("門市備註", startX + colW / 2, cyNote);

                for(let i = 0; i < 7; i++) {
                    let cx = startX + (i + 1) * colW + colW / 2;
                    let rec = appData.records.find(r => r.name === '門市備註' && r.day === dayNames[i] && r.week === weekStr);
                    if (rec && rec.note) {
                        ctx.fillStyle = "#0088aa"; ctx.font = "bold 22px 'Microsoft JhengHei', sans-serif"; ctx.fillText(rec.note, cx, cyNote);
                    }
                }

                ctx.textAlign = "left"; ctx.fillStyle = "#000000"; ctx.font = "bold 20px 'Microsoft JhengHei', sans-serif"; 
                ctx.fillText("※每周五、六公佈下週排班表，若有變動者，請事先向店長反映，勿私自調動！", startX + 5, H - 40);

                const img = document.getElementById('previewImg'); img.src = canvas.toDataURL("image/jpeg", 0.95);
                document.getElementById('imagePreviewModal').style.display = 'flex';
                document.getElementById('downloadImgBtn').onclick = () => { let a = document.createElement('a'); a.href = img.src; a.download = `${store}_排班表_${weekStr}.jpg`; a.click(); };
                hideLoading();
            } catch (err) { alert("產圖發生錯誤：" + err); hideLoading(); }
        }, 100); 
    }

    function deleteVirtualRow(name) {
        if(!confirm(`確定要刪除 ${name} 嗎？`)) return;
        let week = document.getElementById('weekSelector').value;
        appData.records = appData.records.filter(r => !(r.name === name && r.week === week));
        virtualRowNames = virtualRowNames.filter(n => n !== name);
        renderTable();
        triggerAutoSave();
    }

    // 🌟 動態歷史還原：加入離職且有排班者
    async function loadScheduleData() { 
        let store = document.getElementById('storeSelector').value; 
        let week = document.getElementById('weekSelector').value; 
        if(!store) return; 
        localStorage.setItem('lastStore', store); 
        showLoading("讀取資料..."); 
        
        // 先抓全部的排班紀錄
        const weekSnap = await window.db.collection('stores').doc(store).collection('weeks').get(); 
        appData.records = []; 
        weekSnap.forEach(d => { 
            if(d.data().records) d.data().records.forEach(r => { r.week = d.id; appData.records.push(r); })
        }); 

        // 過濾出本週「真的有排班或備註」的員工名單 (避免清空後殘留)
        let currentWeekRecords = appData.records.filter(r => r.week === week);
        let scheduledNames = currentWeekRecords
            .filter(r => (r.shift && r.shift.trim() !== '') || (r.note && r.note.trim() !== ''))
            .map(r => r.name);

        // 抓取員工清單，結合在職狀態與歷史紀錄
        const empSnap = await window.db.collection('stores').doc(store).collection('employees').get(); 
        appData.employees = []; 
        empSnap.forEach(d => { 
            let e = d.data();
            // 在職者，或是雖然離職但本週有排班紀錄者，皆顯示
            if(e.status !== '離職' || scheduledNames.includes(d.id)) {
                appData.employees.push({name: d.id, ...e});
            }
        }); 
        appData.employees.sort((a,b) => (a.sortKey||0) - (b.sortKey||0)); 
        
        virtualRowNames = currentWeekRecords.map(r => r.name).filter(n => n && n.startsWith('🆘')).filter((v,i,a) => a.indexOf(v)===i); 
        renderTable(); 
        hideLoading(); 
    }

    function renderTable() { 
        let tbody = document.getElementById('tableBody'); tbody.innerHTML = ''; 
        let week = document.getElementById('weekSelector').value; currentWeekDates = getWeekDates(week); 
        let hRow = document.getElementById('headerRow'); let hHtml = '<th>員工</th>'; 
        dayNames.forEach((d, i) => { hHtml += `<th><span class="date-text">${currentWeekDates[i]}</span>${d}</th>`; }); 
        hHtml += '<th>本月累計</th>'; hRow.innerHTML = hHtml; 
        
        let emps = [...appData.employees]; 
        virtualRowNames.forEach(n => emps.push({name: n, role: '待補'})); 
        
        emps.forEach((emp, eIdx) => { 
            let tr = document.createElement('tr'); 
            
            let empNameDisplay = emp.name;
            if(emp.name.startsWith('🆘待補')) {
                empNameDisplay += ` <span style="color:#d93025; font-size:12px; cursor:pointer;" onclick="deleteVirtualRow('${emp.name}')">✖</span>`;
            }

            // 標示已離職身分
            let roleDisplay = emp.role;
            if(emp.status === '離職') {
                roleDisplay += ' <span style="color:#d93025; font-size:11px; font-weight:bold;">(已離職)</span>';
            }

            tr.innerHTML = `<td><strong>${empNameDisplay}</strong><br><small>${roleDisplay}</small></td>`; 
            
            dayNames.forEach(day => { 
                let rec = appData.records.find(r => r.name === emp.name && r.day === day && r.week === week) || {shift:'', location:'本店', note:'', actualHours:''}; 
                let td = document.createElement('td'); let btn = document.createElement('button'); btn.className = 'cell-btn'; 
                btn.dataset.emp = emp.name; btn.dataset.day = day; btn.dataset.shift = rec.shift; btn.dataset.hours = rec.actualHours; btn.dataset.loc = rec.location; btn.dataset.note = rec.note; 
                updateCellUI(btn); btn.onclick = () => handleCellClick(btn, eIdx); td.appendChild(btn); tr.appendChild(td); 
            }); 
            let sumTd = document.createElement('td'); sumTd.id = `sum-${eIdx}`; sumTd.className = 'summary-box'; tr.appendChild(sumTd); tbody.appendChild(tr); 
            updateSummary(eIdx, emp); 
        }); 
        
        let nTr = document.createElement('tr'); nTr.innerHTML = `<td style="background:#fff3e0;"><strong>📝 備註</strong></td>`; 
        dayNames.forEach(day => { 
            let rec = appData.records.find(r => r.name === '門市備註' && r.day === day && r.week === week); 
            nTr.innerHTML += `<td style="padding:0; background:#fff8e1;"><input type="text" class="daily-note-input" data-day="${day}" oninput="triggerAutoSave()" value="${rec?rec.note:''}" style="width:100%; height:55px; border:none; background:transparent; text-align:center;"></td>`; 
        }); 
        tbody.appendChild(nTr); 
        updateDailyTotals(); 
    }
    
    function updateCellUI(b) { let s=b.dataset.shift, h=b.dataset.hours, l=b.dataset.loc, n=b.dataset.note; let txt = s || '+'; if(s==='排休'||s==='指休') txt='休'; if(h && h!=appConfig.shiftHours[s] && s!=='排休' && s!=='指休') txt += `<br><small>(${h}h)</small>`; if(l && l!=='本店') txt += `<br><small style="color:#d93025; font-weight:800;">📍${l}</small>`; if(n) txt += `<br><small style="color:#1a73e8;">${n}</small>`; b.innerHTML = txt; b.className = 'cell-btn'; if(s==='指休') b.classList.add('zhi-xiu'); else if(s==='排休') b.classList.add('pai-xiu'); else if(s) { let start=parseInt(s); if(start>=15||start<6) b.classList.add('shift-night'); else b.classList.add('shift-morning'); } }
    function addVirtualRow() { syncUIToMemory(); let n = 1; while(virtualRowNames.includes('🆘待補'+n)) n++; virtualRowNames.push('🆘待補'+n); renderTable(); triggerAutoSave(); }
    function autoFillHours() { let s = document.getElementById('modalShift').value.trim(); let t = document.getElementById('modalHours'); if(appConfig.shiftHours && appConfig.shiftHours[s]) { t.value = appConfig.shiftHours[s]; } else { let m = s.match(/(\d+)-(\d+)/); if(m) { let h = parseInt(m[2])-parseInt(m[1]); t.value = h<0 ? h+24 : h; } else if(s==='排休'||s==='指休') t.value=0; } }
    
    // 🌟 複製上週邏輯也修正為強制等待儲存後重讀，確保離職人員若被複製過來能正確顯示
    async function copyLastWeek() { 
        let store = document.getElementById('storeSelector').value; 
        let week = document.getElementById('weekSelector').value; 
        let parts = week.split('-W'); let prevW = parseInt(parts[1]) - 1; let prevWeekStr = parts[0] + '-W' + (prevW < 10 ? '0'+prevW : prevW); 
        if(!confirm(`確定複製上週 (${prevWeekStr}) 班表？`)) return; 
        showLoading("複製資料中..."); 
        const snap = await window.db.collection('stores').doc(store).collection('weeks').doc(prevWeekStr).get(); 
        if(snap.exists) { 
            let newRecords = snap.data().records.map(r => ({ ...r, week: week })); 
            appData.records = appData.records.filter(r => r.week !== week).concat(newRecords); 
            await saveScheduleData(false); // 強制先存檔
            alert("📋 複製完成！"); 
            loadScheduleData(); // 重新讀取確保介面正確載入所有人員
        } else { alert("找不到上週資料。"); hideLoading(); } 
    }
    
    function syncUIToMemory() { let week = document.getElementById('weekSelector').value; document.querySelectorAll('.cell-btn').forEach(btn => { if (btn.dataset.shift) { let idx = appData.records.findIndex(r => r.name===btn.dataset.emp && r.day===btn.dataset.day && r.week===week); let data = { week: week, day: btn.dataset.day, name: btn.dataset.emp, shift: btn.dataset.shift, location: btn.dataset.loc, note: btn.dataset.note, actualHours: btn.dataset.hours }; if (idx !== -1) appData.records[idx] = data; else appData.records.push(data); } }); }
    
    function handleCellClick(b, eIdx) { 
        let isVirtual = b.dataset.emp.includes('待補');
        if(isPaintMode) { 
            let s = document.getElementById('paintShift').value; 
            b.dataset.shift = s; 
            b.dataset.hours = document.getElementById('paintHours').value; 
            b.dataset.loc = isVirtual ? '本店' : document.getElementById('paintLoc').value; 
            b.dataset.note = document.getElementById('paintNote').value; 
            updateCellUI(b); updateDailyTotals(); triggerAutoSave(); 
        } else { 
            currentCell = b; 
            document.getElementById('modalTitle').innerText = b.dataset.emp; 
            document.getElementById('modalShift').value = b.dataset.shift; 
            document.getElementById('modalHours').value = b.dataset.hours; 
            document.getElementById('modalLocation').value = isVirtual ? '本店' : (b.dataset.loc || '本店'); 
            document.getElementById('modalNote').value = b.dataset.note; 

            if(isVirtual) {
                document.getElementById('modalLocGroup').style.display = 'none';
                document.getElementById('modalNoteGroup').style.gridColumn = '1 / span 2';
                document.getElementById('modalNoteLabel').innerHTML = '👤 支援人員 (填寫代班者)';
            } else {
                document.getElementById('modalLocGroup').style.display = 'block';
                document.getElementById('modalNoteGroup').style.gridColumn = 'auto';
                document.getElementById('modalNoteLabel').innerHTML = '💡 備註';
            }

            renderQuickShifts(); 
            document.getElementById('shiftModal').style.display = 'flex'; 
        } 
    }
    
    function renderQuickShifts() { 
        let h = `<button class="cell-btn" style="padding:10px; font-weight:bold; cursor:pointer; background:#f1f3f4;" onclick="clearModalShift()">🗑️ 清空</button>`; 
        (appConfig.shifts || []).forEach(s => { let isOff = (s==='排休'||s==='指休'); h += `<button class="cell-btn ${isOff?'zhi-xiu':''}" style="padding:10px; font-weight:bold; cursor:pointer;" onclick="setModalShift('${s}')">${s}</button>`; }); 
        document.getElementById('quickShiftButtons').innerHTML = h; 
    }
    function setModalShift(s) { document.getElementById('modalShift').value = s; autoFillHours(); }
    
    function clearModalShift() { 
        document.getElementById('modalShift').value = ''; 
        document.getElementById('modalHours').value = ''; 
        document.getElementById('modalLocation').value = '本店'; 
        document.getElementById('modalNote').value = ''; 
    }
    
    function applyShift() { currentCell.dataset.shift = document.getElementById('modalShift').value; currentCell.dataset.hours = document.getElementById('modalHours').value; currentCell.dataset.loc = document.getElementById('modalLocation').value; currentCell.dataset.note = document.getElementById('modalNote').value; updateCellUI(currentCell); updateDailyTotals(); closeModal('shiftModal'); triggerAutoSave(); }
    function updateDailyTotals() { let sums = [0,0,0,0,0,0,0]; document.querySelectorAll('.cell-btn').forEach(b => { let idx = dayNames.indexOf(b.dataset.day); if(b.dataset.loc === '本店') sums[idx] += parseFloat(b.dataset.hours || 0); }); sums.forEach((s, i) => document.getElementById(`dailyTotal-${i}`).innerText = s.toFixed(1)); document.getElementById('tableFoot').style.display = 'table-row-group'; }
    
    function updateSummary(idx, emp) { 
        let t = document.getElementById(`sum-${idx}`); if(!t) return; 
        let month = currentWeekDates[3].split('/')[0]; 
        let weekStr = document.getElementById('weekSelector').value;
        let totalH = 0, offD = 0, weekOffD = 0; 
        appData.records.forEach(r => { 
            if(r.name === emp.name) { 
                if (r.week === weekStr && (r.shift==='排休'||r.shift==='指休')) weekOffD++;
                let m = getWeekDates(r.week)[3].split('/')[0]; 
                if(m === month) { 
                    if(r.shift==='排休'||r.shift==='指休') offD++; 
                    else totalH += parseFloat(r.actualHours || 0); 
                } 
            } 
        }); 
        let info = appData.employees.find(e => e.name === emp.name) || {role:'待補', wage:0}; 
        if(info.role === '正職') {
            let warn = weekOffD < 2 ? `<span style="color:#d93025;font-weight:bold;">(當週休不足2天)</span>` : `<span style="color:#34a853;">(當週休滿)</span>`;
            t.innerHTML = `週休:${weekOffD}天<br>${warn}<br>月休:${offD}天`; 
        } else {
            t.innerHTML = `月時:${totalH.toFixed(1)}h<br>估:$${Math.round(totalH * info.wage)}`; 
        }
    }
    
    function refreshStoreList() { let sel = document.getElementById('storeSelector'); sel.innerHTML = ''; (appConfig.stores || []).forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`); sel.value = localStorage.getItem('lastStore') || appConfig.stores[0] || ""; updateLocDropdowns(); }
    function handleStoreChange() { updateLocDropdowns(); loadScheduleData(); }
    function showLoading(t) { document.getElementById('loadingText').innerText = t; document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function togglePaintMode() { isPaintMode = !isPaintMode; document.getElementById('paintToggleBtn').className = isPaintMode ? 'btn-paint-toggle active' : 'btn-paint-toggle'; document.getElementById('paintToggleBtn').innerText = isPaintMode ? '🖌️ 刷子(開)' : '🖌️ 刷子(關)'; document.getElementById('paintToolbar').style.display = isPaintMode ? 'flex' : 'none'; if(isPaintMode) { let sel = document.getElementById('paintShift'); sel.innerHTML = ''; appConfig.shifts.forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`); autoFillPaintHours(); } }
    function autoFillPaintHours() { document.getElementById('paintHours').value = appConfig.shiftHours[document.getElementById('paintShift').value] || 0; }
    
    // 🌟 人員管理過濾：只列出在職員工
    function openEmpModal() { 
        syncUIToMemory(); 
        localActiveEmps = JSON.parse(JSON.stringify(appData.employees.filter(e => e.status !== '離職'))); 
        localDeletedNames = []; 
        renderLocalEmpTable(); 
        document.getElementById('empModal').style.display = 'flex'; 
    }
    function renderLocalEmpTable() { let c = document.getElementById('localEmpList'); c.innerHTML = ''; localActiveEmps.forEach((e,i)=>{ let r=document.createElement('div'); r.className='emp-row'; let otherStores=appConfig.stores.filter(s=>s!==document.getElementById('storeSelector').value); let tOpts=otherStores.map(s=>`<option value="${s}">${s}</option>`).join(''); r.innerHTML=`<div style="display:flex; flex-direction:column;"><button style="border:none; cursor:pointer;" onclick="localSwapEmp(${i},-1)" ${i===0?'disabled':''}>▲</button><button style="border:none; cursor:pointer;" onclick="localSwapEmp(${i},1)" ${i===localActiveEmps.length-1?'disabled':''}>▼</button></div><div style="width:85px; margin-left:10px;"><strong>${e.name}</strong></div><div style="font-size:12px;">${e.role}</div><div style="margin-left:auto;"><select id="trans-to-${i}" style="font-size:11px;">${tOpts}</select><button onclick="localTransferEmp(${i})" style="background:orange; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer;">調店</button><button onclick="localDelEmp(${i},'${e.name}')" style="background:red; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer;">刪除(離職)</button></div>`; c.appendChild(r); }); }
    function localSwapEmp(i,d){ let t=i+d; if(t<0||t>=localActiveEmps.length)return; let tmp=localActiveEmps[i]; localActiveEmps[i]=localActiveEmps[t]; localActiveEmps[t]=tmp; renderLocalEmpTable(); }
    function localAddEmp(){ let nI=document.getElementById('newEmpName'),wI=document.getElementById('newEmpWage'); let n=nI.value.trim(),r=document.getElementById('newEmpRole').value,w=wI.value; if(!n||!w)return; localActiveEmps.push({name:n,role:r,wage:w}); nI.value=''; wI.value=''; renderLocalEmpTable(); }
    async function localTransferEmp(i){ let e=localActiveEmps[i],tS=document.getElementById(`trans-to-${i}`).value; if(!tS||!confirm(`轉調 ${e.name} 至 ${tS}?`))return; showLoading("跨店調度中..."); await window.db.collection('stores').doc(tS).collection('employees').doc(e.name).set({role:e.role,wage:e.wage,status:'在職',sortKey:999}); localDeletedNames.push(e.name); localActiveEmps.splice(i,1); renderLocalEmpTable(); hideLoading(); }
    function localDelEmp(i,n){ if(confirm(`確定將 ${n} 設為離職?`)){ localDeletedNames.push(n); localActiveEmps.splice(i,1); renderLocalEmpTable(); } }
    async function batchSaveEmps(){ let s=document.getElementById('storeSelector').value; showLoading("正在更新人事..."); for(let i=0;i<localActiveEmps.length;i++){ let e=localActiveEmps[i]; await window.db.collection('stores').doc(s).collection('employees').doc(e.name).set({role:e.role,wage:e.wage,status:'在職',sortKey:i}, {merge:true}); } for(let n of localDeletedNames) await window.db.collection('stores').doc(s).collection('employees').doc(n).set({status:'離職'}, {merge:true}); closeModal('empModal'); loadScheduleData(); }
    function openSysModal() { renderSysStoreItems(); renderSysShiftItems(); document.getElementById('sysModal').style.display = 'flex'; }
    function renderSysStoreItems() { let h = ''; (appConfig.stores || []).forEach((s, i) => h += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;"><span>🏪 ${s}</span><button onclick="delSysStore(${i})" style="background:red; color:white; padding:4px 8px; border:none; border-radius:4px; cursor:pointer;">刪除</button></div>`); document.getElementById('sysStoreList').innerHTML = h; }
    function addSysStore() { let v = document.getElementById('newStoreInput').value.trim(); if(v) { if(!appConfig.stores) appConfig.stores=[]; appConfig.stores.push(v); document.getElementById('newStoreInput').value=''; renderSysStoreItems(); } }
    function delSysStore(i) { appConfig.stores.splice(i,1); renderSysStoreItems(); }
    function renderSysShiftItems() { let h = ''; (appConfig.shifts || []).forEach((s, i) => { let hr = appConfig.shiftHours[s] || 0; h += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;"><span>⏰ ${s} (${hr}h)</span><button onclick="delSysShift(${i}, '${s}')" style="background:red; color:white; padding:4px 8px; border:none; border-radius:4px; cursor:pointer;">刪除</button></div>`; document.getElementById('sysShiftList').innerHTML = h; }); }
    function addSysShift() { let n = document.getElementById('newShiftName').value.trim(); let hr = parseFloat(document.getElementById('newShiftHours').value) || 0; if(n) { if(!appConfig.shifts) appConfig.shifts=[]; if(!appConfig.shifts.includes(n)) appConfig.shifts.push(n); appConfig.shiftHours[n] = hr; renderSysShiftItems(); } }
    function delSysShift(i, n) { appConfig.shifts.splice(i,1); delete appConfig.shiftHours[n]; renderSysShiftItems(); }
    async function saveSysConfig() { showLoading("儲存系統設定..."); await window.db.collection('settings').doc('globalConfig').set(appConfig); refreshStoreList(); loadScheduleData(); closeModal('sysModal'); hideLoading(); }
  </script>
