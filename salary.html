<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--accent:#34a853;
  --danger:#d93025;--warn:#f9ab00;--bg:#f0f4ff;--card:#fff;
  --text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;
  --header-h:56px;--radius:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--text);}

/* Loading */
#loadingOverlay{display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#1a73e8,#0d47a1);z-index:99999;flex-direction:column;justify-content:center;align-items:center;color:white;transition:opacity 0.4s;}
#loadingOverlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingText{font-size:14px;font-weight:600;opacity:0.9;}

/* App Shell */
#appShell{display:none;flex-direction:column;height:100%;}
#appShell.active{display:flex;}

/* Header */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:0 16px;height:var(--header-h);display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(26,115,232,0.3);}
.header-back{background:rgba(255,255,255,0.2);border:none;color:white;height:34px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 12px;gap:4px;}
.header-title{font-size:17px;font-weight:800;flex:1;}
.header-badge{background:rgba(255,255,255,0.2);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;}
.status-badge{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:800;}
.status-draft{background:rgba(255,255,255,0.2);color:white;}
.status-submitted{background:#fff3e0;color:#e65100;}
.status-approved{background:#e8f5e9;color:#2e7d32;}
.status-published{background:#e3f2fd;color:#1565c0;}

/* Month Nav */
.month-nav{background:white;padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.month-btn{background:#f1f3f4;border:none;border-radius:8px;padding:7px 14px;font-size:14px;font-weight:700;cursor:pointer;color:var(--text);}
.month-label{flex:1;text-align:center;font-size:16px;font-weight:800;color:var(--primary);}
.store-select{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;background:white;font-weight:600;}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px calc(env(safe-area-inset-bottom)+20px);}

/* Employee Card */
.emp-salary-card{background:white;border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.emp-salary-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:10px;}
.emp-salary-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:white;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.emp-salary-info{flex:1;}
.emp-salary-name{font-size:15px;font-weight:800;}
.emp-salary-role{font-size:11px;color:var(--text-muted);font-weight:600;}
.emp-salary-total{font-size:16px;font-weight:900;color:var(--primary);}
.emp-salary-arrow{font-size:18px;color:var(--text-muted);transition:transform 0.2s;}
.emp-salary-arrow.open{transform:rotate(90deg);}
.emp-salary-body{padding:0 16px 16px;border-top:1px solid var(--border);display:none;}
.emp-salary-body.open{display:block;}

/* Fields */
.salary-section{margin-top:12px;}
.salary-section-title{font-size:12px;font-weight:800;color:var(--text-muted);margin-bottom:8px;letter-spacing:0.5px;}
.salary-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f3f4;}
.salary-row:last-child{border-bottom:none;}
.salary-row-label{font-size:13px;font-weight:600;color:var(--text);}
.salary-row-val{font-size:14px;font-weight:800;color:var(--text);}

.action-btn{padding:8px 14px;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;}

.action-btn.accent{background:var(--accent);color:white;}
.action-btn.warn{background:var(--warn);color:white;}
.action-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.active{opacity:1;pointer-events:all;}
.modal-box{background:white;border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:20px 20px 32px;max-height:80vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:18px;font-weight:900;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:16px;}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}

/* 月曆 */

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-head{text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);padding:4px 0;}

.cal-cell.leave .cal-cell-val{color:var(--danger);}

.cal-summary{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}

/* 排班對照 */

.sched-hours{margin-left:auto;color:var(--text-muted);font-size:11px;}
.sched-ot{color:var(--accent);font-weight:800;}
</style>
</head>

<script>
// ===== 台灣國定假日 2026-2027 =====
const TW_HOLIDAYS = {
  // 2026（補假不列出，只列正式假日）
  "2026-01-01":"元旦",
  "2026-01-26":"農曆除夕","2026-01-27":"春節","2026-01-28":"春節","2026-01-29":"春節",
  "2026-02-28":"和平紀念日",
  "2026-04-04":"兒童節","2026-04-05":"清明節",
  "2026-05-01":"勞動節",
  "2026-06-19":"端午節",
  "2026-09-25":"中秋節",
  "2026-10-10":"國慶日",
  // 2027（待確認，暫定）
  "2027-01-01":"元旦",
  "2027-01-26":"農曆除夕","2027-01-27":"春節","2027-01-28":"春節","2027-01-29":"春節",
  "2027-02-28":"和平紀念日",
  "2027-04-04":"兒童節","2027-04-05":"清明節",
  "2027-05-01":"勞動節",
  "2027-06-09":"端午節",
  "2027-10-10":"國慶日"
};

// 取得某月的國定假日
function getMonthHolidays(ym) {
  return Object.entries(TW_HOLIDAYS)
    .filter(([k]) => k.startsWith(ym))
    .map(([k, v]) => ({ date: k, name: v, day: parseInt(k.split('-')[2]) }));
}

// 計算當月六日天數（應休基準）
function getMonthWeekendDays(ym) {
  const [y, m] = ym.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  let sat = 0, sun = 0;
  for(let d = 1; d <= daysInMonth; d++) {
    const wd = new Date(y, m-1, d).getDay();
    if(wd === 6) sat++;
    if(wd === 0) sun++;
  }
  return { sat, sun, total: sat + sun };
}

// 從排班記錄偵測國定假日是否有上班
function detectHolidayWork(empName, ym) {
  const holidays = getMonthHolidays(ym);
  const [cy, cm] = ym.split('-').map(Number);
  const worked = [];
  holidays.forEach(h => {
    const [hy, hm, hd] = h.date.split('-').map(Number);
    // 從排班記錄找這天
    let hasWork = false;
    Object.entries(scheduleData).forEach(([ws, recs]) => {
      recs.forEach(r => {
        if(r.name !== empName) return;
        const wDates = getWeekDatesFromStr(ws);
        const dIdx = ['週一','週二','週三','週四','週五','週六','週日'].indexOf(r.day);
        if(dIdx < 0) return;
        const dateStr = wDates[dIdx];
        if(!dateStr) return;
        const [dm, dd] = dateStr.split('/').map(Number);
        if(dm === hm && dd === hd && r.shift && r.shift !== '排休' && r.shift !== '指休') {
          hasWork = true;
        }
      });
    });
    if(hasWork) worked.push(h);
  });
  return worked;
}

// 計算當月已休天數（從排班記錄）
function calcMonthOffDays(empName, ym) {
  const [cy, cm] = ym.split('-').map(Number);
  let offDays = 0;
  Object.entries(scheduleData).forEach(([ws, recs]) => {
    recs.forEach(r => {
      if(r.name !== empName) return;
      if(r.shift !== '排休' && r.shift !== '指休') return;
      const wDates = getWeekDatesFromStr(ws);
      const dIdx = ['週一','週二','週三','週四','週五','週六','週日'].indexOf(r.day);
      if(dIdx < 0) return;
      const dateStr = wDates[dIdx];
      if(!dateStr) return;
      const dm = parseInt(dateStr.split('/')[0]);
      if(dm === cm) offDays++;
    });
  });
  return offDays;
}

// ===== 遞延假年底結算（1月份薪資偵測）=====
function checkCarryOverSettlement() {
  const prevYear = parseInt(currentMonth.split('-')[0]) - 1;
  const settleDate = `${prevYear}-12-31`;
  let hasSettle = false;

  empList.forEach(emp => {
    const batches = batchDataMap[emp.name] || [];
    const needSettle = batches.filter(b =>
      b.carried && !b.settled &&
      (b.settleDate === settleDate || new Date(b.expireDate||'') <= new Date(settleDate))
    );
    if(needSettle.length > 0) hasSettle = true;
  });

  if(hasSettle) {
    const banner = document.getElementById('carrySettleBanner');
    if(banner) banner.style.display = 'flex';
  }
}

// 計算員工遞延假結算金額
function calcCarrySettlement(empName) {
  const batches = batchDataMap[empName] || [];
  const prevYear = parseInt(currentMonth.split('-')[0]) - 1;
  const settleDate = `${prevYear}-12-31`;

  const toSettle = batches.filter(b => b.carried && !b.settled);
  if(!toSettle.length) return { days:0, amount:0, items:[] };

  const rec = getSalaryRecord(empName);
  const emp = empList.find(e=>e.name===empName);
  // 日薪基準：月薪 / 30
  const monthWage = parseFloat(rec?.baseSalary||0) + parseFloat(rec?.fullAttendBonus||0);
  const dailyWage = Math.round(monthWage / 30);

  const items = toSettle.map(b => {
    const remaining = Math.max(0,(b.days||0)-(b.used||0));
    return { batchId:b.id, label:b.label||b.note||'遞延批次', grantDate:b.grantDate, days:remaining, amount:remaining*dailyWage };
  });
  const totalDays   = items.reduce((a,b)=>a+b.days,0);
  const totalAmount = items.reduce((a,b)=>a+b.amount,0);
  return { days:totalDays, amount:totalAmount, dailyWage, items };
}

// ===== 離職擇優結算 =====
// 週年制總天數 vs 實際在職月數比例計算，取高者
function calcRetireSettlement(empName) {
  const emp = empList.find(e=>e.name===empName);
  const batches = batchDataMap[empName] || [];
  const hireDate = batches[0]?.grantDate ? dateAddMonths(batches[0].grantDate,-6) : null;
  if(!hireDate) return null;

  const retireDate = emp?.retireDate || today();
  const totalMonths = monthsDiffSalary(hireDate, retireDate);

  // 週年制：已實際發放的所有批次天數
  const weeklyTotal = batches.reduce((a,b)=>a+(b.days||0),0);
  const weeklyUsed  = batches.reduce((a,b)=>a+(b.used||0),0);
  const weeklyRemain = Math.max(0, weeklyTotal - weeklyUsed);

  // 比例制：依實際在職月數計算當年應得天數（不重複計算已給的）
  const rule = annualLeaveRuleSalary(totalMonths);
  const proportional = totalMonths > 0 ? Math.ceil(rule.days * (totalMonths % 12 || 12) / 12) : 0;

  // 擇優（取高者）
  const finalRemain = Math.max(weeklyRemain, proportional);

  const rec = getSalaryRecord(empName);
  const monthWage = parseFloat(rec?.baseSalary||0) + parseFloat(rec?.fullAttendBonus||0);
  const dailyWage = Math.round(monthWage/30);

  return {
    hireDate, retireDate, totalMonths,
    weeklyTotal, weeklyUsed, weeklyRemain,
    proportional, finalRemain,
    dailyWage, amount: finalRemain * dailyWage,
    basis: finalRemain === proportional ? '比例制（較高）' : '週年制（較高）'
  };
}

// 輔助：月數差
function monthsDiffSalary(from, to) {
  const f=new Date(from), t=new Date(to);
  return (t.getFullYear()-f.getFullYear())*12+(t.getMonth()-f.getMonth());
}
function dateAddMonths(s, months) {
  const d=new Date(s); d.setMonth(d.getMonth()+months); return d.toISOString().split('T')[0];
}
function annualLeaveRuleSalary(totalMonths) {
  if(totalMonths<6)   return {days:0};
  if(totalMonths<12)  return {days:3};
  if(totalMonths<24)  return {days:7};
  if(totalMonths<36)  return {days:10};
  if(totalMonths<48)  return {days:14};
  if(totalMonths<60)  return {days:14};
  if(totalMonths<120) return {days:15};
  return {days:Math.min(30,15+Math.floor(totalMonths/12)-9)};
}
function today() { return new Date().toISOString().split('T')[0]; }

async function confirmCompEarned(empName) {
  const rec = getSalaryRecord(empName);
  const emp = empList.find(e => e.name === empName);
  if(!rec || !emp) return;

  // 取得有上班的國定假日清單
  const workedHolidays = detectHolidayWork(empName, currentMonth);
  const days = parseFloat(rec.holidayDays ?? workedHolidays.length);
  if(days <= 0) { showToast('⚠️ 國定假日時數為 0，無需發補休'); return; }

  if(rec.compConfirmed) {
    if(!confirm(`取消 ${empName} 本月 ${days} 天補休發放？`)) return;
  } else {
    // 顯示具體的國定假日清單
    const holidayList = workedHolidays.map(h => `${h.date.slice(5)} ${h.name}`).join('、');
    if(!confirm(`確認發放 ${empName} ${days} 天補休？\n\n國定假日：${holidayList || `共 ${days} 天`}\n\n將逐筆寫入補休紀錄。`)) return;
  }

  const newVal = !rec.compConfirmed;
  showLoading(newVal ? '發放補休中...' : '取消補休中...');
  try {
    const year = currentMonth.split('-')[0];
    const logRef = window.db.collection('employees').doc(empName).collection('leaveLog').doc(currentMonth);

    if(newVal) {
      // ✅ 每筆國定假日各自一條記錄，說明文字具體
      if(workedHolidays.length > 0) {
        for(const h of workedHolidays) {
          const note = `${h.date} ${h.name} 國定假日補休`;
          await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
            date: h.date, type: 'comp_earn', days: 1,
            note, savedBy: currentUser.displayName || currentUser.empName
          })}, { merge: true });
        }
      } else {
        // 手動填寫天數的情況（無排班記錄）
        await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
          date: currentMonth + '-01', type: 'comp_earn', days,
          note: `${currentMonth.replace('-','年')}月 國定假日補休（共 ${days} 天）`,
          savedBy: currentUser.displayName || currentUser.empName
        })}, { merge: true });
      }
    } else {
      // 取消：寫一筆 comp_cancel
      await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
        date: currentMonth + '-01', type: 'comp_cancel', days,
        note: `${currentMonth.replace('-','年')}月 取消國定假日補休發放`,
        savedBy: currentUser.displayName || currentUser.empName
      })}, { merge: true });
    }

    // ✅ 從 leaveLog 重新加總，確保 leaves 總帳正確
    const leaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(year);
    const leaveSnap = await leaveRef.get();
    const existing = leaveSnap.exists ? leaveSnap.data() : {};
    const logSnaps = await window.db.collection('employees').doc(empName).collection('leaveLog').get();
    let usedAnnual = 0, earnedComp = 0, usedComp = 0;
    logSnaps.forEach(d => {
      if(!d.id.startsWith(year)) return;
      (d.data().records || []).forEach(r => {
        const rd = parseFloat(r.days) || 0;
        if(r.type === 'annual_use')        usedAnnual += rd;
        if(r.type === 'comp_earn')         earnedComp += rd;
        if(r.type === 'comp_use')          usedComp   += rd;
        if(r.type === 'annual_use_cancel') usedAnnual = Math.max(0, usedAnnual - rd);
        if(r.type === 'comp_use_cancel')   usedComp   = Math.max(0, usedComp   - rd);
        if(r.type === 'comp_cancel')       earnedComp = Math.max(0, earnedComp - rd);
      });
    });
    const updatedLeave = { ...existing, usedAnnual, earnedComp, usedComp, updatedAt: new Date().toISOString() };
    await leaveRef.set(updatedLeave, { merge: true });

    rec.compConfirmed = newVal;
    leaveDataMap[empName] = updatedLeave;
    openEmpModal(empName);
    showToast(newVal ? `✅ 已發放 ${empName} ${days} 天補休` : `已取消補休發放`);
  } catch(e) { showToast('❌ 失敗：' + e.message); }
  hideLoading();
}

async function doEncash(empName, type, maxDays, dailyRate) {
  const days = parseInt(document.getElementById('encashDays').value || 0);
  if(days <= 0 || days > maxDays) { showToast('⚠️ 請確認折現天數'); return; }
  if(!confirm(`確認將 ${empName} ${days} 天${type==='annual'?'特休':'補休'}折現 $${(days*dailyRate).toLocaleString()}？\n折現後剩餘天數歸零。`)) return;
  showLoading('處理折現中...');
  try {
    const year = currentMonth.split('-')[0];
    const leaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(year);
    const logRef   = window.db.collection('employees').doc(empName).collection('leaveLog').doc(currentMonth);
    const snap = await leaveRef.get();
    const leaveData = snap.exists ? snap.data() : {};
    if(type === 'annual') leaveData.usedAnnual = (leaveData.annualDays || 0); // 全部折現等同用完
    else leaveData.usedComp = leaveData.earnedComp || 0;
    await leaveRef.set(leaveData, { merge: true });
    await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
      date: currentMonth + '-31', type: type === 'annual' ? 'annual_encash' : 'comp_encash',
      days, amount: days * dailyRate,
      note: `年度折現 $${(days*dailyRate).toLocaleString()}`, savedBy: currentUser.displayName || currentUser.empName
    })}, { merge: true });
    // 在薪資單記錄折現金額
    let rec = getSalaryRecord(empName);
    if(!rec) { rec = buildDefaultRecord(empList.find(e=>e.name===empName)); salaryData.records.push(rec); }
    if(type === 'annual') rec.annualLeaveEncash = (rec.annualLeaveEncash||0) + days * dailyRate;
    else rec.compLeaveEncash = (rec.compLeaveEncash||0) + days * dailyRate;
    leaveDataMap[empName] = leaveData;
    closeModal('encashModal');
    openEmpModal(empName);
    showToast(`✅ 已完成${type==='annual'?'特休':'補休'}折現 $${(days*dailyRate).toLocaleString()}`);
    triggerAutoSave();
  } catch(e) { showToast('❌ 失敗：' + e.message); }

}

// ===== 薪資計算 =====
function hourlyRate(rec) {
  const base = parseFloat(rec.baseSalary || 0);
  const attendBase = parseFloat(rec.fullAttendBase ?? rec.fullAttendBonus ?? 0);
  return (base + attendBase) / 30 / 8;
}

function calcEmpHours(empName) {
  let totalH = 0, otH = 0;
  const [cy, cm] = currentMonth.split('-').map(Number);
  // 用 Set 避免同一天重複計算（跨店可能同天有多筆）
  const counted = new Set();

  Object.entries(scheduleData).forEach(([ws, weekRecs]) => {
    (weekRecs || []).forEach(r => {
      if(r.name !== empName) return;
      const h = parseFloat(r.actualHours || 0);
      if(r.shift === '排休' || r.shift === '指休' || !r.shift) return;

      // 確認是當月日期
      const wDates = getWeekDatesFromStr(ws);
      const dIdx = ['週一','週二','週三','週四','週五','週六','週日'].indexOf(r.day);
      if(dIdx < 0) return;
      const dateStr = wDates[dIdx];
      if(!dateStr) return;
      const [dm, dd] = dateStr.split('/').map(Number);
      if(dm !== cm) return;

      // 避免跨店同天重複計算
      const dayKey = `${dm}/${dd}`;
      if(counted.has(dayKey)) return;
      counted.add(dayKey);

      totalH += h;
      if(r.isOT || h > 8) otH += Math.max(0, h - 8);
    });
  });
  return { totalH: Math.round(totalH*10)/10, otH: Math.round(otH*10)/10 };
}

function calcTotal(rec) {
  const role = rec.role;
  if(role === ROLE_PART) {
    const wage = parseFloat(rec.wage || 0);
    // 動態計算當月工時（不用 rec.hours，避免舊資料影響）
    const { totalH } = calcEmpHours(rec.empName || rec.name || '');
    const extraH = parseFloat(rec.extraHours || 0);
    const holidayH = parseFloat(rec.holidayHours || 0);
    const roleBonus = parseFloat(rec.roleBonus || 0);
    
    // 國定假日第一倍已含在一般工時，額外只加第二倍
    const gross = Math.round(wage * (totalH + extraH) + wage * holidayH * 1 + roleBonus);
    const deduct = parseFloat(rec.laborInsurance || 0) + parseFloat(rec.healthInsurance || 0) + parseFloat(rec.dependentInsurance || 0) + parseFloat(rec.laborPension || 0);
    return gross - deduct;
  } else {
    const base = parseFloat(rec.baseSalary || 0);
    const attend = parseFloat(rec.fullAttendBonus || 0);
    const ratePerHour = hourlyRate(rec);          // (底薪+全勤基準)/30/8
    const ratePerMin = ratePerHour / 60;          // 遲到：每分鐘費率
    const otBaseRate = parseFloat(rec.otBase||0) > 0 ? parseFloat(rec.otBase) : ratePerHour; // 加班費基準
    const lateMin = parseFloat(rec.lateMinutes || 0);
    const otH = parseFloat(rec.otHours || 0);
    const lateDeduct = Math.round(ratePerMin * lateMin);
    const otPay = Math.ceil(otBaseRate * otH * 1.34);
    const laborIns = parseFloat(rec.laborInsurance || 0);
    const healthIns = parseFloat(rec.healthInsurance || 0) + parseFloat(rec.dependentInsurance || 0);
    const pension = parseFloat(rec.laborPension || 0);
    const otherBonus = parseFloat(rec.otherBonus || 0);
    const performance = parseFloat(rec.performance || 0);
    if(role === ROLE_FULL) {
      const roleBonus = parseFloat(rec.roleBonus || 0);
      // 正職：底薪+全勤+職務津貼+其他津貼+加班費-遲到-勞保-健保-眷屬健保-勞退
      const gross = base + attend + roleBonus + otherBonus + otPay - lateDeduct;
      return gross - laborIns - healthIns - pension;
    } else {
      // 店長：底薪+全勤+五項管理獎金+績效+其他+加班費-遲到-代扣
      const mgmt = ['mgmtOps','mgmtQuality','mgmtKPI','mgmtAccount','mgmtLeader']
        .reduce((s, k) => s + parseFloat(rec[k] || 0), 0);
      const gross = base + attend + mgmt + performance + otherBonus + otPay - lateDeduct;
      return gross - laborIns - healthIns - pension;
    }
  }
}

function buildPayslipRows(rec, emp, rate, isPartTime) {
  const rows = [];
  if(isPartTime) {
    const { totalH } = calcEmpHours(emp.name);
    rows.push(['時薪', `$${rec.wage||0}`, '勞保費', `$${rec.laborInsurance||0}`]);
    rows.push([`工時 ${totalH}h`, `$${Math.round((rec.wage||0)*totalH).toLocaleString()}`, `健保費${rec.hasDependent?'（有眷）':''}`, `$${((rec.healthInsurance||0)+(rec.dependentInsurance||0)).toLocaleString()}`]);
    
    const hasHoliday = parseFloat(rec.holidayHours||0) > 0;
    rows.push([
      hasHoliday ? `國假加班 ${rec.holidayHours}h×2` : '',
      hasHoliday ? `$${Math.round((rec.wage||0)*rec.holidayHours*2).toLocaleString()}` : '',
      '勞退自提',
      `$${rec.laborPension||0}`
    ]);
    
    if(parseFloat(rec.roleBonus||0)>0)
      rows.push(['職務津貼', `$${parseFloat(rec.roleBonus).toLocaleString()}`, '', '']);
  } else {
    rows.push(['底薪', `$${(rec.baseSalary||0).toLocaleString()}`, '勞保費', `$${rec.laborInsurance||0}`]);
    rows.push(['全勤獎金', `$${(rec.fullAttendBonus||0).toLocaleString()}`, `健保費${rec.hasDependent?'（有眷）':''}`, `$${rec.healthInsurance||0}`]);
    if(emp.role === ROLE_FULL) {
      rows.push(['職務津貼', `$${(rec.roleBonus||0).toLocaleString()}`, '勞退自提', `$${rec.laborPension||0}`]);
    } else {
      ['mgmtOps','mgmtQuality','mgmtKPI','mgmtAccount','mgmtLeader'].forEach((k,i) => {
        const labels = ['營運獎勵','品保獎勵','營運指標','帳務獎勵','卓越領導'];
        if(parseFloat(rec[k]||0)>0)
          rows.push([labels[i], `$${parseFloat(rec[k]).toLocaleString()}`, i===0?'勞退自提':'', i===0?`$${rec.laborPension||0}`:'']);
      });
      if(parseFloat(rec.performance||0)>0)
        rows.push(['績效獎金', `$${parseFloat(rec.performance).toLocaleString()}`, '', '']);
    }
    if(parseFloat(rec.otherBonus||0)>0)
      rows.push(['其他津貼', `$${parseFloat(rec.otherBonus).toLocaleString()}`, '', '']);
    if(parseFloat(rec.otHours||0)>0)
      rows.push(['加班費', `+$${Math.ceil(rate*(rec.otHours||0)*1.34).toLocaleString()}`, '', '']);
    if(parseFloat(rec.lateMinutes||0)>0)
      rows.push(['遲到扣款', `-$${Math.round(rate*(rec.lateMinutes||0)).toLocaleString()}`, '', '']);
  }
  return rows.map(([a,b,c,d]) => `
    <tr style="border-bottom:1px solid #f1f3f4;">
      <td style="padding:6px 8px;">${a}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:700;">${b}</td>
      <td style="padding:6px 8px;color:#d93025;">${c}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:700;color:#d93025;">${d}</td>
    </tr>`).join('');
}

function buildAttendanceInfo(rec, emp, isPartTime) {
  const { totalH, otH } = calcEmpHours(emp.name);
  if(isPartTime) {
    return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;font-size:11px;text-align:center;">
      <div><div style="color:#64748b;">本月工時</div><div style="font-weight:700;">${totalH}h</div></div>
      <div><div style="color:#64748b;">國假時數</div><div style="font-weight:700;">${rec.holidayHours||0}h</div></div>
      <div><div style="color:#64748b;">遲到</div><div style="font-weight:700;">${rec.lateMinutes||0}分</div></div>
    </div>`;
  } else {
    const weekends = getMonthWeekendDays(currentMonth);
    const offDays = calcMonthOffDays(emp.name, currentMonth);
    return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;font-size:11px;text-align:center;">
      <div><div style="color:#64748b;">應休天數</div><div style="font-weight:700;">${weekends.total}天</div></div>
      <div><div style="color:#64748b;">已休天數</div><div style="font-weight:700;">${offDays}天</div></div>
      <div><div style="color:#64748b;">加班時數</div><div style="font-weight:700;">${otH}h</div></div>
      <div><div style="color:#64748b;">遲到</div><div style="font-weight:700;">${rec.lateMinutes||0}分</div></div>
    </div>`;
  }
}

function calcGross(rec) {
  const role = rec.role;
  if(role === ROLE_PART) {
    const wage = parseFloat(rec.wage||0);
    const { totalH } = calcEmpHours(rec.empName || rec.name || '');
    const extraH = parseFloat(rec.extraHours||0);
    return Math.round(wage*(totalH+extraH) + wage*(rec.holidayHours||0) + (rec.roleBonus||0));
  } else {
    const base = parseFloat(rec.baseSalary||0);
    const attend = parseFloat(rec.fullAttendBonus||0);
    const ratePerHour = hourlyRate(rec);
    const ratePerMin = ratePerHour / 60;
    const otBaseRate2 = parseFloat(rec.otBase||0) > 0 ? parseFloat(rec.otBase) : ratePerHour;
    const otPay = Math.ceil(otBaseRate2*(rec.otHours||0)*1.34);
    const lateDeduct = Math.round(ratePerMin*(rec.lateMinutes||0));
    const otherBonus = parseFloat(rec.otherBonus||0);
    const performance = parseFloat(rec.performance||0);
    if(role === ROLE_FULL) {
      return base + attend + (rec.roleBonus||0) + otherBonus + otPay - lateDeduct;
    } else {
      const mgmt = ['mgmtOps','mgmtQuality','mgmtKPI','mgmtAccount','mgmtLeader']
        .reduce((s,k) => s+parseFloat(rec[k]||0), 0);
      return base + attend + mgmt + performance + otherBonus + otPay - lateDeduct;
    }
  }
}

function calcDeduct(rec) {
  return parseFloat(rec.laborInsurance||0) +
         parseFloat(rec.healthInsurance||0) +
         parseFloat(rec.dependentInsurance||0) +
         parseFloat(rec.laborPension||0);
}

// ===== 加班費基準額設定 =====
function toggleOtBase(empName, cardIdx) {
  let rec = getSalaryRecord(empName);
  const emp = empList.find(e => e.name === empName);
  if(!rec) { rec = buildDefaultRecord(emp); salaryData.records.push(rec); }
  // 若還沒設定，預設填入費率的無條件進位值
  if(!rec.otBase || parseFloat(rec.otBase) === 0) {
    rec.otBase = Math.ceil(hourlyRate(rec));
  }
  // 重新渲染
  const body = document.getElementById(`body-${cardIdx}`);
  if(body) body.innerHTML = renderSalaryForm(emp || {name:empName}, rec, cardIdx, isReadonly());
  triggerAutoSave();
}

function clearOtBase(empName, cardIdx) {
  let rec = getSalaryRecord(empName);
  if(!rec) return;
  rec.otBase = 0;
  const body = document.getElementById(`body-${cardIdx}`);
  const emp = empList.find(e => e.name === empName);
  if(body) body.innerHTML = renderSalaryForm(emp || {name:empName}, rec, cardIdx, isReadonly());
  const total = calcTotal(rec);
  const totalEl = document.getElementById(`total-${cardIdx}`);
  if(totalEl) totalEl.textContent = `$${total.toLocaleString()}`;
  const card = document.getElementById(`card-${cardIdx}`);
  if(card) { const s = card.querySelector('.emp-salary-total'); if(s) s.textContent = `$${total.toLocaleString()}`; }
  triggerAutoSave();
}

// ===== 眷屬健保切換 =====
function toggleDependent(empName, cardIdx) {
  let rec = getSalaryRecord(empName);
  const emp = empList.find(e => e.name === empName);
  if(!rec) { rec = buildDefaultRecord(emp); salaryData.records.push(rec); }
  rec.hasDependent = !rec.hasDependent;
  if(!rec.hasDependent) rec.dependentInsurance = 0;
  // 重新渲染該卡片的 body
  const emp2 = empList.find(e => e.name === empName) || { name: empName, role: rec.role };
  const body = document.getElementById(`body-${cardIdx}`);
  if(body) {
    body.innerHTML = renderSalaryForm(emp2, rec, cardIdx, isReadonly());
  }
  const totalEl = document.getElementById(`total-${cardIdx}`);
  if(totalEl) totalEl.textContent = `$${calcTotal(rec).toLocaleString()}`;
  triggerAutoSave();
}

async function recallSalary() {
  if(!confirm('確定收回薪資送審？收回後可以重新修改。')) return;
  showLoading('收回中...');
  try {
    await window.db.collection('stores').doc(currentStore).collection('salary').doc(currentMonth).set({
      ...salaryData, status: 'draft',
      recalledAt: new Date().toISOString(),
      recalledBy: currentUser.displayName || currentUser.empName
    });
    salaryData.status = 'draft';
    updateStatusBadge(); renderBottomAction(); renderEmpList();
    showToast('✅ 已收回，可重新修改');
  } catch(e) { showToast('❌ 收回失敗：' + e.message); }
  hideLoading();
}

async function rejectSalary() {
  if(!confirm('確定退回薪資？退回後店長可重新修改。')) return;
  showLoading('退回中...');
  try {
    await window.db.collection('stores').doc(currentStore).collection('salary').doc(currentMonth).set({
      ...salaryData, status: 'draft',
      rejectedAt: new Date().toISOString(),
      rejectedBy: currentUser.displayName || currentUser.empName
    });
    salaryData.status = 'draft';
    updateStatusBadge(); renderBottomAction(); renderEmpList();
    showToast('✅ 已退回給店長修改');
  } catch(e) { showToast('❌ 退回失敗：' + e.message); }
  hideLoading();
}

    .ps-total { display:flex; justify-content:space-between; padding:4px 0; font-weight:900; font-size:12px; border-top:2px solid #1a73e8; margin-top:4px; }

    @media print {
      .payslip-page { page-break-after: always; }
    }
  </style>`;

  const emps = empList.filter(e => getSalaryRecord(e.name));
  // 每兩人一頁
  for(let i = 0; i < emps.length; i += 2) {
    html += `<div class="payslip-page">`;
    html += buildSinglePayslipHtml(emps[i], y, m);
    if(emps[i+1]) {
      html += `<div class="cut-line">✂ ─────────────────────────────</div>`;
      html += buildSinglePayslipHtml(emps[i+1], y, m);
    }
    html += `</div>`;
  }
  return html;
}

// ===== 月份切換 =====
function changeMonth(offset) {
  const [y, m] = currentMonth.split('-').map(Number);
  let nm = m + offset, ny = y;
  if(nm < 1) { ny--; nm = 12; }
  if(nm > 12) { ny++; nm = 1; }
  const now = new Date();
  const nowYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const newYM = `${ny}-${String(nm).padStart(2,'0')}`;

  // 往後限制：不能看未來月份
  if(newYM > nowYM) { showToast('⚠️ 不能查看未來月份'); return; }

  // 往前限制：員工/店長最多12個月前，加盟主/管理者不限
  if(offset < 0) {
    const perm = currentUser?.permission || 'employee';
    if(!['owner','admin'].includes(perm)) {
      const limitDate = new Date(now.getFullYear(), now.getMonth() - 12, 1);
      const limitYM = `${limitDate.getFullYear()}-${String(limitDate.getMonth()+1).padStart(2,'0')}`;
      if(newYM < limitYM) { showToast('⚠️ 最多只能查閱近12個月的薪資'); return; }
    }
  }

  currentMonth = newYM;
  document.getElementById('monthLabel').textContent = getMonthLabel(currentMonth);
  loadSalaryData();
}

// ===== 讀取資料 =====
async function loadSalaryData() {
  currentStore = document.getElementById('storeSelector').value || currentStore;
  if(!currentStore) { hideLoading(); return; }
  document.getElementById('headerStore').textContent = currentStore;
  showLoading('載入薪資資料...');
  expandedCards.clear();

  try {
    // 平行讀取：員工名單、當月薪資、上月薪資、displayName
    const [empSnap, salSnap, prevSalSnap, accSnap] = await Promise.all([
      window.db.collection('stores').doc(currentStore).collection('employees').get(),
      window.db.collection('stores').doc(currentStore).collection('salary').doc(currentMonth).get(),
      window.db.collection('stores').doc(currentStore).collection('salary').doc(getPrevMonth(currentMonth)).get(),
      window.db.collection('account').where('store','==',currentStore).get().catch(()=>null)
    ]);

    // ✅ displayName 對應表
    displayNameMap = {};
    if(accSnap) accSnap.forEach(d => {
      const acc = d.data();
      if(acc.empName && acc.displayName) displayNameMap[acc.empName] = acc.displayName;
    });

    // 員工名單
    empList = [];
    const todaySal = new Date().toISOString().split('T')[0];
    empSnap.forEach(d => {
      const data = d.data();
      const status = data.status;
      const effectDate = data.retireDate || data.transferDate;
      const isEffective = ['離職','調走'].includes(status) && (!effectDate || todaySal >= effectDate);
      if(!isEffective) empList.push({ name: d.id, ...data });
    });
    empList.sort((a,b) => (a.sortKey||0)-(b.sortKey||0));

    // 薪資資料
    salaryData = salSnap.exists ? salSnap.data() : { status: 'draft', records: [] };
    if(!salaryData.records) salaryData.records = [];
    prevSalaryData = prevSalSnap.exists ? (prevSalSnap.data().records || []) : [];

    // 讀取當月排班資料（跨所有門市）
    scheduleData = {};
    const monthWeeks = getMonthWeeks(currentMonth);
    const allStores = appConfig.stores || [currentStore];

    await Promise.all(allStores.flatMap(store =>
      monthWeeks.map(ws =>
        window.db.collection('stores').doc(store).collection('weeks').doc(ws).get()
          .then(snap => {
            if(!snap.exists) return;
            const recs = snap.data().records || [];
            // 標記每筆記錄來自哪個門市
            const tagged = recs.map(r => ({ ...r, _store: store }));
            if(!scheduleData[ws]) scheduleData[ws] = [];
            // 合併，避免重複（同一人同一天以本店優先）
            tagged.forEach(r => {
              const exists = scheduleData[ws].find(
                e => e.name === r.name && e.day === r.day && e._store === currentStore
              );
              if(!exists) scheduleData[ws].push(r);
            });
          })
          .catch(()=>{})
      )
    ));

    updateStatusBadge();
    renderMonthInfo();
    await loadLeaveData(); // ✅ 讀取特補休資料
    renderEmpList();
    renderBottomAction();
  } catch(e) {
    console.error('loadSalaryData 失敗:', e);
    showToast('❌ 載入失敗：' + e.message);
    document.getElementById('empList').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><div style="font-weight:700;">載入失敗</div><div style="font-size:12px;margin-top:4px;">${e.message}</div></div>`;
  }
  hideLoading();
}

function getPrevMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  if(m === 1) return `${y-1}-12`;
  return `${y}-${String(m-1).padStart(2,'0')}`;
}
function getMonthLabel(ym) {
  const [y, m] = ym.split('-');
  return `${y} 年 ${parseInt(m)} 月`;
}
function getCurrentMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function getMonthWeeks(ym) {
  // 取得某月份涵蓋的所有 ISO 週次
  const [y, m] = ym.split('-').map(Number);
  const weeks = new Set();
  const d = new Date(y, m-1, 1);
  const end = new Date(y, m, 0);
  while(d <= end) {
    const yr = d.getFullYear();
    const first = new Date(yr, 0, 1);
    const wk = Math.ceil((((d - first) / 86400000) + first.getDay() + 1) / 7);
    weeks.add(`${yr}-W${String(wk).padStart(2,'0')}`);
    d.setDate(d.getDate() + 7);
  }
  return [...weeks];
}

function renderEmpList() {
  const el = document.getElementById('empList');
  const readonly = isReadonly();

  // 非管理者導向查看薪資頁面
  if(!canEditSalary()) {
    window.location.replace('my-salary.html');
    return;
  }

    // 店長以上：顯示所有員工（店長薪資只有加盟主以上可看）
  let emps = empList.filter(e => {
    if(e.role === ROLE_MANAGER) return canEditManagerSalary();
    return true;
  });
  if(emps.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div>無員工資料</div></div>`;
    return;
  }

  el.innerHTML = emps.map((emp, idx) => {
    let rec = getSalaryRecord(emp.name) || buildDefaultRecord(emp);
    // 工讀：若 holidayHours 是 0 且排班有偵測到出勤，自動更新
    if(emp.role === ROLE_PART && parseFloat(rec.holidayHours||0) === 0) {
      const holidays = getMonthHolidays(currentMonth);
      const [hcy, hcm] = currentMonth.split('-').map(Number);
      let autoH = 0;
      holidays.forEach(h => {
        const [hy, hm, hd] = h.date.split('-').map(Number);
        Object.entries(scheduleData).forEach(([ws, recs]) => {
          recs.forEach(r => {
            if(r.name !== emp.name) return;
            const wDates = getWeekDatesFromStr(ws);
            const dIdx = ['週一','週二','週三','週四','週五','週六','週日'].indexOf(r.day);
            if(dIdx < 0) return;
            const dateStr = wDates[dIdx];
            if(!dateStr) return;
            const [dm, dd] = dateStr.split('/').map(Number);
            if(dm === hm && dd === hd && r.shift && r.shift !== '排休' && r.shift !== '指休') {
              autoH += parseFloat(r.actualHours || 0);
            }
          });
        });
      });
      autoH = Math.round(autoH * 10) / 10;
      if(autoH > 0) rec = { ...rec, holidayHours: autoH };
    }
    const total = calcTotal(rec);
    const isOpen = expandedCards.has(emp.name);
    return `<div class="emp-salary-card" id="card-${idx}">
      <div class="emp-salary-header" onclick="openEmpModal('${emp.name}')">
        <div class="emp-salary-avatar" style="background:${emp.role===ROLE_MANAGER?'linear-gradient(135deg,#9334e6,#6a1bb5)':emp.role===ROLE_FULL?'linear-gradient(135deg,#34a853,#1e7e34)':'linear-gradient(135deg,#1a73e8,#0d47a1)'};">
          ${getDisplayName(emp.name)[0]}
        </div>
        <div class="emp-salary-info">
          <div class="emp-salary-name">${getDisplayName(emp.name)} <span style="font-size:11px;background:#f1f3f4;padding:2px 6px;border-radius:4px;font-weight:600;">${emp.role||''}</span></div>
          <div class="emp-salary-role">${currentMonth.replace('-','年')}月 薪資</div>
        </div>
        <div class="emp-salary-total">$${total.toLocaleString()}</div>
        <div style="font-size:18px;color:var(--text-muted);">›</div>
      </div>
    </div>`;
  }).join('');
}

// 在 Modal 內更新欄位時，同步卡片總額
function updateFieldModal(empName, key, val) {
  let rec = getSalaryRecord(empName);
  const emp = empList.find(e => e.name === empName);
  if(!rec) { rec = buildDefaultRecord(emp); salaryData.records.push(rec); }
  rec[key] = parseFloat(val) || 0;
  const total = calcTotal(rec);
  // 更新 Modal 標題總額
  const el = document.getElementById('empModalTotal');
  if(el) el.textContent = `$${total.toLocaleString()}`;
  // 更新卡片列表總額
  const cards = document.querySelectorAll('.emp-salary-card');
  cards.forEach(card => {
    const nameEl = card.querySelector('.emp-salary-name');
    if(nameEl && nameEl.textContent.startsWith(empName)) {
      const totalEl = card.querySelector('.emp-salary-total');
      if(totalEl) totalEl.textContent = `$${total.toLocaleString()}`;
    }
  });
  // 重新計算衍生欄位（費率/扣款/加班費）
  if(['lateMinutes','otHours','baseSalary','fullAttendBase','fullAttendBonus','otBase'].includes(key)) {
    const rate = hourlyRate(rec);
    const otRate = parseFloat(rec.otBase || 0) > 0 ? parseFloat(rec.otBase) : rate;
    const rateEl = document.getElementById(`rate-0`);
    const lateEl = document.getElementById(`lateDeduct-0`);
    const otEl = document.getElementById(`otPay-0`);
    const otBaseEl = document.getElementById(`otBase-0`);
    if(rateEl) rateEl.textContent = `$${rate.toFixed(1)}/hr`;
    if(lateEl) lateEl.textContent = `-$${Math.round(rate/60*(rec.lateMinutes||0)).toLocaleString()}`;
    if(otEl) otEl.textContent = `+$${Math.ceil(otRate*(rec.otHours||0)*1.34).toLocaleString()}`;
    if(otBaseEl) otBaseEl.textContent = `$${Math.ceil(otRate).toLocaleString()}/hr`;
  }
  const totalEl = document.getElementById('total-0');
  if(totalEl) totalEl.textContent = `$${total.toLocaleString()}`;
  const subtotalEl = document.getElementById('subtotal-0');
  if(subtotalEl) {
    const role = rec.role;
    let subtotal = 0;
    if(role === ROLE_FULL) subtotal = parseFloat(rec.baseSalary||0)+parseFloat(rec.fullAttendBonus||0)+parseFloat(rec.roleBonus||0);
    else if(role === ROLE_MANAGER) subtotal = parseFloat(rec.baseSalary||0)+parseFloat(rec.fullAttendBonus||0)+['mgmtOps','mgmtQuality','mgmtKPI','mgmtAccount','mgmtLeader'].reduce((s,k)=>s+parseFloat(rec[k]||0),0);
    subtotalEl.textContent = `$${subtotal.toLocaleString()}`;
  }
  triggerAutoSave();
}

function getSalaryRecord(empName) {
  return salaryData.records.find(r => r.empName === empName);
}

function buildDefaultRecord(emp) {
  // 預設：從上月薪資帶入
  const prev = prevSalaryData.find(r => r.empName === emp.name) || {};
  const { totalH, otH } = calcEmpHours(emp.name);
  const base = {
    empName: emp.name,
    role: emp.role || ROLE_PART,
  };
  if(emp.role === ROLE_PART) {
    // 自動偵測國定假日出勤時數
    const holidays = getMonthHolidays(currentMonth);
    const [hcy, hcm] = currentMonth.split('-').map(Number);
    let autoHolidayH = 0;
    holidays.forEach(h => {
      const [hy, hm, hd] = h.date.split('-').map(Number);
      Object.entries(scheduleData).forEach(([ws, recs]) => {
        recs.forEach(r => {
          if(r.name !== emp.name) return;
          const wDates = getWeekDatesFromStr(ws);
          const dIdx = ['週一','週二','週三','週四','週五','週六','週日'].indexOf(r.day);
          if(dIdx < 0) return;
          const dateStr = wDates[dIdx];
          if(!dateStr) return;
          const [dm, dd] = dateStr.split('/').map(Number);
          if(dm === hm && dd === hd && r.shift && r.shift !== '排休' && r.shift !== '指休') {
            autoHolidayH += parseFloat(r.actualHours || 0);
          }
        });
      });
    });
    autoHolidayH = Math.round(autoHolidayH * 10) / 10;
    // 第一次填寫用自動偵測，之後帶上月
    const holidayHours = prev.holidayHours !== undefined ? prev.holidayHours : autoHolidayH;
    return {
      ...base,
      wage: prev.wage !== undefined ? prev.wage : (emp.wage || 0),
      roleBonus: prev.roleBonus !== undefined ? prev.roleBonus : 0,
      hours: totalH,
      holidayHours: holidayHours,
      extraHours: prev.extraHours !== undefined ? prev.extraHours : 0,
      laborInsurance: prev.laborInsurance !== undefined ? prev.laborInsurance : (emp.laborInsurance || 0),
      healthInsurance: prev.healthInsurance !== undefined ? prev.healthInsurance : (emp.healthInsurance || 0),
      hasDependent: prev.hasDependent !== undefined ? prev.hasDependent : (emp.hasDependent || false),
      laborPension: prev.laborPension !== undefined ? prev.laborPension : (emp.laborPension || 0),
    };
  } else if(emp.role === ROLE_FULL) {
    return {
      ...base,
      baseSalary: prev.baseSalary || emp.baseSalary || 0,
      fullAttendBase: prev.fullAttendBase !== undefined ? prev.fullAttendBase : (prev.fullAttendBonus || emp.fullAttendBonus || 0),
      fullAttendBonus: prev.fullAttendBonus !== undefined ? prev.fullAttendBonus : (emp.fullAttendBonus || 0),
      roleBonus: prev.roleBonus !== undefined ? prev.roleBonus : (emp.roleBonus || 0),
      lateMinutes: 0,
      otHours: otH,
      givenLeave: prev.givenLeave !== undefined ? prev.givenLeave : 0,
      laborInsurance: prev.laborInsurance !== undefined ? prev.laborInsurance : (emp.laborInsurance || 0),
      healthInsurance: prev.healthInsurance !== undefined ? prev.healthInsurance : (emp.healthInsurance || 0),
      hasDependent: prev.hasDependent !== undefined ? prev.hasDependent : (emp.hasDependent || false),
      laborPension: prev.laborPension !== undefined ? prev.laborPension : (emp.laborPension || 0),
      performance: prev.performance !== undefined ? prev.performance : 0,
      otherBonus: prev.otherBonus !== undefined ? prev.otherBonus : 0,
      otBase: prev.otBase !== undefined ? prev.otBase : 0, // 0=用費率公式
    };
  } else { // 店長
    return {
      ...base,
      baseSalary: prev.baseSalary || emp.baseSalary || 0,
      fullAttendBase: prev.fullAttendBase !== undefined ? prev.fullAttendBase : (prev.fullAttendBonus || 0),
      fullAttendBonus: prev.fullAttendBonus !== undefined ? prev.fullAttendBonus : 0,
      mgmtOps: prev.mgmtOps !== undefined ? prev.mgmtOps : 0,
      mgmtQuality: prev.mgmtQuality !== undefined ? prev.mgmtQuality : 0,
      mgmtKPI: prev.mgmtKPI !== undefined ? prev.mgmtKPI : 0,
      mgmtAccount: prev.mgmtAccount !== undefined ? prev.mgmtAccount : 0,
      mgmtLeader: prev.mgmtLeader !== undefined ? prev.mgmtLeader : 0,
      lateMinutes: 0,
      otHours: otH,
      givenLeave: prev.givenLeave !== undefined ? prev.givenLeave : 0,
      laborInsurance: prev.laborInsurance !== undefined ? prev.laborInsurance : (emp.laborInsurance || 0),
      healthInsurance: prev.healthInsurance !== undefined ? prev.healthInsurance : (emp.healthInsurance || 0),
      hasDependent: prev.hasDependent !== undefined ? prev.hasDependent : (emp.hasDependent || false),
      laborPension: prev.laborPension !== undefined ? prev.laborPension : (emp.laborPension || 0),
      performance: prev.performance !== undefined ? prev.performance : 0,
      otherBonus: prev.otherBonus !== undefined ? prev.otherBonus : 0,
      otBase: prev.otBase !== undefined ? prev.otBase : 0,
    };
  }
}

function renderSalaryForm(emp, rec, idx, readonly) {
  const ro = readonly;
  // 自動撈取值（從排班/計算，供 input 旁邊顯示原值）
  const { totalH, otH: autoOtH } = calcEmpHours(emp.name);
  const autoOtHours = autoOtH;
  const workedHolidays = detectHolidayWork(emp.name, currentMonth);
  const autoHolidayDays = workedHolidays.length;
  const rate = emp.role !== ROLE_PART ? hourlyRate(rec) : 0;
  const autoOtBase = Math.ceil(rate);

  // 取得特補休資料（從 leaveData 全域變數，若有的話）
  const leaveInfo = (typeof leaveDataMap !== 'undefined' && leaveDataMap[emp.name]) || {};
  const annualDays   = leaveInfo.annualDays   ?? '--';
  const usedAnnual   = leaveInfo.usedAnnual   ?? '--';
  const remainAnnual = (typeof annualDays === 'number' && typeof usedAnnual === 'number') ? annualDays - usedAnnual : '--';
  const earnedComp   = leaveInfo.earnedComp   ?? '--';
  const usedComp     = leaveInfo.usedComp     ?? '--';
  const remainComp   = (typeof earnedComp === 'number' && typeof usedComp === 'number') ? earnedComp - usedComp : '--';

  // inp：金額欄，有原值時顯示淡灰原值方便復原
  const inp = (key, val, label, autoVal) => {
    const hasOverride = autoVal !== undefined && parseFloat(val||0) !== parseFloat(autoVal||0) && parseFloat(autoVal||0) !== 0;
    const hintHtml = hasOverride ? `<span style="color:#94a3b8;font-size:11px;margin-left:4px;">(原:${autoVal})</span>` : '';
    if(ro) return `<div class="salary-row"><span class="salary-row-label">${label}</span><span class="salary-row-val">${parseFloat(val||0)>0?`$${parseFloat(val||0).toLocaleString()}`:'-'}</span></div>`;
    return `<div class="salary-row">
      <span class="salary-row-label">${label}${hintHtml}</span>
      <input class="salary-input" type="number" value="${parseFloat(val||0)||''}" placeholder="0"
        onchange="updateFieldModal('${emp.name}','${key}',this.value)">
    </div>`;
  };

  // inpNum：數字欄（工時/分鐘），有自動撈取值時顯示淡灰原值
  const inpNum = (key, val, label, unit, autoVal) => {
    const hasOverride = autoVal !== undefined && parseFloat(val||0) !== parseFloat(autoVal||0) && parseFloat(autoVal||0) !== 0;
    const hintHtml = hasOverride ? `<span style="color:#94a3b8;font-size:11px;margin-left:4px;">(自動:${autoVal}${unit})</span>` : '';
    if(ro) return `<div class="salary-row"><span class="salary-row-label">${label}</span><span class="salary-row-val">${parseFloat(val||0)||'-'}${parseFloat(val||0)?unit:''}</span></div>`;
    return `<div class="salary-row">
      <span class="salary-row-label">${label}${hintHtml}</span>
      <div style="display:flex;align-items:center;gap:4px;">
        <input class="salary-input" type="number" value="${parseFloat(val||0)||''}" placeholder="0"
          onchange="updateFieldModal('${emp.name}','${key}',this.value)" style="width:90px;">
        ${unit?`<span style="font-size:12px;color:var(--text-muted);">${unit}</span>`:''}
      </div>
    </div>`;
  };

  const total = calcTotal(rec);

  // ===== 考勤欄（右欄，所有職位共用）=====
  // 「國定假日時數」旁邊加打勾按鈕（國定假日上班已確認 → 寫入補休紀錄）
  const compChecked = rec.compConfirmed || false;
  const holidayDaysVal = parseFloat(rec.holidayDays ?? autoHolidayDays);
  const holidayDaysOverride = parseFloat(rec.holidayDays ?? 0) !== autoHolidayDays && autoHolidayDays > 0;

  const attendSection = `
    <div class="salary-section" style="background:#f0f4ff;border-radius:10px;padding:10px 12px;margin-top:10px;">
      <div class="salary-section-title" style="color:#1a73e8;">📋 考勤</div>
      <div class="salary-row">
        <span class="salary-row-label">特休可用天數</span>
        <span class="salary-row-val">${
          (() => {
            const batches = batchDataMap[emp.name]||[];
            const active = batches.filter(b=>!b.settled).reduce((a,b)=>a+Math.max(0,(b.days||0)-(b.used||0)),0);
            return active > 0 ? `<span style="color:var(--accent)">${active} 天</span>` : `${active} 天`;
          })()
        }</span>
      </div>
      <div class="salary-row">
        <span class="salary-row-label">遞延假天數</span>
        <span class="salary-row-val">${
          (() => {
            const carried = (batchDataMap[emp.name]||[]).filter(b=>b.carried&&!b.settled).reduce((a,b)=>a+Math.max(0,(b.days||0)-(b.used||0)),0);
            return carried > 0 ? `<span style="color:var(--warn);font-weight:800;">${carried} 天</span>` : '0 天';
          })()
        }</span>
      </div>
      <div class="salary-row">
        <span class="salary-row-label">剩餘補休天數</span>
        <span class="salary-row-val" style="color:${typeof remainComp==='number'&&remainComp>0?'var(--accent)':'var(--text-muted)'};">${remainComp}天</span>
      </div>

      ${(() => {
        // 遞延假結算（1月份且有遞延假）
        const carry = calcCarrySettlement(emp.name);
        if(carry.days > 0 && currentMonth.endsWith('-01')) {
          const settled = (batchDataMap[emp.name]||[]).filter(b=>b.carried&&!b.settled);
          const alreadySettled = settled.length === 0;
          return `<div style="background:#fff3e0;border-radius:8px;padding:10px;margin:8px 0;">
            <div style="font-size:12px;font-weight:800;color:#b45309;margin-bottom:6px;">⏰ 遞延假結算（去年 12/31）</div>
            ${carry.items.map(item=>`<div style="font-size:11px;color:var(--text-muted);">${item.label}：${item.days} 天 × $${carry.dailyWage}/天 = <b>$${item.amount.toLocaleString()}</b></div>`).join('')}
            <div style="font-size:12px;font-weight:800;margin-top:4px;">合計：${carry.days} 天 → <span style="color:#b45309;">$${carry.amount.toLocaleString()}</span></div>
            ${!ro&&!alreadySettled?`<button onclick="confirmCarrySettle('${emp.name}')"
              style="width:100%;margin-top:8px;padding:8px;background:#f9ab00;color:white;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;">
              ✅ 確認納入本月薪資
            </button>`:`<div style="font-size:11px;color:var(--accent);font-weight:700;margin-top:4px;">✅ 已結算</div>`}
          </div>`;
        }
        return '';
      })()}

      <div style="border-top:1px solid #e2e8f0;margin:6px 0;"></div>
      ${inpNum('otHours', rec.otHours, '平日加班時數', 'h', autoOtHours)}
      <div class="salary-row">
        <span class="salary-row-label">
          國定假日時數
          ${holidayDaysOverride?`<span style="color:#94a3b8;font-size:11px;">(自動:${autoHolidayDays}天)</span>`:''}
        </span>
        <div style="display:flex;align-items:center;gap:6px;">
          ${ro
            ? `<span class="salary-row-val">${holidayDaysVal}天</span>`
            : `<input class="salary-input" type="number" value="${holidayDaysVal||''}" placeholder="0"
                onchange="updateFieldModal('${emp.name}','holidayDays',this.value)" style="width:70px;">`
          }
          ${!ro ? `<button onclick="confirmCompEarned('${emp.name}')" title="確認補休發放"
            style="background:${compChecked?'var(--accent)':'#f1f3f4'};color:${compChecked?'white':'var(--text-muted)'};border:none;border-radius:8px;padding:6px 10px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;">
            ${compChecked?'✅ 已發補休':'☐ 發補休'}
          </button>` : (compChecked?`<span style="color:var(--accent);font-size:12px;font-weight:700;">✅已發</span>`:'')}
        </div>
      </div>
      ${inpNum('lateMinutes', rec.lateMinutes, '遲到分鐘數', 'min')}
      <div class="salary-row">
        <span class="salary-row-label">加班費計算基礎
          ${emp.role!==ROLE_PART&&parseFloat(rec.otBase||0)!==autoOtBase&&autoOtBase>0?`<span style="color:#94a3b8;font-size:11px;">(自動:$${autoOtBase})</span>`:''}
        </span>
        <span class="salary-row-val" style="font-size:12px;">$${autoOtBase}/hr</span>
      </div>
      ${emp.role === ROLE_PART ? `
      <div class="salary-row">
        <span class="salary-row-label">本月工讀時數 <span style="font-size:10px;background:#e8f0fe;color:var(--primary);padding:1px 4px;border-radius:3px;">自動</span></span>
        <span class="salary-row-val">${totalH}h</span>
      </div>` : ''}
      <div style="border-top:1px solid #e2e8f0;margin:6px 0;"></div>
      <div class="salary-row">
        <span class="salary-row-label">公司提撥退休金</span>

// ===== 應休/補休區塊 =====
function renderLeaveSection(empName, rec, idx, readonly) {
  const weekends = getMonthWeekendDays(currentMonth);
  const shouldRest = weekends.total; // 應休天數
  const actualOff = calcMonthOffDays(empName, currentMonth); // 已休天數
  const shortage = Math.max(0, shouldRest - actualOff); // 少休天數

  // 國定假日上班偵測
  const workedHolidays = detectHolidayWork(empName, currentMonth);
  const holidays = getMonthHolidays(currentMonth);

  // 給的補休（手動輸入）
  const givenLeave = parseFloat(rec.givenLeave || 0);
  const totalComp = shortage + workedHolidays.length; // 應給補休合計

  const shortageColor = shortage > 0 ? '#d93025' : '#34a853';
  const compColor = totalComp > 0 ? '#e67e22' : '#34a853';

  const inp_leave = readonly
    ? `<span style="font-weight:800;font-size:14px;">$${givenLeave}天</span>`
    : `<input class="salary-input" type="number" min="0" value="${givenLeave}"
        onchange="updateField('${empName}','givenLeave',this.value,${idx})"
        style="width:80px;">`;

  // 國定假日列表
  const [cy, cm] = currentMonth.split('-').map(Number);
  const wd_names = ['日','一','二','三','四','五','六'];
  const holidayList = holidays.map(h => {
    const d = new Date(h.date);
    const wd = wd_names[d.getDay()];
    const worked = workedHolidays.some(w => w.date === h.date);
    return `<span style="background:${worked?'#fce8e6':'#f1f3f4'};color:${worked?'#c0392b':'#64748b'};
      border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;white-space:nowrap;">
      ${cm}/${h.day}(${wd}) ${h.name}${worked?' 🔴上班':' ✅休假'}
    </span>`;
  }).join('');

  return `<div class="salary-section" style="background:#fffbf0;border:1px solid #fde68a;border-radius:10px;padding:12px;">
    <div class="salary-section-title" style="color:#92400e;">📋 本月應休 / 補休</div>

    <!-- 應休天數 -->
    <div class="salary-row">
      <span class="salary-row-label">本月應休天數</span>
      <span class="salary-row-val">${shouldRest}天
        <span style="font-size:11px;color:var(--text-muted);">（六${weekends.sat}+日${weekends.sun}）</span>
      </span>
    </div>
    <div class="salary-row">
      <span class="salary-row-label">已休天數</span>
      <span class="salary-row-val">${actualOff}天 <span style="font-size:10px;color:var(--text-muted);">自動</span></span>
    </div>
    <div class="salary-row">
      <span class="salary-row-label">少休天數</span>
      <span class="salary-row-val" style="color:${shortageColor};font-weight:900;">
        ${shortage > 0 ? `${shortage}天 ⚠️` : '0天 ✅'}
      </span>
    </div>

    <!-- 國定假日 -->
    ${holidays.length > 0 ? `
    <div style="margin:8px 0 4px;font-size:11px;font-weight:700;color:#92400e;">🎌 本月國定假日</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">${holidayList}</div>
    <div class="salary-row">
      <span class="salary-row-label">國定假日上班天數</span>
      <span class="salary-row-val" style="color:#c0392b;font-weight:900;">
        ${workedHolidays.length}天${workedHolidays.length > 0 ? ' → 應補休' : ''}
      </span>
    </div>` : ''}

    <!-- 應給補休合計 -->
    <div class="salary-row" style="border-top:1.5px solid #fde68a;margin-top:6px;padding-top:8px;">
      <span class="salary-row-label" style="font-weight:800;">應給補休合計</span>
      <span class="salary-row-val" style="color:${compColor};font-weight:900;">
        ${totalComp}天 ${shortage>0?`(少休${shortage}+國假${workedHolidays.length})`:''}
      </span>
    </div>
    <div class="salary-row">
      <span class="salary-row-label">本月給的補休天數</span>
      <div style="display:flex;align-items:center;gap:6px;">
        ${inp_leave}
        <span style="font-size:11px;color:var(--text-muted);">天（手動輸入）</span>
      </div>
    </div>
  </div>`;
}

// ===== 月曆生成 =====
function buildCalendarData(empName, role) {
  const [y, m] = currentMonth.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const dayNames = ['週一','週二','週三','週四','週五','週六','週日'];
  
  // 整理當月所有排班記錄
  const empRecs = {};
  Object.entries(scheduleData).forEach(([ws, recs]) => {
    recs.forEach(r => {
      if(r.name !== empName) return;
      // 找這筆記錄對應的日期
      const wDates = getWeekDatesFromStr(ws);
      const dIdx = dayNames.indexOf(r.day);
      if(dIdx < 0) return;
      const dateStr = wDates[dIdx]; // "4/1"
      if(!dateStr) return;
      const [dm, dd] = dateStr.split('/').map(Number);
      if(dm !== m) return; // 只要當月
      empRecs[dd] = r;
    });
  });
  return { empRecs, daysInMonth, firstWeekday: new Date(y, m-1, 1).getDay() };
}

function getWeekDatesFromStr(weekStr) {
  const [yr, wk] = weekStr.split('-W').map(Number);
  const d = new Date(yr, 0, 1);
  const day = d.getDay();
  d.setDate(d.getDate() + (wk-1)*7);
  const offset = day <= 4 ? 1-day : 8-day;
  d.setDate(d.getDate() + offset);
  const res = [];
  for(let i=0;i<7;i++){
    res.push(`${d.getMonth()+1}/${d.getDate()}`);
    d.setDate(d.getDate()+1);
  }
  return res;
}

function renderCalendar(empName, role) {
  const { empRecs, daysInMonth, firstWeekday } = buildCalendarData(empName, role);
  const [cy, cm] = currentMonth.split('-').map(Number);
  const isPartTime = role === ROLE_PART;
  const dayLabels = ['一','二','三','四','五','六','日'];
  // firstWeekday: 0=日,1=一,...
  // 轉換為週一開頭的偏移
  const startOffset = firstWeekday === 0 ? 6 : firstWeekday - 1;
  
  let totalH = 0, totalOT = 0, totalOff = 0, workDays = 0;
  
  const heads = dayLabels.map(d => `<div class="cal-head">${d}</div>`).join('');
  const empties = Array(startOffset).fill('<div class="cal-cell"></div>').join('');
  
  const cells = Array.from({length: daysInMonth}, (_, i) => {
    const d = i + 1;
    const rec = empRecs[d];
    const shift = rec?.shift || '';
    const h = parseFloat(rec?.actualHours || 0);
    const isOff = shift === '排休' || shift === '指休';
    const isOT = rec?.isOT || h > 8;
    const otH = isOT ? Math.max(0, h-8) : 0;
    
    if(isOff) { totalOff++; }
    else if(shift) { workDays++; totalH += h; totalOT += otH; }
    
    let cellClass = 'cal-cell';
    let valHtml = '';
    
    // 國定假日判斷
    const dateStr2 = `${String(cy).padStart(4,'0')}-${String(cm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const holiday = TW_HOLIDAYS[dateStr2];
    const isHoliday = !!holiday;

    if(isOff) {
      cellClass += ' leave';
      valHtml = `<div class="cal-cell-val">休</div>`;
    } else if(shift) {
      if(isOT && !isPartTime) {
        cellClass += ' ot';
        valHtml = isPartTime
          ? `<div class="cal-cell-val">${h}h</div>`
          : `<div class="cal-cell-val">班</div><div style="font-size:9px;color:var(--accent);font-weight:800;">+${Math.round(otH*10)/10}h</div>`;
      } else {
        cellClass += ' work';
        valHtml = isPartTime
          ? `<div class="cal-cell-val">${h}h</div>`
          : `<div class="cal-cell-val">✓</div>`;
      }
    }

    // 國定假日標記
    const holidayBadge = isHoliday
      ? `<div style="font-size:8px;color:#c0392b;font-weight:800;line-height:1;margin-top:1px;">假</div>`
      : '';

    return `<div class="${cellClass}" style="${isHoliday && !isOff ? 'border:1.5px solid #fca5a5;' : ''}${isHoliday && isOff ? 'background:#fce8e6;' : ''}">
      <div class="cal-cell-date" style="${isHoliday ? 'color:#c0392b;font-weight:900;' : ''}">${d}</div>
      ${valHtml}
      ${holidayBadge}
    </div>`;
  }).join('');
  
  const totalR = Math.round(totalH*10)/10;
  const totalOTR = Math.round(totalOT*10)/10;
  
  let summaryHtml = '';
  if(isPartTime) {
    summaryHtml = `
      <div class="cal-summary-item">⏱️ 總工時 ${totalR}h</div>
      <div class="cal-summary-item">📅 出勤 ${workDays}天</div>
      <div class="cal-summary-item" style="color:var(--danger);">😴 休假 ${totalOff}天</div>`;
  } else {
    summaryHtml = `
      <div class="cal-summary-item">📅 出勤 ${workDays}天</div>
      <div class="cal-summary-item" style="color:var(--danger);">😴 休假 ${totalOff}天</div>
      <div class="cal-summary-item" style="color:var(--accent);">⚡ 加班 ${totalOTR}h</div>`;
  }
  
  return `<div class="cal-wrap">
    <div class="cal-title">📅 ${currentMonth.replace('-','年')}月 出勤月曆</div>
    <div class="cal-grid">
      ${heads}${empties}${cells}
    </div>
    <div class="cal-summary">${summaryHtml}</div>
  </div>`;
}

// ===== 排班對照（店長/加盟主用）=====
function renderScheduleRef(empName, role) {
  const { empRecs, daysInMonth } = buildCalendarData(empName, role);
  const [y, m] = currentMonth.split('-').map(Number);
  const weekDayNames = ['日','一','二','三','四','五','六'];
  
  let rows = '';
  let totalH = 0, totalOT = 0, offCount = 0;
  
  for(let d = 1; d <= daysInMonth; d++) {
    const rec = empRecs[d];
    if(!rec) continue;
    const shift = rec.shift || '';
    if(!shift) continue;
    const h = parseFloat(rec.actualHours || 0);
    const isOff = shift === '排休' || shift === '指休';
    const isOT = rec.isOT || h > 8;
    const otH = isOT ? Math.max(0, h-8) : 0;
    const wd = weekDayNames[new Date(y, m-1, d).getDay()];
    
    if(isOff) { offCount++; }
    else { totalH += h; totalOT += otH; }
    
    rows += `<div class="sched-row">
      <span class="sched-date">${m}/${d}(${wd})</span>
      <span class="${isOff?'sched-off':'sched-shift'}">${isOff?'休假':shift}</span>
      ${!isOff ? `<span class="sched-hours">${h}h${isOT?` <span class="sched-ot">+${Math.round(otH*10)/10}h加班</span>`:''}</span>` : ''}
    </div>`;
  }
  
  return `<div class="schedule-ref">
    <div class="cal-title">🗓️ 班表對照</div>
    ${rows || '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">無排班記錄</div>'}
    <div class="cal-summary" style="margin-top:8px;">
      <div class="cal-summary-item">⏱️ 總工時 ${Math.round(totalH*10)/10}h</div>
      <div class="cal-summary-item" style="color:var(--danger);">😴 休假 ${offCount}天</div>
      <div class="cal-summary-item" style="color:var(--accent);">⚡ 加班 ${Math.round(totalOT*10)/10}h</div>
    </div>
  </div>`;
}

// ===== 自動儲存 =====
let autoSaveTimer = null;
function triggerAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => autoSaveDraft(), 2000);
  // 顯示儲存中提示
  const badge = document.getElementById('statusBadge');
  if(badge && salaryData.status === 'draft') {
    badge.textContent = '儲存中...';
    badge.style.opacity = '0.7';
  }
}

async function autoSaveDraft() {
  if(isReadonly()) return;
  collectRecords();
  try {
    await window.db.collection('stores').doc(currentStore).collection('salary').doc(currentMonth).set({
      ...salaryData,
      status: 'draft',
      updatedAt: new Date().toISOString(),
      updatedBy: currentUser.displayName || currentUser.empName
    });
    salaryData.status = 'draft';
    updateStatusBadge();
  } catch(e) {
    console.error('自動儲存失敗:', e);
  }
}

// updateField 保留（供薪資單 Modal 內部舊有邏輯使用）
// 新版 Modal 使用 updateFieldModal，但 renderInsuranceSection 仍傳 idx=0 給 updateField
function updateField(empName, key, val, cardIdx) {
  // 統一呼叫 updateFieldModal（Modal 版）
  updateFieldModal(empName, key, val);
}

// ===== 底部按鈕 =====
function renderBottomAction() {
  const el = document.getElementById('bottomAction');
  const s = salaryData.status || 'draft';
  const perm = currentUser.permission;

  if(!canEditSalary()) { el.style.display='none'; return; }
  el.style.display = 'flex';
  el.style.flexWrap = 'wrap';

  if(perm === 'manager' || perm === 'owner' || perm === 'admin') {
    const printBtn = canApprove() && s === 'published'
      ? `<button class="action-btn" style="background:#6366f1;color:white;" onclick="openPayslipModal()">🖨️ 薪資單</button>`
      : '';
    if(s === 'draft') {
      // 草稿：店長可送出
      el.innerHTML = `<button class="action-btn accent" onclick="submitSalary()">📤 送出薪資</button>`;
    } else if(s === 'submitted') {
      if(canApprove()) {
        // 加盟主：可修正儲存、審核發布、退回
        el.innerHTML = `<button class="action-btn" style="background:#e67e22;color:white;" onclick="rejectSalary()">↩️ 退回</button>
          <button class="action-btn primary" onclick="saveDraft()">✏️ 修正</button>
          <button class="action-btn accent" onclick="publishSalary()">✅ 發布</button>${printBtn}`;
      } else {
        // 店長：可收回（加盟主還沒審核前）
        el.innerHTML = `<button class="action-btn" style="background:#e67e22;color:white;" onclick="recallSalary()">↩️ 收回修改</button>`;
      }
    } else if(s === 'published') {
      if(canApprove()) {
        // 加盟主：已發布可退回重改
        el.innerHTML = `<button class="action-btn" style="background:#e67e22;color:white;" onclick="rejectSalary()">↩️ 退回重改</button>${printBtn}`;
      } else {
        el.innerHTML = `<button class="action-btn primary" disabled>✅ 已發布</button>`;
      }
    } else {
      el.innerHTML = `<button class="action-btn primary" disabled>等待審核中...</button>`;
    }
  }
}

// ===== 儲存/送出/發布 =====
function collectRecords() {
  // 確保所有員工都有記錄
  const emps = empList.filter(e => {
    if(e.role === ROLE_MANAGER) return canEditManagerSalary();
    return true;
  });
  emps.forEach(emp => {
    if(!getSalaryRecord(emp.name)) {
      salaryData.records.push(buildDefaultRecord(emp));
    }
  });
}

async function saveDraft() {
  collectRecords();
  showLoading('儲存中...');
  try {
    await window.db.collection('stores').doc(currentStore).collection('salary').doc(currentMonth).set({
      ...salaryData,
      status: 'draft',
      updatedAt: new Date().toISOString(),
      updatedBy: currentUser.displayName || currentUser.empName
    });
    salaryData.status = 'draft';
    updateStatusBadge();
    renderBottomAction();
    showToast('✅ 草稿已儲存');
  } catch(e) { showToast('❌ 儲存失敗：' + e.message); }
  hideLoading();
}

async function submitSalary() {
  if(!confirm(`確定送出 ${getMonthLabel(currentMonth)} 薪資？\n送出後需加盟主審核才能修改。`)) return;
  collectRecords();
  showLoading('送出中...');
  try {
    await window.db.collection('stores').doc(currentStore).collection('salary').doc(currentMonth).set({
      ...salaryData,
      status: 'submitted',
      submittedAt: new Date().toISOString(),
      submittedBy: currentUser.displayName || currentUser.empName
    });
    salaryData.status = 'submitted';
    updateStatusBadge();
    renderBottomAction();
    renderEmpList();
    showToast('✅ 薪資已送出，等待審核');
  } catch(e) { showToast('❌ 送出失敗：' + e.message); }
  hideLoading();
}

async function publishSalary() {
  if(!confirm(`確定發布 ${getMonthLabel(currentMonth)} 薪資？\n發布後員工可查看。`)) return;
  collectRecords();
  showLoading('發布中...');
  try {
    await window.db.collection('stores').doc(currentStore).collection('salary').doc(currentMonth).set({
      ...salaryData,
      status: 'published',
      publishedAt: new Date().toISOString(),
      publishedBy: currentUser.displayName || currentUser.empName
    });
    salaryData.status = 'published';
    updateStatusBadge();
    renderBottomAction();
    renderEmpList();
    showToast('✅ 薪資已發布');
  } catch(e) { showToast('❌ 發布失敗：' + e.message); }
  hideLoading();
}

// ===== 初始化 =====
window.onload = async () => {
  showLoading('驗證登入狀態...');
  const saved = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
  if(!saved) { window.location.replace('home.html'); return; }
  try { currentUser = JSON.parse(saved); } catch(e) { window.location.replace('home.html'); return; }

  showLoading('載入系統設定...');
  try {
    const cachedConfig = localStorage.getItem('appConfig');
    if(cachedConfig) try { appConfig = JSON.parse(cachedConfig); } catch(e) {}
    try {
      const snap = await Promise.race([
        window.db.collection('settings').doc('globalConfig').get(),
        new Promise((_,rej) => setTimeout(()=>rej(new Error('timeout')),5000))
      ]);
      if(snap.exists) { appConfig = snap.data(); localStorage.setItem('appConfig', JSON.stringify(appConfig)); }
    } catch(e) {}

    // 月份：10號後→當月，10號前→上月
    const now = new Date();
    let targetM, targetY;
    if(now.getDate() >= 10) {
      targetM = now.getMonth() + 1;
      targetY = now.getFullYear();
    } else {
      targetM = now.getMonth() === 0 ? 12 : now.getMonth();
      targetY = now.getMonth() === 0 ? now.getFullYear()-1 : now.getFullYear();
    }
    currentMonth = `${targetY}-${String(targetM).padStart(2,'0')}`;
    document.getElementById('monthLabel').textContent = getMonthLabel(currentMonth);

    // 門市選擇器
    const sel = document.getElementById('storeSelector');
    (appConfig.stores || []).forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`);

    // 加盟主以上顯示門市選擇器
    if(canApprove() && (appConfig.stores||[]).length > 1) {
      sel.style.display = 'block';
    }
    currentStore = currentUser.store || appConfig.stores[0] || '';
    sel.value = currentStore;

    // 確認 currentStore 有值
    if(!currentStore) {
      hideLoading();
      alert('無法取得門市資料，請返回首頁重新登入');
      window.location.replace('home.html');
      return;
    }

    document.getElementById('appShell').classList.add('active');
    updateHeaderInfo();
    // ✅ 預覽模式：需同時滿足 sessionStorage 有 isPreviewMode=1
    // 且 sessionStorage 的 currentUser permission 與 localStorage 不同
    let isPreview = false;
    if(sessionStorage.getItem('isPreviewMode') === '1') {
      const realStr  = localStorage.getItem('currentUser');
      const sessStr  = sessionStorage.getItem('currentUser');
      if(realStr && sessStr) {
        try {
          const real = JSON.parse(realStr);
          const sess = JSON.parse(sessStr);
          isPreview = real.permission !== sess.permission;
        } catch(e) {}
      }
    }
    const previewBanner = document.getElementById('salaryPreviewBanner');
    if(previewBanner) previewBanner.style.display = isPreview ? 'block' : 'none';
    hideLoading();
    await loadSalaryData();
  } catch(e) {
    hideLoading();
    alert('載入失敗：' + e.message);
  }
};

if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/store-schedule/sw.js')
      .then(reg => {
        console.log('[PWA] Service Worker 已註冊');
        // 有新版本時提示用戶
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // 有新版本，靜默更新
              newWorker.postMessage('SKIP_WAITING');
              window.location.reload();
            }
          });
        });
      })
      .catch(err => console.warn('[PWA] SW 註冊失敗:', err));
  });
}
</script>
