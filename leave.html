<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--accent:#34a853;
  --danger:#d93025;--warn:#f9ab00;--bg:#f0f4ff;
  --text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;
  --header-h:56px;--radius:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--text);}

/* Loading */
#loadingOverlay{display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#1a73e8,#0d47a1);z-index:99999;flex-direction:column;justify-content:center;align-items:center;color:white;transition:opacity 0.4s;}
#loadingOverlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingText{font-size:14px;font-weight:600;opacity:0.9;}

/* App Shell */
#appShell{display:none;flex-direction:column;height:100%;}
#appShell.active{display:flex;}

/* Header */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:0 16px;height:var(--header-h);display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(26,115,232,0.3);}
.header-back{background:rgba(255,255,255,0.2);border:none;color:white;width:34px;height:34px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.header-title{font-size:17px;font-weight:800;flex:1;}
.header-badge{background:rgba(255,255,255,0.2);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;}

/* Tab Bar */
.tab-bar{display:flex;background:white;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-item{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;}
.tab-item.active{color:var(--primary);border-bottom-color:var(--primary);}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px;}

/* Summary Cards */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.summary-card{background:white;border-radius:var(--radius);padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.summary-card-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px;}
.summary-card-val{font-size:26px;font-weight:900;}
.summary-card-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.summary-card.annual{border-top:4px solid var(--primary);}
.summary-card.comp{border-top:4px solid var(--accent);}

/* Emp List */
.emp-leave-card{background:white;border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}
.emp-leave-header{display:flex;align-items:center;padding:14px 16px;gap:10px;}
.emp-avatar{width:40px;height:40px;border-radius:12px;color:white;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.emp-leave-info{flex:1;}
.emp-leave-name{font-size:15px;font-weight:800;}
.emp-leave-role{font-size:11px;color:var(--text-muted);font-weight:600;}
.leave-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.leave-chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;}
.leave-chip.annual{background:#e8f0fe;color:var(--primary);}
.leave-chip.comp{background:#e8f5e9;color:var(--accent);}
.leave-chip.warn{background:#fce8e6;color:var(--danger);}

/* Detail View */
.detail-month-nav{display:flex;align-items:center;gap:8px;background:white;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.detail-month-btn{background:#f1f3f4;border:none;border-radius:8px;padding:6px 12px;font-size:14px;font-weight:700;cursor:pointer;}
.detail-month-label{flex:1;text-align:center;font-size:15px;font-weight:800;color:var(--primary);}

.log-item{background:white;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.log-item-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.log-type-badge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;}
.log-type-badge.earn{background:#e8f5e9;color:#2e7d32;}
.log-type-badge.use{background:#fce8e6;color:#c62828;}
.log-type-badge.encash{background:#fff3e0;color:#e65100;}
.log-type-badge.cancel{background:#f3e5f5;color:#6a1b9a;}
.log-date{font-size:12px;color:var(--text-muted);font-weight:600;}
.log-days{font-size:16px;font-weight:900;margin-left:auto;}
.log-days.earn{color:var(--accent);}
.log-days.use{color:var(--danger);}
.log-note{font-size:12px;color:var(--text-muted);margin-top:2px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.active{opacity:1;pointer-events:all;}
.modal-box{background:white;border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:20px 20px 32px;max-height:88vh;overflow-y:auto;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:18px;font-weight:900;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:16px;}
.form-field{margin-bottom:14px;}
.form-field label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px;}
.form-field input,.form-field select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;outline:none;background:#f8fafc;}
.form-field input:focus,.form-field select:focus{border-color:var(--primary);background:white;}
.modal-action{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;}
.modal-cancel{width:100%;padding:10px;background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;margin-top:6px;}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Hire date setup */
.setup-card{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:2px solid var(--warn);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.setup-card-title{font-size:14px;font-weight:800;color:#e65100;margin-bottom:6px;}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}

/* Info rows */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-label{font-weight:600;color:var(--text-muted);}
.info-val{font-weight:800;}

/* Stat bar */
.stat-bar-wrap{background:#f8fafc;border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.stat-bar-title{font-size:12px;font-weight:800;color:var(--text-muted);margin-bottom:8px;}
.stat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.stat-bar-label{font-size:12px;font-weight:700;width:80px;flex-shrink:0;}
.stat-bar-track{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.stat-bar-fill.annual{background:var(--primary);}
.stat-bar-fill.comp{background:var(--accent);}
.stat-bar-num{font-size:12px;font-weight:800;width:50px;text-align:right;}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><div id="loadingText">載入特補休資料...</div></div>

<div id="appShell">
  <div class="header">
    <button class="header-back" onclick="handleBack()">←</button>
    <div class="header-title" id="headerTitle">🏖️ 特補休管理</div>
    <div class="header-badge" id="headerBadge">--</div>
  </div>

  <!-- Tab：管理者看員工列表；員工直接看個人 -->
  <div class="tab-bar" id="tabBar" style="display:none;">
    <div class="tab-item active" id="tab-overview" onclick="switchTab('overview')">📊 總覽</div>
    <div class="tab-item" id="tab-detail" onclick="switchTab('detail')">📋 明細</div>
  </div>

  <div class="content" id="mainContent"></div>
</div>

<!-- ===== 員工明細 Modal（管理者點進員工後）===== -->
<div class="modal-overlay" id="empDetailModal" onclick="if(event.target===this)closeModal('empDetailModal')">
  <div class="modal-box" style="max-height:92vh;">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <div style="flex:1;">
        <div class="modal-title" id="empDetailName" style="margin-bottom:0;"></div>
        <div style="font-size:12px;color:var(--text-muted);font-weight:600;" id="empDetailRole"></div>
      </div>
      <button onclick="closeModal('empDetailModal')" style="background:#f1f3f4;border:none;border-radius:10px;padding:6px 10px;cursor:pointer;">✕</button>
    </div>
    <!-- 概況條 -->
    <div id="empDetailSummary"></div>
    <!-- 月份切換 -->
    <div style="display:flex;align-items:center;gap:8px;margin:12px 0 8px;">
      <button class="detail-month-btn" onclick="empDetailChangeMonth(-1)">‹</button>
      <div class="detail-month-label" id="empDetailMonthLabel">--</div>
      <button class="detail-month-btn" onclick="empDetailChangeMonth(1)">›</button>
    </div>
    <div id="empDetailLogs"></div>
    <!-- 店長以上：手動新增 -->
    <div id="empDetailAddBtn" style="display:none;margin-top:12px;">
      <button onclick="openAddLogModal()" class="modal-action" style="background:var(--accent);">➕ 手動新增紀錄</button>
    </div>
  </div>
</div>

<!-- ===== 首次建檔 Modal（輸入到職日）===== -->
<div class="modal-overlay" id="hireDateModal" onclick="if(event.target===this)closeModal('hireDateModal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">📅 設定到職日</div>
    <div class="modal-sub" id="hireDateModalSub">首次建檔需輸入到職日，系統將自動建議年度特休天數。</div>
    <div class="form-field">
      <label>員工姓名</label>
      <input type="text" id="hireDateEmpName" readonly style="background:#f1f3f4;">
    </div>
    <div class="form-field">
      <label>到職日期</label>
      <input type="date" id="hireDateInput" max="">
    </div>
    <div id="hireDatePreview" style="background:#e8f0fe;border-radius:10px;padding:12px;font-size:13px;line-height:1.8;margin-bottom:8px;display:none;"></div>
    <!-- 手動確認或修改本年度特休 -->
    <div class="form-field" id="manualDaysWrap" style="display:none; margin-top:8px;">
      <label style="color:var(--primary); font-size:12px;">👉 手動確認本年度特休天數</label>
      <input type="number" id="manualAnnualDays" min="0" step="0.5" style="border-color:var(--primary); background:#f0f4ff; font-size:16px; font-weight:900;">
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">系統已帶入上方試算的建議值，店長可視公司規定自行微調。未來每年第一次發放時均可手動輸入。</div>
    </div>
    <button class="modal-action" onclick="saveHireDate()">確認建檔</button>
    <button class="modal-cancel" onclick="closeModal('hireDateModal')">取消</button>
  </div>
</div>

<!-- ===== 手動新增/編輯紀錄 Modal（店長以上）===== -->
<div class="modal-overlay" id="addLogModal" onclick="if(event.target===this)closeModal('addLogModal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="addLogTitle">手動新增紀錄</div>
    <div class="form-field">
      <label>類型</label>
      <select id="addLogType" onchange="onAddLogTypeChange()">
        <option value="annual_earn">特休 — 取得</option>
        <option value="annual_use">特休 — 使用</option>
        <option value="comp_earn">補休 — 取得</option>
        <option value="comp_use">補休 — 使用</option>
      </select>
    </div>
    <div class="form-field">
      <label>日期</label>
      <input type="date" id="addLogDate">
    </div>
    <div class="form-field">
      <label>天數</label>
      <input type="number" id="addLogDays" min="0.5" step="0.5" placeholder="例：1">
    </div>
    <div class="form-field">
      <label>備註</label>
      <input type="text" id="addLogNote" placeholder="例：年度特休發放、國定假日補休...">
    </div>
    <div id="addLogWarn" style="display:none;background:#fce8e6;border-radius:8px;padding:10px;font-size:13px;color:var(--danger);margin-bottom:8px;font-weight:600;"></div>
    
    <!-- 遞延特休 SOP 提示 -->
    <div style="font-size:11px; color:var(--text-muted); background:#f8fafc; padding:10px; border-radius:8px; margin-bottom:12px; line-height:1.6;">
      💡 <b>遞延特休操作提示：</b><br>
      若需結轉去年未休完的特休至今年，請選擇「特休 — 取得」，日期填寫今年的 1/1，並於備註註明「去年度遞延特休」。
    </div>

    <button class="modal-action" id="saveLogBtn" onclick="saveLog()">確認新增</button>
    <button id="deleteLogBtn" style="width:100%;padding:10px;background:#fce8e6;color:var(--danger);border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-top:8px;display:none;" onclick="deleteLog()">🗑️ 刪除此紀錄</button>
    <button class="modal-cancel" onclick="closeModal('addLogModal')">取消</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== 全域狀態 =====
let currentUser = null;
let appConfig = { stores: [] };
let currentStore = '';
let currentYear = new Date().getFullYear().toString();
let empList = [];
let leaveDataAll = {}; // { empName: { annualDays, usedAnnual, earnedComp, usedComp, hireDate } }
let currentTab = 'overview';
let currentViewEmp = null;  // 目前查看的員工（管理者點入）
let empDetailMonth = '';    // 明細頁月份
let currentEditLog = null;  // 目前正在編輯的紀錄

// ===== 權限判斷 =====
const isAdmin   = () => ['owner','admin'].includes(currentUser?.permission);
const isManager = () => ['manager','owner','admin'].includes(currentUser?.permission);
const isSelf    = (empName) => currentUser?.empName === empName;

// ===== 工具函式 =====
function showLoading(msg){ document.getElementById('loadingText').textContent=msg||'載入中...'; document.getElementById('loadingOverlay').classList.remove('hidden'); document.getElementById('loadingOverlay').style.display='flex'; }
function hideLoading(){ document.getElementById('loadingOverlay').classList.add('hidden'); setTimeout(()=>{ document.getElementById('loadingOverlay').style.display='none'; },400); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }

function getCurrentYM(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function getMonthLabel(ym){ const[y,m]=ym.split('-'); return `${y}年${parseInt(m)}月`; }
function getPrevYM(ym){ const[y,m]=ym.split('-').map(Number); if(m===1)return `${y-1}-12`; return `${y}-${String(m-1).padStart(2,'0')}`; }
function getNextYM(ym){ const[y,m]=ym.split('-').map(Number); if(m===12)return `${y+1}-01`; return `${y}-${String(m+1).padStart(2,'0')}`; }

function handleBack(){
  if(window.history.length>1) window.history.back();
  else window.location.href='home.html';
}

// ===== Tab 切換 =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`)?.classList.add('active');
  renderCurrentTab();
}

function renderCurrentTab() {
  if(currentTab === 'overview') renderOverview();
  else renderMyDetail();
}

// ===== 初始化 =====
window.onload = async () => {
  showLoading('驗證登入狀態...');
  const saved = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
  if(!saved){ window.location.replace('home.html'); return; }
  try{ currentUser = JSON.parse(saved); } catch(e){ window.location.replace('home.html'); return; }

  showLoading('載入設定...');
  try{
    const cached = localStorage.getItem('appConfig');
    if(cached) try{ appConfig=JSON.parse(cached); }catch(e){}
    try{
      const snap = await Promise.race([
        window.db.collection('settings').doc('globalConfig').get(),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),5000))
      ]);
      if(snap.exists){ appConfig=snap.data(); localStorage.setItem('appConfig',JSON.stringify(appConfig)); }
    }catch(e){}

    currentStore = currentUser.store || appConfig.stores?.[0] || '';
    document.getElementById('headerBadge').textContent = currentStore;
    document.getElementById('hireDateInput').max = new Date().toISOString().split('T')[0];

    // 管理者：顯示 tab，讀所有員工；員工：直接看個人
    if(isManager()) {
      document.getElementById('tabBar').style.display = 'flex';
      await loadAllEmpLeave();
    } else {
      // 員工：隱藏 tab，直接顯示個人總覽+明細
      document.getElementById('tabBar').style.display = 'none';
      empDetailMonth = getCurrentYM();
      await loadMyLeave();
    }

    document.getElementById('appShell').classList.add('active');
    hideLoading();
  }catch(e){
    hideLoading();
    alert('載入失敗：'+e.message);
  }
};

// ===== 讀取所有員工特補休資料（管理者用）=====
async function loadAllEmpLeave() {
  showLoading('讀取員工特補休...');
  try{
    const empSnap = await window.db.collection('stores').doc(currentStore).collection('employees').get();
    empList = [];
    empSnap.forEach(d => {
      if(!['離職','調走'].includes(d.data().status)) empList.push({ name:d.id, ...d.data() });
    });
    empList.sort((a,b) => (a.sortKey||0)-(b.sortKey||0));

    leaveDataAll = {};
    await Promise.all(empList.map(emp =>
      window.db.collection('employees').doc(emp.name).collection('leaves').doc(currentYear).get()
        .then(snap => { leaveDataAll[emp.name] = snap.exists ? snap.data() : null; })
        .catch(()=>{ leaveDataAll[emp.name]=null; })
    ));

    renderOverview();
  }catch(e){ showToast('讀取失敗：'+e.message); }
  hideLoading();
}

// ===== 讀取個人特補休（員工用）=====
async function loadMyLeave() {
  showLoading('讀取特補休資料...');
  const empName = currentUser.empName;
  try{
    const snap = await window.db.collection('employees').doc(empName).collection('leaves').doc(currentYear).get();
    leaveDataAll[empName] = snap.exists ? snap.data() : null;
    empList = [{ name:empName, role:currentUser.permission==='manager'?'店長':currentUser.role||'工讀' }];
    renderMyDetail();
  }catch(e){ showToast('讀取失敗：'+e.message); }
  hideLoading();
}

// ===== 渲染：總覽（管理者）=====
function renderOverview() {
  const el = document.getElementById('mainContent');
  let html = '';

  empList.forEach(emp => {
    const data = leaveDataAll[emp.name];
    const needSetup = !data || !data.hireDate;
    const annualDays  = data?.annualDays  ?? 0;
    const usedAnnual  = data?.usedAnnual  ?? 0;

async function loadDetailLogs(empName, ym, targetElId) {
  const el = document.getElementById(targetElId);
  if(!el) return;
  el.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">讀取中...</div>`;
  try{
    const snap = await window.db.collection('employees').doc(empName).collection('leaveLog').doc(ym).get();
    const logs = (snap.exists && snap.data().records) ? snap.data().records : [];
    if(!logs.length){
      el.innerHTML = `<div class="empty-state" style="padding:20px 0;"><div style="font-size:32px;margin-bottom:8px;">📭</div><div>本月無紀錄</div></div>`;
      return;
    }
    // 依日期排序（新到舊）
    const sorted = [...logs].sort((a,b) => (b.date||'').localeCompare(a.date||''));
    el.innerHTML = sorted.map(log => renderLogItem(log)).join('');
  }catch(e){
    el.innerHTML = `<div style="text-align:center;padding:16px;color:var(--danger);">讀取失敗</div>`;
  }
}

function renderLogItem(log) {
  const typeMap = {
    annual_earn: { label:'特休取得', cls:'earn', sign:'+' },
    annual_use:  { label:'特休使用', cls:'use',  sign:'-' },
    comp_earn:   { label:'補休取得', cls:'earn', sign:'+' },
    comp_use:    { label:'補休使用', cls:'use',  sign:'-' },
    annual_encash: { label:'特休折現', cls:'encash', sign:'$' },
    comp_encash:   { label:'補休折現', cls:'encash', sign:'$' },
    comp_cancel:   { label:'補休取消', cls:'cancel', sign:'-' },
  };
  const t = typeMap[log.type] || { label:log.type, cls:'earn', sign:'+' };
  const isEncash = log.type?.includes('encash');
  const valStr = isEncash
    ? `$${(log.amount||0).toLocaleString()}`
    : `${t.sign}${log.days}天`;

  // 避免文字內容造成 JSON.parse 錯誤
  const logStr = encodeURIComponent(JSON.stringify(log));

  return `<div class="log-item">
    <div class="log-item-header">
      <span class="log-type-badge ${t.cls}">${t.label}</span>
      <span class="log-date">${log.date||''}</span>
      <span class="log-days ${t.cls}">${valStr}</span>
    </div>
    ${log.note ? `<div class="log-note">📝 ${log.note}</div>` : ''}
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:4px;">
      ${log.savedBy ? `<div class="log-note" style="margin-top:0;">👤 ${log.savedBy}</div>` : '<div></div>'}
      ${isManager() ? `<button onclick="openEditLogModal('${logStr}')" style="background:none;border:none;color:var(--primary);font-size:12px;font-weight:700;cursor:pointer;padding:4px 0;">✏️ 編輯</button>` : ''}
    </div>
  </div>`;
}

// ===== 到職日 Modal =====
function openHireDateModal(empName) {
  document.getElementById('hireDateEmpName').value = empName;
  const data = leaveDataAll[empName];
  const inputEl = document.getElementById('hireDateInput');
  inputEl.oninput = previewAnnualDays;
  
  if(data?.hireDate) {
    inputEl.value = data.hireDate;
    previewAnnualDays(); // 如果已經有到職日，直接觸發試算
  } else {
    inputEl.value = '';
    document.getElementById('hireDatePreview').style.display = 'none';
    document.getElementById('manualDaysWrap').style.display = 'none';
  }
  openModal('hireDateModal');
}

function previewAnnualDays() {
  const hireDateStr = document.getElementById('hireDateInput').value;
  const el = document.getElementById('hireDatePreview');
  const manualWrap = document.getElementById('manualDaysWrap');
  const manualInput = document.getElementById('manualAnnualDays');

  if(!hireDateStr){ el.style.display='none'; manualWrap.style.display='none'; return; }

  const hire = new Date(hireDateStr);
  const targetY = parseInt(currentYear);
  const yearStart = new Date(targetY, 0, 1);
  const yearEnd = new Date(targetY, 11, 31);

  // 特休級距表
  function getTier(years) {
    if (years === 0.5) return 3;
    if (years === 1) return 7;
    if (years === 2) return 10;
    if (years === 3 || years === 4) return 14;
    if (years >= 5 && years < 10) return 15;
    if (years >= 10) return Math.min(30, 15 + (years - 9));
    return 0;
  }

  let totalDays = 0;
  let detailTexts = [];
  let lateYearHint = '';

  // 找出該年度可能會跨越的年資里程碑 (前一年、當年、後一年)
  const ageY = targetY - hire.getFullYear();
  const tiersToCheck = [0.5, ageY - 1, ageY, ageY + 1].filter(y => y >= 0.5);
  const uniqueTiers = [...new Set(tiersToCheck)].sort((a,b)=>a-b);

  uniqueTiers.forEach(tier => {
    // 該階層的生效起日
    let startD = new Date(hire);
    if (tier === 0.5) startD.setMonth(startD.getMonth() + 6);
    else startD.setFullYear(startD.getFullYear() + tier);

    // 該階層的生效迄日 (前一天)
    let endD = new Date(startD);
    if (tier === 0.5) endD.setMonth(endD.getMonth() + 6);
    else endD.setFullYear(endD.getFullYear() + 1);
    endD.setDate(endD.getDate() - 1);

    // 檢查這段有效期與「目標年度」重疊了幾天
    let overlapStart = startD > yearStart ? startD : yearStart;
    let overlapEnd = endD < yearEnd ? endD : yearEnd;

    if (overlapStart <= overlapEnd) {
      let overlapDays = Math.round((overlapEnd - overlapStart) / 86400000) + 1;
      let daysInTier = Math.round((endD - startD) / 86400000) + 1;
      let tierDays = getTier(tier);
      
      let portion = (tierDays * overlapDays / daysInTier);
      let label = tier === 0.5 ? '滿半年(3天)' : `滿${tier}年(${tierDays}天)`;
      detailTexts.push(`・${label}：涵蓋 ${overlapDays} 天，折算 <b style="color:var(--primary);">${portion.toFixed(2)}</b> 天`);
      totalDays += portion;

      // 檢查是否取得日落在 10, 11, 12 月（未滿 3 個月）
      if (startD.getFullYear() === targetY && startD.getMonth() >= 9) {
        lateYearHint = `<div style="font-size:11px;color:#c0392b;margin-top:4px;font-weight:700;">💡 提醒：該員工於 ${startD.getMonth()+1} 月取得特休（距年底未滿3個月），若依公司規定可延至隔年底，請於年底確認未休完天數，並於隔年1/1使用「手動新增」將其結轉。</div>`;
      }
    }
  });

  // 公司規則：直接進位到個位數 (Math.ceil 無條件進位)
  let suggested = Math.ceil(totalDays); 

  el.style.display = 'block';
  el.innerHTML = `
    <div style="font-weight:800;color:var(--primary);margin-bottom:4px;">📊 曆年制比例算法（${targetY}年度）</div>
    ${detailTexts.length > 0 ? detailTexts.join('<br>') : '・本年度尚無生效之特休'}
    <div style="margin-top:6px;padding-top:6px;border-top:1px dashed #abc4ff;font-weight:700;">
      法規比例合計：<span style="color:#e65100;font-size:15px;">${totalDays.toFixed(2)}</span> 天 ➔ 
      直接進位：<span style="color:var(--primary);font-size:16px;font-weight:900;">${suggested}</span> 天
    </div>
    ${lateYearHint}
  `;

  // 顯示手動輸入框，並帶入進位後的建議值
  manualWrap.style.display = 'block';
  manualInput.value = suggested; 
}

async function saveHireDate() {
  const empName = document.getElementById('hireDateEmpName').value;
  const hireDate = document.getElementById('hireDateInput').value;
  // 從手動輸入框讀取天數
  const annualDays = parseFloat(document.getElementById('manualAnnualDays').value || 0);

  if(!hireDate){ showToast('⚠️ 請輸入到職日'); return; }
  showLoading('儲存中...');
  try{
    const leaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(currentYear);
    const snap = await leaveRef.get();
    const existing = snap.exists ? snap.data() : {};
    await leaveRef.set({
      ...existing,
      hireDate,
      annualDays,
      usedAnnual: existing.usedAnnual || 0,
      earnedComp: existing.earnedComp || 0,
      usedComp:   existing.usedComp   || 0,
      store: currentStore,
      updatedAt: new Date().toISOString(),
    });
    // 寫入年度特休取得紀錄（若為首次建檔或重新調整額度）
    const logRef = window.db.collection('employees').doc(empName).collection('leaveLog').doc(`${currentYear}-01`);
    await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
      date: `${currentYear}-01-01`, type: 'annual_earn', days: annualDays,
      note: `${currentYear} 年度特休發放（到職日：${hireDate}）`,
      savedBy: currentUser.displayName || currentUser.empName,
      id: Date.now().toString()
    })}, { merge: true });
    
    leaveDataAll[empName] = { ...existing, hireDate, annualDays, usedAnnual:existing.usedAnnual||0, earnedComp:existing.earnedComp||0, usedComp:existing.usedComp||0 };
    closeModal('hireDateModal');
    showToast(`✅ ${empName} 到職日已設定，${currentYear}年特休 ${annualDays} 天`);
    // 更新畫面
    if(isManager()) { renderOverview(); await openEmpDetail(empName); }
    else renderMyDetail();
  }catch(e){ showToast('❌ 儲存失敗：'+e.message); }
  hideLoading();
}

  const type  = document.getElementById('addLogType').value;
  const date  = document.getElementById('addLogDate').value;
  const days  = parseFloat(document.getElementById('addLogDays').value || 0);
  const note  = document.getElementById('addLogNote').value.trim();
  if(!date){ showToast('⚠️ 請選擇日期'); return; }
  if(days <= 0){ showToast('⚠️ 天數必須大於 0'); return; }

  // 防呆：使用不能超過剩餘
  const data = leaveDataAll[empName] || {};
  let remainAnn = Math.max(0,(data.annualDays||0)-(data.usedAnnual||0));
  let remainComp = Math.max(0,(data.earnedComp||0)-(data.usedComp||0));
  
  // 如果是編輯模式，先把原本扣掉的天數加回來做驗證
  if(currentEditLog) {
    if(currentEditLog.type === 'annual_use') remainAnn += currentEditLog.days;
    if(currentEditLog.type === 'comp_use') remainComp += currentEditLog.days;
  }

  if(type === 'annual_use' && days > remainAnn){ showToast(`⚠️ 剩餘特休僅 ${remainAnn} 天，無法使用 ${days} 天`); return; }
  if(type === 'comp_use' && days > remainComp){ showToast(`⚠️ 剩餘補休僅 ${remainComp} 天，無法使用 ${days} 天`); return; }

  showLoading('儲存中...');
  try{
    const ym = date.slice(0, 7); // "YYYY-MM"
    const year = date.slice(0, 4);
    
    const newLog = {
      date, type, days, note: note || '',
      savedBy: currentUser.displayName || currentUser.empName,
      id: currentEditLog ? (currentEditLog.id || Date.now().toString()) : Date.now().toString()
    };

    if (currentEditLog) {
      // ===== 編輯模式 =====
      const oldYm = currentEditLog.date.slice(0, 7);
      const oldYear = currentEditLog.date.slice(0, 4);
      
      // 1. 從舊的月份移除舊紀錄
      await window.db.collection('employees').doc(empName).collection('leaveLog').doc(oldYm).update({
        records: firebase.firestore.FieldValue.arrayRemove(currentEditLog)
      });

      // 2. 處理總帳更新
      if (oldYear !== year) {
        // 如果跨年編輯，先扣回舊年份的總帳，再加到新年份
        const oldLeaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(oldYear);
        const oldSnap = await oldLeaveRef.get();
        let oldLd = oldSnap.exists ? oldSnap.data() : { annualDays:0, usedAnnual:0, earnedComp:0, usedComp:0 };
        if(currentEditLog.type === 'annual_earn') oldLd.annualDays  = Math.max(0, (oldLd.annualDays  || 0) - currentEditLog.days);
        if(currentEditLog.type === 'annual_use')  oldLd.usedAnnual  = Math.max(0, (oldLd.usedAnnual  || 0) - currentEditLog.days);
        if(currentEditLog.type === 'comp_earn')   oldLd.earnedComp  = Math.max(0, (oldLd.earnedComp  || 0) - currentEditLog.days);
        if(currentEditLog.type === 'comp_use')    oldLd.usedComp    = Math.max(0, (oldLd.usedComp    || 0) - currentEditLog.days);
        await oldLeaveRef.set(oldLd, { merge: true });

        const newLeaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(year);
        const newSnap = await newLeaveRef.get();
        let newLd = newSnap.exists ? newSnap.data() : { annualDays:0, usedAnnual:0, earnedComp:0, usedComp:0 };
        if(type === 'annual_earn') newLd.annualDays  = (newLd.annualDays  || 0) + days;
        if(type === 'annual_use')  newLd.usedAnnual  = (newLd.usedAnnual  || 0) + days;
        if(type === 'comp_earn')   newLd.earnedComp  = (newLd.earnedComp  || 0) + days;
        if(type === 'comp_use')    newLd.usedComp    = (newLd.usedComp    || 0) + days;
        newLd.updatedAt = new Date().toISOString();
        await newLeaveRef.set(newLd, { merge: true });

        if(year === currentYear) leaveDataAll[empName] = newLd;
        if(oldYear === currentYear) leaveDataAll[empName] = oldLd;

      } else {
        // 沒有跨年的編輯，直接在同一年份先扣除舊的，再加入新的
        const leaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(year);
        const snap = await leaveRef.get();
        let ld = snap.exists ? snap.data() : { annualDays:0, usedAnnual:0, earnedComp:0, usedComp:0 };
        
        if(currentEditLog.type === 'annual_earn') ld.annualDays  = Math.max(0, (ld.annualDays  || 0) - currentEditLog.days);
        if(currentEditLog.type === 'annual_use')  ld.usedAnnual  = Math.max(0, (ld.usedAnnual  || 0) - currentEditLog.days);
        if(currentEditLog.type === 'comp_earn')   ld.earnedComp  = Math.max(0, (ld.earnedComp  || 0) - currentEditLog.days);
        if(currentEditLog.type === 'comp_use')    ld.usedComp    = Math.max(0, (ld.usedComp    || 0) - currentEditLog.days);
        
        if(type === 'annual_earn') ld.annualDays  = (ld.annualDays  || 0) + days;
        if(type === 'annual_use')  ld.usedAnnual  = (ld.usedAnnual  || 0) + days;
        if(type === 'comp_earn')   ld.earnedComp  = (ld.earnedComp  || 0) + days;
        if(type === 'comp_use')    ld.usedComp    = (ld.usedComp    || 0) + days;
        
        ld.updatedAt = new Date().toISOString();
        await leaveRef.set(ld, { merge: true });
        if(year === currentYear) leaveDataAll[empName] = ld;
      }
    } else {
      // ===== 純新增模式 =====
      const leaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(year);
      const snap = await leaveRef.get();
      let ld = snap.exists ? snap.data() : { annualDays:0, usedAnnual:0, earnedComp:0, usedComp:0 };
      if(type === 'annual_earn') ld.annualDays  = (ld.annualDays  || 0) + days;
      if(type === 'annual_use')  ld.usedAnnual  = (ld.usedAnnual  || 0) + days;
      if(type === 'comp_earn')   ld.earnedComp  = (ld.earnedComp  || 0) + days;
      if(type === 'comp_use')    ld.usedComp    = (ld.usedComp    || 0) + days;
      ld.updatedAt = new Date().toISOString();
      await leaveRef.set(ld, { merge: true });
      if(year === currentYear) leaveDataAll[empName] = ld;
    }

    // 將新紀錄寫入新月份
    const logRef = window.db.collection('employees').doc(empName).collection('leaveLog').doc(ym);
    await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion(newLog) }, { merge: true });

    closeModal('addLogModal');
    showToast(currentEditLog ? '✅ 已更新紀錄' : '✅ 已新增紀錄');
    await openEmpDetail(empName);
  }catch(e){ showToast('❌ 失敗：'+e.message); console.error(e); }
  hideLoading();
}

async function deleteLog() {
  if(!currentEditLog) return;
  if(!confirm('確定要刪除此筆紀錄嗎？此操作無法復原。')) return;

  showLoading('刪除中...');
  const empName = currentViewEmp;
  try {
    const oldYm = currentEditLog.date.slice(0, 7);
    const oldYear = currentEditLog.date.slice(0, 4);
    const oldLogRef = window.db.collection('employees').doc(empName).collection('leaveLog').doc(oldYm);
    const oldLeaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(oldYear);

    // 1. 移除明細
    await oldLogRef.update({
      records: firebase.firestore.FieldValue.arrayRemove(currentEditLog)
    });

    // 2. 扣回總帳
    const oldSnap = await oldLeaveRef.get();
    let oldLd = oldSnap.exists ? oldSnap.data() : { annualDays:0, usedAnnual:0, earnedComp:0, usedComp:0 };
    if(currentEditLog.type === 'annual_earn') oldLd.annualDays  = Math.max(0, (oldLd.annualDays  || 0) - currentEditLog.days);
    if(currentEditLog.type === 'annual_use')  oldLd.usedAnnual  = Math.max(0, (oldLd.usedAnnual  || 0) - currentEditLog.days);
    if(currentEditLog.type === 'comp_earn')   oldLd.earnedComp  = Math.max(0, (oldLd.earnedComp  || 0) - currentEditLog.days);
    if(currentEditLog.type === 'comp_use')    oldLd.usedComp    = Math.max(0, (oldLd.usedComp    || 0) - currentEditLog.days);
    await oldLeaveRef.set(oldLd, { merge: true });
    
    if(oldYear === currentYear) leaveDataAll[empName] = oldLd;

    closeModal('addLogModal');
    showToast('✅ 紀錄已刪除');
    await openEmpDetail(empName);
  } catch(e) {
    showToast('❌ 刪除失敗：' + e.message);
  }
  hideLoading();
}
</script>
