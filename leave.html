<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--accent:#34a853;
  --danger:#d93025;--warn:#f9ab00;--purple:#9334e6;
  --bg:#f0f4ff;--text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;
  --header-h:56px;--radius:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--text);}
#loadingOverlay{display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#1a73e8,#0d47a1);z-index:99999;flex-direction:column;justify-content:center;align-items:center;color:white;transition:opacity 0.4s;}
#loadingOverlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingText{font-size:14px;font-weight:600;opacity:0.9;}
#appShell{display:none;flex-direction:column;height:100%;}
#appShell.active{display:flex;}

/* Header */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:0 16px;height:var(--header-h);display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(26,115,232,0.3);}
.header-back{background:rgba(255,255,255,0.2);border:none;color:white;height:34px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 12px;gap:4px;}
.header-title{font-size:17px;font-weight:800;flex:1;}
.header-badge{background:rgba(255,255,255,0.2);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;}
.header-action{background:rgba(255,255,255,0.2);border:none;color:white;height:32px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;padding:0 12px;}

/* Store bar (加盟主) */
.store-bar{display:none;gap:8px;padding:8px 14px;overflow-x:auto;background:white;border-bottom:1px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.store-tab{padding:6px 14px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:700;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.store-tab.active{border-color:var(--primary);background:var(--primary);color:white;}

/* Tab */
.tab-bar{display:flex;background:white;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-item{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;}
.tab-item.active{color:var(--primary);border-bottom-color:var(--primary);}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px;}

/* 員工卡片 */
.emp-card{background:white;border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;transition:transform 0.1s;}
.emp-card:active{transform:scale(0.98);}
.emp-card-header{display:flex;align-items:center;padding:14px 16px;gap:10px;}
.emp-avatar{width:40px;height:40px;border-radius:12px;color:white;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.emp-info{flex:1;}
.emp-name{font-size:15px;font-weight:800;}
.emp-role{font-size:11px;color:var(--text-muted);}
.leave-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.lchip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;}
.lchip.annual{background:#e8f0fe;color:var(--primary);}
.lchip.comp{background:#e8f5e9;color:var(--accent);}
.lchip.warn{background:#fce8e6;color:var(--danger);}
.lchip.carry{background:#fff3e0;color:#e65100;}
.lchip.expire{background:#fce8e6;color:var(--danger);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}

/* 批次卡片 */
.batch-card{background:white;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.06);overflow:hidden;}
.batch-header{display:flex;align-items:center;padding:12px 16px;gap:10px;}
.batch-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.batch-title{font-size:14px;font-weight:800;flex:1;}
.batch-days{font-size:18px;font-weight:900;}
.batch-days.ok{color:var(--accent);}
.batch-days.warn{color:var(--warn);}
.batch-days.danger{color:var(--danger);}
.batch-meta{padding:0 16px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.batch-meta-item{font-size:11px;color:var(--text-muted);}
.batch-meta-val{font-weight:700;color:var(--text);}
.batch-expire-bar{height:4px;background:#f1f3f4;border-radius:0 0 0 0;}
.batch-expire-fill{height:100%;border-radius:2px;transition:width 0.5s;}
.batch-actions{display:flex;gap:8px;padding:0 16px 12px;}
.batch-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.batch-btn.primary{background:#e8f0fe;color:var(--primary);}
.batch-btn.danger{background:#fce8e6;color:var(--danger);}
.batch-btn.warn{background:#fff3e0;color:#e65100;}

/* 個人總覽卡片 */
.leave-summary{background:white;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.leave-summary-title{font-size:12px;font-weight:800;color:var(--text-muted);margin-bottom:12px;letter-spacing:0.5px;text-transform:uppercase;}
.leave-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f3f4;}
.leave-row:last-child{border-bottom:none;}
.leave-row-label{font-size:13px;color:var(--text-muted);}
.leave-row-val{font-size:15px;font-weight:800;}
.leave-row-val.primary{color:var(--primary);}
.leave-row-val.accent{color:var(--accent);}
.leave-row-val.warn{color:var(--warn);}
.leave-row-val.danger{color:var(--danger);}

/* 法規說明框 */
.law-box{background:#f8fafc;border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:var(--text-muted);line-height:1.8;}
.law-box-title{font-weight:800;color:var(--primary);margin-bottom:6px;font-size:13px;}
.law-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:11px;}
.law-table th{background:#e8f0fe;color:var(--primary);padding:4px 8px;text-align:left;font-weight:700;}
.law-table td{padding:4px 8px;border-bottom:1px solid #f1f3f4;}
.law-table tr.highlight td{background:#fff8e1;font-weight:700;}

/* 年度報表 */
.report-section{background:white;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.report-title{font-size:14px;font-weight:800;margin-bottom:12px;}
.report-table{width:100%;font-size:12px;border-collapse:collapse;}
.report-table th{background:#f1f3f4;padding:8px 10px;text-align:left;font-weight:700;font-size:11px;color:var(--text-muted);}
.report-table td{padding:8px 10px;border-bottom:1px solid #f8fafc;}
.report-table .warn-row td{background:#fff8e1;}
.report-table .danger-row td{background:#fce8e6;}
.achievement{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;}
.achievement.high{background:#e8f5e9;color:#2e7d32;}
.achievement.mid{background:#fff3e0;color:#e65100;}
.achievement.low{background:#fce8e6;color:var(--danger);}

/* Log items */
.log-item{background:white;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.log-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.log-badge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;}
.log-badge.earn{background:#e8f5e9;color:#2e7d32;}
.log-badge.use{background:#fce8e6;color:#c62828;}
.log-badge.carry{background:#fff3e0;color:#e65100;}
.log-badge.settle{background:#ede7f6;color:var(--purple);}
.log-badge.cancel{background:#f3e5f5;color:#6a1b9a;}
.log-date{font-size:12px;color:var(--text-muted);}
.log-days{font-size:16px;font-weight:900;margin-left:auto;}
.log-days.pos{color:var(--accent);}
.log-days.neg{color:var(--danger);}
.log-note{font-size:12px;color:var(--text-muted);margin-top:2px;}
.log-actions{display:flex;gap:8px;margin-top:8px;}
.log-btn{padding:5px 12px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;}
.log-btn.edit{background:#e8f0fe;color:var(--primary);}
.log-btn.del{background:#fce8e6;color:var(--danger);}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.active{opacity:1;pointer-events:all;}
.modal-box{background:white;border-radius:22px 22px 0 0;width:100%;max-width:520px;padding:0 0 32px;max-height:90vh;overflow-y:auto;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:12px auto 16px;}
.modal-title{font-size:17px;font-weight:900;padding:0 20px;margin-bottom:14px;}
.modal-sub{font-size:12px;color:var(--text-muted);padding:0 20px;margin-bottom:14px;}
.modal-body{padding:0 20px;}
.form-field{margin-bottom:14px;}
.form-field label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:5px;}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;outline:none;background:#f8fafc;font-family:inherit;}
.form-field input:focus,.form-field select:focus{border-color:var(--primary);background:white;}
.modal-action{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;}
.modal-cancel{width:100%;padding:10px;background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;margin-top:6px;}
.private-hint{display:flex;align-items:center;gap:6px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#166534;font-weight:600;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 空狀態 */
.empty-state{text-align:center;padding:30px 20px;color:var(--text-muted);}
.empty-icon{font-size:40px;margin-bottom:10px;}

/* 警示橫幅 */
.alert-banner{background:linear-gradient(135deg,#fce8e6,#fef2f2);border:1.5px solid var(--danger);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.alert-banner.warn{background:linear-gradient(135deg,#fff3e0,#fff8e1);border-color:var(--warn);}
.alert-banner-icon{font-size:20px;flex-shrink:0;}
.alert-banner-text{flex:1;font-size:13px;font-weight:700;}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><div id="loadingText">載入中...</div></div>

<div id="appShell">
  <div class="header">
    <button class="header-back" onclick="handleBack()">← 首頁</button>
    <div class="header-title" id="headerTitle">🏖️ 特補休管理</div>
    <div class="header-badge" id="headerBadge">--</div>
    <button class="header-action" id="reportBtn" style="display:none;" onclick="openReport()">📊 年度報表</button>
  </div>

  <!-- 加盟主門市切換 -->
  <div class="store-bar" id="storeBar"></div>

  <!-- Tab -->
  <div class="tab-bar" id="tabBar" style="display:none;">
    <div class="tab-item active" id="tab-overview" onclick="switchTab('overview')">📊 總覽</div>
    <div class="tab-item" id="tab-detail" onclick="switchTab('detail')">📋 明細</div>
  </div>

  <div class="content" id="mainContent">
    <div class="empty-state"><div class="spinner" style="border-top-color:var(--primary);border-color:var(--border);margin:0 auto 10px;width:32px;height:32px;border-width:3px;"></div></div>
  </div>
</div>

<!-- ===== 到職日 / 設定 Modal ===== -->
<div class="modal-overlay" id="hireDateModal" onclick="if(event.target===this)closeModal('hireDateModal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="hireDateTitle">設定到職日</div>
    <div class="modal-sub" id="hireDateSub">設定到職日後，系統將自動計算週年制特休批次。</div>
    <div class="modal-body">
      <input type="hidden" id="hireDateEmpName">
      <div class="form-field">
        <label>員工姓名</label>
        <input type="text" id="hireDateEmpDisplay" readonly style="background:#f1f3f4;">
      </div>
      <div class="form-field">
        <label>到職日期</label>
        <input type="date" id="hireDateInput">
      </div>
      <!-- 工讀生：法規未定，保留手動輸入 -->
      <div id="manualDaysGroup" style="display:none;">
        <div class="private-hint">
          📝 工讀生特休規則尚未定案，請手動輸入年度特休天數
        </div>
        <div class="form-field">
          <label>年度特休天數（手動設定）</label>
          <input type="number" id="manualAnnualDays" min="0" max="30" step="1" placeholder="請輸入天數">
        </div>
      </div>
      <!-- 正職/副店長/店長：自動計算 -->
      <div id="autoDaysPreview" style="display:none; background:#e8f0fe; border-radius:10px; padding:12px; font-size:13px; line-height:1.8; margin-bottom:12px;"></div>
      <button class="modal-action" onclick="saveHireDate()">確認設定</button>
      <button class="modal-cancel" onclick="closeModal('hireDateModal')">取消</button>
    </div>
  </div>
</div>

<!-- ===== 手動新增批次 Modal（工讀生 or 店長以上手動） ===== -->
<div class="modal-overlay" id="addBatchModal" onclick="if(event.target===this)closeModal('addBatchModal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">手動新增特休批次</div>
    <div class="modal-body">
      <input type="hidden" id="addBatchEmp">
      <div class="form-field">
        <label>發放日</label>
        <input type="date" id="addBatchGrantDate">
      </div>
      <div class="form-field">
        <label>到期日</label>
        <input type="date" id="addBatchExpireDate">
      </div>
      <div class="form-field">
        <label>天數</label>
        <input type="number" id="addBatchDays" min="0.5" step="0.5">
      </div>
      <div class="form-field">
        <label>說明（如：滿6個月、滿1年）</label>
        <input type="text" id="addBatchNote" placeholder="說明">
      </div>
      <button class="modal-action" onclick="saveAddBatch()">新增批次</button>
      <button class="modal-cancel" onclick="closeModal('addBatchModal')">取消</button>
    </div>
  </div>
</div>

<!-- ===== 新增 leaveLog 紀錄 Modal ===== -->
<div class="modal-overlay" id="addLogModal" onclick="if(event.target===this)closeModal('addLogModal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="addLogTitle">手動新增紀錄</div>
    <div class="modal-body">
      <div class="form-field">
        <label>類型</label>
        <select id="addLogType">
          <option value="annual_use">特休 — 使用</option>
          <option value="annual_use_cancel">特休 — 取消</option>
          <option value="comp_earn">補休 — 取得</option>
          <option value="comp_use">補休 — 使用</option>
          <option value="comp_use_cancel">補休 — 取消</option>
        </select>
      </div>
      <div class="form-field">
        <label>日期</label>
        <input type="date" id="addLogDate">
      </div>
      <div class="form-field">
        <label>天數</label>
        <input type="number" id="addLogDays" min="0.5" step="0.5">
      </div>
      <div class="form-field">
        <label>說明</label>
        <input type="text" id="addLogNote" placeholder="說明（選填）">
      </div>
      <button class="modal-action" onclick="saveAddLog()">儲存</button>
      <button class="modal-cancel" onclick="closeModal('addLogModal')">取消</button>
    </div>
  </div>
</div>

<!-- ===== 編輯 leaveLog 紀錄 Modal ===== -->
<div class="modal-overlay" id="editLogModal" onclick="if(event.target===this)closeModal('editLogModal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ 編輯紀錄</div>
    <div class="modal-body">
      <input type="hidden" id="editLogEmpName">
      <input type="hidden" id="editLogYm">
      <input type="hidden" id="editLogIdx">
      <div class="form-field">
        <label>類型</label>
        <select id="editLogType">
          <option value="annual_use">特休 — 使用</option>
          <option value="annual_use_cancel">特休 — 取消</option>
          <option value="comp_earn">補休 — 取得</option>
          <option value="comp_use">補休 — 使用</option>
          <option value="comp_use_cancel">補休 — 取消</option>
        </select>
      </div>
      <div class="form-field">
        <label>日期</label>
        <input type="date" id="editLogDate">
      </div>
      <div class="form-field">
        <label>天數</label>
        <input type="number" id="editLogDays" min="0.5" step="0.5">
      </div>
      <div class="form-field">
        <label>說明</label>
        <input type="text" id="editLogNote" placeholder="說明">
      </div>
      <button class="modal-action" onclick="saveEditLog()">儲存修改</button>
      <button class="modal-cancel" onclick="closeModal('editLogModal')">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 全域狀態 =====
let currentUser = null, appConfig = { stores:[], shifts:[] };
let empList = [], batchesAll = {}, leaveLogAll = {}, displayNameMap = {};
let currentStore = '', currentTab = 'overview', currentViewEmp = '';
let urlMode = ''; // 'self' | 'mgmt'

// ===== 權限 =====
const isAdmin   = () => ['owner','admin'].includes(currentUser?.permission);
const isManager = () => ['manager','owner','admin'].includes(currentUser?.permission);
const myName    = () => currentUser?.empName || '';
const myStore   = () => currentUser?.store || '';

// ===== 工具 =====
function showLoading(m){document.getElementById('loadingText').textContent=m||'載入中...';const o=document.getElementById('loadingOverlay');o.classList.remove('hidden');o.style.display='flex';}
function hideLoading(){document.getElementById('loadingOverlay').classList.add('hidden');setTimeout(()=>{document.getElementById('loadingOverlay').style.display='none';},400);}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function openModal(id){document.getElementById(id).classList.add('active');}
function closeModal(id){document.getElementById(id).classList.remove('active');}
function handleBack(){if(window.history.length>1)window.history.back();else window.location.href='home.html';}
function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(s){if(!s)return '--';const[y,m,d]=s.split('-');return `${y}/${parseInt(m)}/${parseInt(d)}`;}
function getDN(n){return displayNameMap[n]||n;}
function daysUntil(s){if(!s)return null;const t=new Date(s);t.setHours(23,59,59);return Math.ceil((t-new Date())/86400000);}
function dateAdd(s,months){const d=new Date(s);d.setMonth(d.getMonth()+months);return d.toISOString().split('T')[0];}

// ===== 勞基法天數（週年制）=====
// 回傳 { months, days, label }
function annualLeaveRule(totalMonths) {
  if(totalMonths < 6)   return { days:0,  label:'未滿6個月' };
  if(totalMonths < 12)  return { days:3,  label:'滿6個月' };
  if(totalMonths < 24)  return { days:7,  label:'滿1年' };
  if(totalMonths < 36)  return { days:10, label:'滿2年' };
  if(totalMonths < 48)  return { days:14, label:'滿3年' };
  if(totalMonths < 60)  return { days:14, label:'滿4年' };
  if(totalMonths < 120) return { days:15, label:'滿5年' };
  const extra = Math.floor(totalMonths/12) - 10;
  return { days:Math.min(30, 15+extra+1), label:`滿${Math.floor(totalMonths/12)}年` };
}

// 計算從到職日起，每一個週年日應得的特休批次清單
function calcBatchSchedule(hireDate) {
  if(!hireDate) return [];
  const hire = new Date(hireDate);
  const now  = new Date();
  const batches = [];
  // 6個月到期
  const m6Grant  = dateAdd(hireDate, 6);
  const m6Expire = dateAdd(hireDate, 12); // 下一個週年日
  if(new Date(m6Grant) <= now) {
    batches.push({ grantDate:m6Grant, expireDate:m6Expire, days:3, label:'滿6個月', months:6 });
  }
  // 每個週年
  for(let yr=1; yr<=30; yr++) {
    const grantDate  = dateAdd(hireDate, yr*12);
    const expireDate = dateAdd(hireDate, (yr+1)*12);
    if(new Date(grantDate) > now) break;
    const totalM = yr*12;
    const rule = annualLeaveRule(totalM);
    if(rule.days > 0) {
      batches.push({ grantDate, expireDate, days:rule.days, label:rule.label, months:totalM });
    }
  }
  return batches;
}

// 計算月數差
function monthsDiff(from, to) {
  const f=new Date(from), t=new Date(to);
  return (t.getFullYear()-f.getFullYear())*12 + (t.getMonth()-f.getMonth());
}

      ]);

    }catch(e){}

// ===== 讀取所有員工 =====
async function loadAllEmps() {
  showLoading('讀取員工資料...');
  const todayStr = today();
  const empSnap = await window.db.collection('stores').doc(currentStore).collection('employees').get().catch(()=>null);
  empList = [];
  if(empSnap) empSnap.forEach(d=>{
    const data = d.data();
    const effectDate = data.retireDate || data.transferDate;
    const isEffective = ['離職','調走'].includes(data.status) && (!effectDate || todayStr >= effectDate);
    if(!isEffective) empList.push({ name:d.id, ...data });
  });
  empList.sort((a,b)=>(a.sortKey||0)-(b.sortKey||0));

  // 平行讀取所有員工的批次資料
  await Promise.all(empList.map(async emp => {
    await loadEmpBatches(emp.name);
  }));
  hideLoading();
}

// ===== 讀取單一員工的批次與 log =====
async function loadEmpBatches(empName) {
  const [batchSnap, leaveSnap, logSnap] = await Promise.all([
    window.db.collection('employees').doc(empName).collection('leaveBatches').get().catch(()=>null),
    window.db.collection('employees').doc(empName).collection('leaves').doc(new Date().getFullYear().toString()).get().catch(()=>null),
    window.db.collection('employees').doc(empName).collection('leaveLog').get().catch(()=>null)
  ]);

  let batches = [];
  if(batchSnap) batchSnap.forEach(d=>batches.push({id:d.id,...d.data()}));
  batches.sort((a,b)=>a.grantDate?.localeCompare(b.grantDate));
  batchesAll[empName] = batches;

  // 舊版資料相容：若 leaveBatches 是空的但有 hireDate，提示需要遷移
  if(batches.length===0 && leaveSnap?.exists && leaveSnap.data()?.hireDate) {
    batchesAll[empName] = [{ _legacy: true, hireDate: leaveSnap.data().hireDate, ...leaveSnap.data() }];
  }

  let logs = [];
  if(logSnap) logSnap.forEach(d=>{ const data=d.data(); (data.records||[]).forEach(r=>logs.push({ym:d.id,...r})); });
  logs.sort((a,b)=>(b.date||b.ym).localeCompare(a.date||a.ym));
  leaveLogAll[empName] = logs;
}

// ===== 計算員工的有效特休概況 =====
function calcEmpSummary(empName) {
  const batches = batchesAll[empName] || [];
  const logs    = leaveLogAll[empName] || [];
  const todayStr = today();

  // 從 logs 加總使用量（供顯示）
  let usedAnnual=0, earnedComp=0, usedComp=0;
  logs.forEach(r=>{
    const d=parseFloat(r.days)||0;
    if(r.type==='annual_use')        usedAnnual+=d;
    if(r.type==='annual_use_cancel') usedAnnual=Math.max(0,usedAnnual-d);
    if(r.type==='comp_earn')         earnedComp+=d;
    if(r.type==='comp_use')          usedComp+=d;
    if(r.type==='comp_use_cancel')   usedComp=Math.max(0,usedComp-d);
    if(r.type==='comp_cancel')       earnedComp=Math.max(0,earnedComp-d);
  });

  // 有效的特休批次（未到期、未完全結算）
  let activeDays=0, carriedDays=0, nearExpire=null;
  batches.filter(b=>!b._legacy).forEach(b=>{
    const remaining = (b.days||0) - (b.used||0);
    if(remaining <= 0 || b.settled) return;
    if(b.carried) {
      // 遞延中：效期到當年 12/31
      const yr = new Date(b.grantDate).getFullYear();
      const settleDate = `${yr+1}-12-31`;
      if(todayStr <= settleDate) carriedDays += remaining;
    } else {
      // 正常批次
      if(todayStr <= b.expireDate) activeDays += remaining;
    }
    // 最近到期
    const exp = b.carried ? `${new Date(b.grantDate).getFullYear()+1}-12-31` : b.expireDate;
    if(!nearExpire || exp < nearExpire) nearExpire = exp;
  });

  return {
    activeDays,    // 本期可用天數
    carriedDays,   // 遞延中天數
    totalAvail: activeDays + carriedDays,
    usedAnnual,
    earnedComp,
    usedComp,
    remainComp: Math.max(0, earnedComp-usedComp),
    nearExpire
  };
}

// ===== 自動檢查到期批次（週年日到了 → 遞延）=====
async function checkExpiredBatches() {
  const todayStr = today();
  const emps = empList.length > 0 ? empList : [{ name: myName() }];
  for(const emp of emps) {
    const batches = batchesAll[emp.name] || [];
    for(const b of batches) {
      if(b._legacy || b.settled || b.carried) continue;
      const remaining = (b.days||0) - (b.used||0);
      if(remaining <= 0) continue;
      // 週年日已過 且 尚未遞延
      if(todayStr > b.expireDate) {
        // 自動遞延
        await window.db.collection('employees').doc(emp.name)
          .collection('leaveBatches').doc(b.id).update({
            carried: true,
            carriedAt: todayStr,
            carriedNote: `${b.expireDate} 週年到期，自動遞延`
          }).catch(()=>{});
        b.carried = true;
        showToast(`📌 ${getDN(emp.name)} 的 ${remaining} 天特休已自動遞延`);
      }
    }
  }
}

// ===== 渲染：管理者總覽 =====
function renderOverview() {
  const el = document.getElementById('mainContent');
  if(!empList.length){ el.innerHTML=`<div class="empty-state"><div class="empty-icon">👥</div><div>無員工資料</div></div>`; return; }

  let html='';
  // 到期警示
  const expiring = empList.filter(emp=>{
    const s=calcEmpSummary(emp.name);
    return s.nearExpire && daysUntil(s.nearExpire)!==null && daysUntil(s.nearExpire) <= 90 && s.activeDays+s.carriedDays > 0;
  });
  if(expiring.length>0) {
    html+=`<div class="alert-banner warn"><div class="alert-banner-icon">⏰</div><div class="alert-banner-text">有 ${expiring.length} 位員工的特休即將到期（90天內），請注意排休。</div></div>`;
  }
  // 低達成率警示
  const lowRate = empList.filter(emp=>{
    const s=calcEmpSummary(emp.name);
    const total = (batchesAll[emp.name]||[]).reduce((a,b)=>a+(b.days||0),0);
    return total>0 && s.usedAnnual/total < 0.3;
  });
  if(lowRate.length>0) {
    html+=`<div class="alert-banner warn"><div class="alert-banner-icon">⚠️</div><div class="alert-banner-text">${lowRate.length} 位員工特休達成率低於 30%，建議主管關懷排休。</div></div>`;
  }

html += empList.map(emp => {
    const rawBatches = batchesAll[emp.name] || [];
    const batches = rawBatches.filter(b=>!b._legacy);
    const s = calcEmpSummary(emp.name);
    
    // 正確判斷是否有到職日
    let hireDate = null;
    if (rawBatches.length > 0) {
      if (rawBatches[0]._legacy && rawBatches[0].hireDate) hireDate = rawBatches[0].hireDate;
      else if (batches[0]?.grantDate) hireDate = dateAdd(batches[0].grantDate, -6);
    }
    // 只要有到職日，就不算「尚未建檔」
    const needSetup = !hireDate;
    
    const avatarColor = emp.role==='店長'?'linear-gradient(135deg,#9334e6,#6a1bb5)':emp.role==='正職'?'linear-gradient(135deg,#34a853,#1e7e34)':'linear-gradient(135deg,#1a73e8,#0d47a1)';
    const avatarColor = emp.role==='店長'?'linear-gradient(135deg,#9334e6,#6a1bb5)':emp.role==='正職'?'linear-gradient(135deg,#34a853,#1e7e34)':'linear-gradient(135deg,#1a73e8,#0d47a1)';

    return `<div class="emp-card" onclick="openEmpDetail('${emp.name}')">
      <div class="emp-card-header">
        <div class="emp-avatar" style="background:${avatarColor};">${getDN(emp.name)[0]}</div>
        <div class="emp-info">
          <div class="emp-name">${getDN(emp.name)}</div>
          <div class="emp-role">${emp.role||''}</div>
          <div class="leave-chips">
            ${needSetup
              ? `<span class="lchip warn">⚠️ 尚未建檔</span>`
              : `<span class="lchip annual">特休可用 ${s.totalAvail} 天</span>
                 ${s.carriedDays>0?`<span class="lchip carry">遞延 ${s.carriedDays} 天</span>`:''}
                 ${s.remainComp>0?`<span class="lchip comp">補休剩 ${s.remainComp} 天</span>`:''}
                 ${s.nearExpire&&daysUntil(s.nearExpire)<=30?`<span class="lchip expire">⏰ ${daysUntil(s.nearExpire)}天後到期</span>`:''}`
            }
          </div>
        </div>
        <div style="font-size:18px;color:var(--text-muted);">›</div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = html;
}

          const existing = batches.find(x=>x.grantDate===b.grantDate);
          const status = existing ? (existing.settled?'已結算':existing.carried?'遞延中':'進行中') : '待發放';

    html+=`<div class="law-box"><div class="law-box-title">📝 工讀生備註</div>工讀生特休規則尚未定案，目前採手動建檔方式管理。如有異動請聯繫管理員。</div>`;

      const remaining = Math.max(0,(b.days||0)-(b.used||0));

      const pct = b.days > 0 ? Math.round((remaining/b.days)*100) : 0;
      const statusColor = b.settled?'#9e9e9e':b.carried?'#f9ab00':remaining>0?'#34a853':'#e0e0e0';
      const statusLabel = b.settled?'已結算':b.carried?'遞延中':'進行中';

      return `<div class="batch-card">
        <div class="batch-header">
          <div class="batch-status-dot" style="background:${statusColor};"></div>

          <div class="batch-meta-item">效期 <span class="batch-meta-val">${b.carried?'遞延至 '+fmtDate(settleDate):dLeft===null?'--':dLeft>0?dLeft+'天後到期':'已到期'}</span></div>

        </div>
        <div class="batch-expire-bar"><div class="batch-expire-fill" style="width:${pct}%;background:${statusColor};"></div></div>
        ${canEdit&&!b.settled?`<div class="batch-actions">
          ${remaining>0&&!b.carried?`<button class="batch-btn warn" onclick="carryBatch('${empName}','${b.id}')">📌 手動遞延</button>`:''}
          ${b.carried&&remaining>0?`<button class="batch-btn danger" onclick="settleBatch('${empName}','${b.id}')">💰 立即結算</button>`:''}
          <button class="batch-btn danger" onclick="deleteBatch('${empName}','${b.id}')">🗑️</button>

    }).join('');

    if(canEdit) html+=`<button onclick="openAddBatchModal('${empName}')" style="width:100%;padding:12px;background:#f1f3f4;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:14px;">＋ 手動新增批次</button>`;
  } else {
    // 修正點：有到職日但不滿半年時，不要顯示大藍色按鈕
    html+=`<div class="empty-state"><div class="empty-icon">📋</div><div>尚無可用的特休批次</div></div>`;
    if(canEdit) {
      if(!hireDate) {

        html+=`<button onclick="openHireDateModal('${empName}')" style="width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;">＋ 設定到職日（建立批次）</button>`;
      } else {
        // 已有到職日但沒批次 (年資未滿)，提供灰色手動新增按鈕
        html+=`<button onclick="openAddBatchModal('${empName}')" style="width:100%;padding:12px;background:#f1f3f4;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:14px;">＋ 手動新增批次</button>`;
      }
    }
  }

  // 明細紀錄（最近 20 筆）
  const recentLogs = logs.slice(0,20);
  if(recentLogs.length>0) {
    html+=`<div style="font-size:12px;font-weight:800;color:var(--text-muted);letter-spacing:0.5px;margin:14px 0 8px;text-transform:uppercase;">近期紀錄</div>`;

      <button onclick="openAddLogModal('${empName}')" style="flex:1;padding:12px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;">➕ 新增紀錄</button>

function renderLogItem(r, idx, empName) {
  const typeMap = {
    annual_use:'特休使用', annual_use_cancel:'特休取消',
    comp_earn:'補休取得', comp_use:'補休使用', comp_use_cancel:'補休取消',
    comp_cancel:'補休結算', carry:'遞延', settle:'薪資結算'
  };
  const badgeClass = r.type?.includes('earn')||r.type?.includes('cancel')&&!r.type?.includes('use') ? 'earn'
    : r.type?.includes('use') ? 'use'
    : r.type==='carry' ? 'carry'
    : r.type==='settle' ? 'settle' : 'cancel';
  const sign = r.type?.includes('use')&&!r.type?.includes('cancel') ? '-' : '+';
  const daysClass = sign==='-'?'neg':'pos';

  return `<div class="log-item">
    <div class="log-header">
      <span class="log-badge ${badgeClass}">${typeMap[r.type]||r.type}</span>
      <span class="log-date">${fmtDate(r.date||r.ym)}</span>
      <span class="log-days ${daysClass}">${sign}${r.days}天</span>
    </div>
    ${r.note?`<div class="log-note">📝 ${r.note}</div>`:''}
    ${r.savedBy?`<div class="log-note">👤 ${r.savedBy}</div>`:''}
    ${isManager()?`<div class="log-actions">
      <button class="log-btn edit" onclick="openEditLogModal('${empName}','${r.ym}',${idx})">✏️ 編輯</button>
      <button class="log-btn del" onclick="confirmDeleteLog('${empName}','${r.ym}',${idx})">🗑️ 刪除</button>
    </div>`:''}
  </div>`;
}

function switchTab(tab) {

// ===== 到職日設定 =====
function openHireDateModal(empName) {
  const emp = empList.find(e=>e.name===empName)||{};
  const isPartTime = (emp.role||'').includes('工讀');
  document.getElementById('hireDateEmpName').value = empName;
  document.getElementById('hireDateEmpDisplay').value = getDN(empName);
  document.getElementById('manualDaysGroup').style.display = isPartTime ? 'block' : 'none';
  document.getElementById('autoDaysPreview').style.display = 'none';
// 現有到職日：相容舊版與新版
  const rawBatches = batchesAll[empName] || [];
  const existingNew = rawBatches.find(b=>!b._legacy);
  const existingLegacy = rawBatches.find(b=>b._legacy);
  
  if(existingNew?.grantDate) {
    document.getElementById('hireDateInput').value = dateAdd(existingNew.grantDate, -6);
  } else if (existingLegacy?.hireDate) {
    document.getElementById('hireDateInput').value = existingLegacy.hireDate;
  } else {
    document.getElementById('hireDateInput').value = '';
  }
  document.getElementById('hireDateInput').oninput = () => previewHireDate(isPartTime);
  openModal('hireDateModal');
}

function previewHireDate(isPartTime) {
  const hireDate = document.getElementById('hireDateInput').value;
  const preview = document.getElementById('autoDaysPreview');
  if(!hireDate || isPartTime) { preview.style.display='none'; return; }
  const schedule = calcBatchSchedule(hireDate);
  if(schedule.length===0) { preview.style.display='none'; return; }
  preview.style.display='block';
  preview.innerHTML=`<b>預計發放批次（已到期的）：</b><br>`+
    schedule.map(b=>`${b.label}（${fmtDate(b.grantDate)}）：${b.days} 天`).join('<br>');
}

async function saveHireDate() {
  const empName  = document.getElementById('hireDateEmpName').value;
  const hireDate = document.getElementById('hireDateInput').value;
  if(!hireDate){ showToast('⚠️ 請輸入到職日'); return; }
  const emp = empList.find(e=>e.name===empName)||{};
  const isPartTime = (emp.role||'').includes('工讀');

  showLoading('建立批次中...');
  try {
    const batchRef = window.db.collection('employees').doc(empName).collection('leaveBatches');
    // 先刪除舊批次（重新設定到職日）
    const oldSnap = await batchRef.get();
    for(const d of oldSnap.docs) await d.ref.delete();

    if(isPartTime) {
      // 工讀生：手動天數，只建一筆
      const manualDays = parseInt(document.getElementById('manualAnnualDays').value)||0;
      if(manualDays>0) {
        const grantDate  = hireDate;
        const expireDate = dateAdd(hireDate, 12);
        await batchRef.add({ grantDate, expireDate, days:manualDays, used:0, label:'手動建檔（工讀生）', note:'工讀生，規則待定', carried:false, settled:false, createdAt: today() });
      }
    } else {
      // 正職：依勞基法自動建立所有已到期批次
      const schedule = calcBatchSchedule(hireDate);
      for(const b of schedule) {
        await batchRef.add({ ...b, used:0, carried:false, settled:false, createdAt:today() });
      }
    }

    // 更新 leaves/{year} 的 hireDate（相容舊資料）
    const year = new Date().getFullYear().toString();
    await window.db.collection('employees').doc(empName).collection('leaves').doc(year).set({ hireDate }, { merge:true });

    showToast('✅ 已設定到職日並建立批次');
    closeModal('hireDateModal');
    await loadEmpBatches(empName);
    renderEmpDetail(empName, true);
  }catch(e){ showToast('❌ 失敗：'+e.message); }
  hideLoading();
}

// ===== 批次操作 =====
async function carryBatch(empName, batchId) {
  if(!confirm('確定手動將此批次標記為遞延？')) return;
  showLoading('處理中...');
  try{
    await window.db.collection('employees').doc(empName).collection('leaveBatches').doc(batchId).update({ carried:true, carriedAt:today(), carriedNote:'手動遞延' });
    await loadEmpBatches(empName);
    renderEmpDetail(empName,true);
    showToast('✅ 已標記遞延');
  }catch(e){ showToast('❌ 失敗'); }
  hideLoading();
}

async function settleBatch(empName, batchId) {
  const batch = (batchesAll[empName]||[]).find(b=>b.id===batchId);
  if(!batch) return;
  const remaining = (batch.days||0)-(batch.used||0);
  if(!confirm(`立即結算 ${getDN(empName)} 剩餘 ${remaining} 天特休為工資？\n請確認日薪後於薪資系統處理。`)) return;
  showLoading('結算中...');
  try{
    await window.db.collection('employees').doc(empName).collection('leaveBatches').doc(batchId).update({
      settled:true, settledAt:today(), settledNote:'手動提前結算', settledDays:remaining
    });
    await loadEmpBatches(empName);
    renderEmpDetail(empName,true);
    showToast('✅ 已標記結算，請至薪資系統確認金額');
  }catch(e){ showToast('❌ 失敗'); }
  hideLoading();
}

async function deleteBatch(empName, batchId) {
  if(!confirm('確定刪除此批次？此操作不可回復。')) return;
  showLoading('刪除中...');
  try{
    await window.db.collection('employees').doc(empName).collection('leaveBatches').doc(batchId).delete();
    await loadEmpBatches(empName);
    renderEmpDetail(empName,true);
    showToast('✅ 已刪除');
  }catch(e){ showToast('❌ 失敗'); }
  hideLoading();
}

// ===== syncLeaveTotal（從 leaveLog 重算 leaves）=====
async function syncLeaveTotal(empName, year) {
  const leaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(year);
  const snap = await leaveRef.get();
  const existing = snap.exists ? snap.data() : {};
  const logSnaps = await window.db.collection('employees').doc(empName).collection('leaveLog').get().catch(()=>null);
  let usedAnnual=0, earnedComp=0, usedComp=0;
  if(logSnaps) logSnaps.forEach(d=>{
    if(!d.id.startsWith(year)) return;
    (d.data().records||[]).forEach(r=>{
      const rd=parseFloat(r.days)||0;
      if(r.type==='annual_use')        usedAnnual+=rd;
      if(r.type==='annual_use_cancel') usedAnnual=Math.max(0,usedAnnual-rd);
      if(r.type==='comp_earn')         earnedComp+=rd;
      if(r.type==='comp_use')          usedComp+=rd;
      if(r.type==='comp_use_cancel')   usedComp=Math.max(0,usedComp-rd);
      if(r.type==='comp_cancel')       earnedComp=Math.max(0,earnedComp-rd);
    });
  });
  await leaveRef.set({ ...existing, usedAnnual:Math.max(0,usedAnnual), earnedComp:Math.max(0,earnedComp), usedComp:Math.max(0,usedComp), updatedAt:today() },{ merge:true });
}

  let rows = empList.map(emp=>{
    const s = calcEmpSummary(emp.name);
    const batches = (batchesAll[emp.name]||[]).filter(b=>!b._legacy);
    const totalGranted = batches.reduce((a,b)=>a+(b.days||0),0);
    const rate = totalGranted>0 ? Math.round((s.usedAnnual/totalGranted)*100) : null;
    const rateClass = rate===null?'':rate>=70?'high':rate>=30?'mid':'low';
    const estSettle = (s.carriedDays||0); // 預估年底結算天數
    return { emp, s, totalGranted, rate, rateClass, estSettle };
  });

  let html=`<button onclick="switchTab('overview')" style="background:none;border:none;color:var(--primary);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:12px;">← 回總覽</button>
  <div class="report-section">
    <div class="report-title">📊 ${year} 年度特休報表 — ${currentStore}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">產出時間：${new Date().toLocaleString('zh-TW')}</div>
    <table class="report-table">
      <tr><th>員工</th><th>年資</th><th>已發放</th><th>已休</th><th>達成率</th><th>遞延中</th><th>補休剩</th></tr>
      ${rows.map(({emp,s,totalGranted,rate,rateClass,estSettle})=>{
        const hireDate = (batchesAll[emp.name]||[]).find(b=>b.grantDate)?.[0]?.grantDate;
        const yrs = hireDate ? Math.floor(monthsDiff(dateAdd(hireDate,-6),today())/12) : '--';
        const rowClass = rate!==null&&rate<30?'danger-row':'';
        return `<tr class="${rowClass}">
          <td><b>${getDN(emp.name)}</b><br><span style="font-size:10px;color:var(--text-muted);">${emp.role||''}</span></td>
          <td>${yrs} 年</td>
          <td>${totalGranted} 天</td>
          <td>${s.usedAnnual} 天</td>
          <td>${rate!==null?`<span class="achievement ${rateClass}">${rate}%</span>`:'--'}</td>
          <td>${estSettle>0?`<span style="color:var(--warn);font-weight:700;">${estSettle} 天</span>`:'0 天'}</td>
          <td>${s.remainComp} 天</td>
        </tr>`;
      }).join('')}
    </table>
  </div>`;

  const totalCarry = rows.reduce((a,{s})=>a+s.carriedDays,0);
  if(totalCarry>0) {
    html+=`<div class="alert-banner warn"><div class="alert-banner-icon">⚠️</div><div class="alert-banner-text">本店共有 ${totalCarry} 天遞延假，若 12/31 前未休完將須結算為工資，請主動安排排休。</div></div>`;
  }

  el.innerHTML = html;
  hideLoading();
}
</script>
</body>
</html>
