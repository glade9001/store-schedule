<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="莉學商行">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="theme-color" content="#1a73e8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📅 班表管理</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-init.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1a73e8;
  --primary-dark: #1557b0;
  --accent: #34a853;
  --danger: #d93025;
  --warn: #f9ab00;
  --night: #e67e22;
  --purple: #9334e6;
  --bg: #f0f4ff;
  --card: #ffffff;
  --text: #1e293b;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --nav-h: 68px;
  --header-h: 56px;
  --radius: 14px;
  --shadow: 0 2px 16px rgba(26,115,232,0.10);
}
html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; color: var(--text); }


/* ===== LOADING ===== */
#loadingOverlay {
  display: flex; position: fixed; inset: 0; background: linear-gradient(135deg,#1a73e8,#0d47a1);
  z-index: 99999; flex-direction: column; justify-content: center; align-items: center; color: white;
  transition: opacity 0.4s;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-title { font-size: 18px; font-weight: 900; }
.loading-sub { font-size: 12px; opacity: 0.7; margin-top: 4px; }

/* ===== TOP HEADER ===== */
.top-header {
  height: var(--header-h); background: var(--primary); color: white;
  display: flex; align-items: center; padding: 0 14px; gap: 10px;
  box-shadow: 0 2px 12px rgba(26,115,232,0.3); flex-shrink: 0; position: relative; z-index: 100;
}
.header-back { background:rgba(255,255,255,0.18); border:none; color:white; height:34px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; padding:0 12px; display:flex; align-items:center; gap:4px; }
.header-title { font-size: 16px; font-weight: 900; flex: 1; }
.header-store-badge { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; }
.publish-btn {
  background: var(--accent); color: white; border: none; border-radius: 8px;
  padding: 6px 12px; font-size: 12px; font-weight: 800; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
}
.publish-btn.published { background: rgba(255,255,255,0.2); }

/* ===== APP SHELL ===== */
#appShell { display: none; height: 100vh; flex-direction: column; }
#appShell.active { display: flex; }

/* ===== MAIN CONTENT ===== */
.main-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
#empView { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px calc(env(safe-area-inset-bottom) + 80px); }

/* ===== WEEK NAV BAR ===== */
.week-bar {
  background: white; border-bottom: 1px solid var(--border);
  padding: 8px 12px; display: flex; align-items: center; gap: 8px;
  flex-shrink: 0; flex-wrap: wrap;
}
.week-nav-btns { display: flex; align-items: center; gap: 6px; }
.week-btn { background: #f1f3f4; border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text); }
.week-btn:active { background: var(--border); }
.week-input { border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 700; outline: none; background: #f8fafc; }
.week-input:focus { border-color: var(--primary); }
.store-select { border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 700; outline: none; background: #f8fafc; }
.sync-status { font-size: 11px; font-weight: 600; color: var(--accent); margin-left: auto; display: flex; align-items: center; gap: 4px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.sync-status.syncing { color: var(--danger); }
.sync-status.syncing .sync-dot { background: var(--danger); animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* ===== TOOL BAR (管理者) ===== */
.tool-bar {
  background: white; border-bottom: 1px solid var(--border);
  padding: 6px 12px; display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; flex-wrap: wrap;
}
.tool-btn { border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.tool-btn.paint { background: #fce4ec; color: #c2185b; }
.tool-btn.paint.active { background: #c2185b; color: white; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
.tool-btn.undo { background: #f1f3f4; color: var(--text); }
.tool-btn.save { background: var(--primary); color: white; }
.tool-btn.img { background: var(--night); color: white; }
.tool-btn.add { background: #fff3e0; color: #e65100; }
.tool-btn.emp { background: #ede7f6; color: var(--purple); }
.tool-btn.log { background: #e0f2f1; color: #00695c; }

/* ===== PAINT TOOLBAR ===== */
.paint-bar {
  background: #e8f0fe; border-bottom: 2px solid var(--primary);
  padding: 8px 12px; display: none; align-items: center; gap: 8px; flex-wrap: wrap;
  flex-shrink: 0;
}
.paint-bar.active { display: flex; }
.paint-bar-label { font-size: 12px; font-weight: 800; color: var(--primary); }
.paint-shift-btn {
  padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border);
  background: white; font-size: 12px; font-weight: 700; cursor: pointer;
  transition: all 0.15s;
}
.paint-shift-btn.active-paint { background: #ffd54f; border-color: #f9ab00; color: #5d4037; transform: scale(1.05); }
.paint-shift-btn.off-shift { color: var(--danger); border-color: var(--danger); background: #fce8e6; }

/* ===== SCHEDULE TABLE ===== */
.table-wrap { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(env(safe-area-inset-bottom) + 120px); }
table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 820px; user-select: none; }
th, td { border-right: 1px solid #e8eaed; border-bottom: 1px solid #e8eaed; padding: 6px 4px; text-align: center; vertical-align: middle; }
th { position: sticky; top: 0; z-index: 10; background: var(--primary); color: white; font-size: 13px; font-weight: 800; }
.date-sub { display: block; font-size: 10px; font-weight: 400; opacity: 0.8; }
td:first-child, th:first-child { position: sticky; left: 0; z-index: 11; background: #f8f9fa; border-right: 2px solid #dadce0; min-width: 80px; max-width: 90px; }
th:first-child { background: #1557b0; z-index: 12; }
.emp-cell { font-size: 13px; font-weight: 800; }
.role-tag { display: block; font-size: 10px; font-weight: 600; color: var(--text-muted); }

/* ===== CELL BUTTON ===== */
.cell-btn {
  width: 100%; min-height: 52px; border: 1px solid #f1f3f4; background: #fff;
  border-radius: 6px; font-size: 14px; font-weight: 700; color: var(--text);
  cursor: pointer; position: relative; transition: background 0.1s; line-height: 1.3; padding: 4px 2px;
}
.cell-btn:hover { background: #f8f9fa; }
.cell-btn.readonly { cursor: default; }
.cell-btn.readonly:hover { background: #fff; }
.cell-btn.shift-morning { border-left: 4px solid var(--primary) !important; }
.cell-btn.shift-night { border-left: 4px solid var(--night) !important; }
.cell-btn.zhi-xiu { color: var(--danger) !important; border: 2px solid var(--danger) !important; background: #fce8e6 !important; }
.cell-btn.pai-xiu { color: var(--text-muted) !important; background: #f1f3f4 !important; }
.cell-btn.unfilled { background: #fff8e1 !important; border: 2px dashed var(--warn) !important; color: #e65100 !important; }
.cell-btn.conflict { border: 2px solid var(--danger) !important; animation: conflict-blink 1.5s infinite; }
.cell-btn.req-off-pending { box-shadow: inset 0 0 0 2px var(--primary); }
/* ✅ 特休/補休專屬樣式（內建班別，不進系統設定）*/
.cell-btn.annual-leave { color: #7c3aed !important; border: 2px solid #7c3aed !important; background: #f5f3ff !important; }
.cell-btn.comp-leave   { color: #0891b2 !important; border: 2px solid #0891b2 !important; background: #ecfeff !important; }
.quick-shift-btn.annual-leave { color: #7c3aed; border-color: #7c3aed; background: #f5f3ff; }
.quick-shift-btn.comp-leave   { color: #0891b2; border-color: #0891b2; background: #ecfeff; }
.paint-shift-btn.annual-leave { color: #7c3aed; border-color: #7c3aed; background: #f5f3ff; }
.paint-shift-btn.comp-leave   { color: #0891b2; border-color: #0891b2; background: #ecfeff; }
@keyframes conflict-blink { 0%,100%{border-color:var(--danger);} 50%{border-color:var(--warn);} }
.ot-text { color: var(--danger); font-weight: 900; }
.warn-tag { display: inline-block; background: #fce8e6; color: var(--danger); font-size: 10px; padding: 1px 4px; border-radius: 4px; margin-top: 2px; border: 1px solid var(--danger); }
.req-tag { display: inline-block; background: #e8f0fe; color: var(--primary); font-size: 10px; padding: 1px 4px; border-radius: 4px; margin-top: 2px; border: 1px solid var(--primary); }
.support-pending { display: block; background: #fffde7; border: 2px solid var(--warn); color: #e65100; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 4px; margin-top: 4px; cursor: pointer; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

/* ===== TOTAL ROW ===== */
.total-row { background: #e8f5e9; }
.total-row td { font-size: 13px; font-weight: 800; color: #2e7d32; }
.note-input { width: 100%; border: none; background: transparent; text-align: center; font-size: 12px; padding: 4px; min-height: 52px; }

/* ===== MODAL ===== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(30,41,59,0.7); z-index: 5000; justify-content: center; align-items: flex-end; backdrop-filter: blur(3px); }
.modal-overlay.active { display: flex; }
.modal-box { background: white; border-radius: 22px 22px 0 0; width: 100%; max-width: 480px; padding: 20px 20px 32px; animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1); max-height: 88vh; overflow-y: auto; }
@keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
.modal-handle { width: 38px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 900; margin-bottom: 14px; }
.quick-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
.quick-shift-btn { padding: 10px 4px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 700; cursor: pointer; }
.quick-shift-btn.off { color: var(--danger); border-color: var(--danger); background: #fce8e6; }
.quick-shift-btn.clear { color: var(--text-muted); background: #f1f3f4; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.form-field { margin-bottom: 12px; }
.form-field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-field input, .form-field select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; background: #f8fafc; }
.form-field input:focus, .form-field select:focus { border-color: var(--primary); background: white; }
.quick-note-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.qnote-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--primary); background: #e8f0fe; color: var(--primary); font-size: 11px; font-weight: 700; cursor: pointer; }
.modal-action { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 10px; }
.modal-cancel { width: 100%; padding: 10px; background: none; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; margin-top: 6px; }
.conflict-warn { background: #fce8e6; border: 1.5px solid var(--danger); color: var(--danger); border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700; margin-bottom: 12px; display: none; }

/* ===== EMPLOYEE VIEW ===== */
.emp-view { flex: 1; overflow-y: auto; padding: 14px 14px calc(var(--nav-h) + 14px); }
.publish-info-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; color: white;
}
.publish-info-title { font-size: 14px; font-weight: 800; margin-bottom: 2px; }
.publish-info-time { font-size: 12px; opacity: 0.8; }
.not-published-card {
  background: white; border-radius: var(--radius); padding: 40px 20px; text-align: center;
  border: 1px solid var(--border); margin-bottom: 14px;
}
.schedule-img-wrap { background: white; border-radius: var(--radius); overflow-x: auto; overflow-y: hidden; border: 1px solid var(--border); margin-bottom: 14px; -webkit-overflow-scrolling: touch; }
.schedule-img-wrap canvas { display: block; max-width: 100%; height: auto; }
.req-off-card { background: white; border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); }
.req-off-title { font-size: 14px; font-weight: 800; margin-bottom: 12px; }
.req-day-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.req-day-row:last-child { border-bottom: none; }
.req-day-name { font-size: 14px; font-weight: 700; flex: 1; }
.req-day-shift { font-size: 12px; color: var(--text-muted); }
.req-toggle { padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 12px; font-weight: 700; cursor: pointer; }
.req-toggle.active { background: var(--primary); color: white; border-color: var(--primary); }
.locked-msg { font-size: 12px; color: var(--danger); font-weight: 600; text-align: center; padding: 8px; }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h);
  background: white; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08); z-index: 1000;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; padding: 6px 0; border: none; background: none; transition: transform 0.15s; }
.nav-item:active { transform: scale(0.9); }
.nav-icon { font-size: 22px; }
.nav-label { font-size: 10px; font-weight: 700; color: var(--text-muted); }
.nav-item.active .nav-label { color: var(--primary); }

/* ===== LOG MODAL ===== */
.log-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
.log-item:last-child { border-bottom: none; }

/* ===== APPROVAL MODAL ===== */
.approval-btns { display: flex; gap: 10px; margin-top: 16px; }
.approve-yes { flex: 1; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 800; cursor: pointer; }
.approve-no { flex: 1; padding: 14px; background: var(--danger); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 800; cursor: pointer; }

/* ===== TOAST ===== */
.toast { position: fixed; bottom: calc(var(--nav-h) + 14px); left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 9000; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== EXPORT CONTAINER ===== */
#exportContainer { display: none; position: absolute; top: 0; left: 0; z-index: -10; width: 1400px; background: #fff; padding: 40px 60px; font-family: "Microsoft JhengHei", sans-serif; }
#exportContainer table { width: 100%; border-collapse: collapse; border: 3px solid #000; table-layout: fixed; }
#exportContainer th, #exportContainer td { border: 2px solid #000 !important; background: #fff !important; color: #000 !important; text-align: center; vertical-align: middle; }

/* ===== RESPONSIVE ===== */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-title">載入班表中...</div>
  <div class="loading-sub" id="loadingSub">驗證登入狀態...</div>
</div>

<!-- APP SHELL -->
<div id="appShell">

  <!-- TOP HEADER -->
  <div class="top-header">
    <button class="header-back" onclick="window.location.href='home.html'">← 首頁</button>
    <div class="header-title" id="appTitle">📅 班表管理</div>
    <div class="header-store-badge" id="headerStoreBadge">--</div>
    <!-- 管理者/店長才顯示發布按鈕 -->
    <button class="publish-btn" id="publishBtn" style="display:none;" onclick="togglePublish()">
      <span id="publishBtnIcon">🚀</span>
      <span id="publishBtnText">發布</span>
    </button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent">

    <!-- ===== 管理者/店長 視角 ===== -->
    <div id="adminView" style="display:none; flex-direction:column; height:100%;">

      <!-- 週次 + 門市選擇 -->
      <div class="week-bar">
        <div class="week-nav-btns">
          <button class="week-btn" onclick="changeWeek(-1)" style="font-size:18px;padding:6px 14px;">‹</button>
          <input type="week" id="weekSelector" class="week-input" onchange="onWeekSelectorChange()">
          <button class="week-btn" onclick="changeWeek(1)" style="font-size:18px;padding:6px 14px;">›</button>
          <button class="week-btn" onclick="goToThisWeek()" style="background:#e8f0fe; color:#1a73e8; font-weight:800;">下週</button>
          <button class="week-btn" onclick="fetchAllStoreData()" style="font-size:16px; padding:7px 10px;">🔄</button>
        </div>
        <select id="storeSelector" class="store-select" onchange="onStoreChange()"></select>
        <div class="sync-status" id="syncStatus">
          <div class="sync-dot"></div>
          <span>已同步</span>
        </div>
      </div>

      <!-- 唯讀提示（店長看其他門市時顯示）-->
      <div id="readonlyBanner" style="display:none; background:#fff3e0; border-bottom:2px solid var(--warn); padding:8px 14px; align-items:center; gap:8px; font-size:13px; font-weight:700; color:#e65100; flex-shrink:0;">
        👁️ 目前為查閱模式，僅本店班表可編輯
      </div>
      <!-- 歷史班表鎖定提示 -->
      <div id="historyLockBanner" style="display:none; background:#fef3c7; border-bottom:2px solid #fcd34d; padding:8px 14px; align-items:center; gap:8px; font-size:13px; font-weight:700; color:#92400e; flex-shrink:0;">
        🔒 此為歷史班表（已過週次），僅供查閱。如需修改請點擊上方「✏️ 編輯歷史班表」
      </div>

      <!-- 工具列 -->
      <div class="tool-bar" id="adminToolBar">
        <button class="tool-btn paint" id="paintModeBtn" onclick="togglePaintMode()">🖌️ 畫筆</button>
        <button class="tool-btn undo" onclick="undoLastAction()">↩️ 上一步</button>
        <button class="tool-btn save" onclick="saveScheduleData(true)">💾 儲存</button>
        <button class="tool-btn img" onclick="exportImage()">📸 產圖</button>
        <button class="tool-btn add" onclick="addVirtualRow()">➕ 待補</button>
        <button class="tool-btn log" onclick="openLogModal()">📜 畫休紀錄</button>
        <button id="editHistoryBtn" class="tool-btn" style="display:none;background:#fef3c7;color:#92400e;border:1.5px solid #fcd34d;" onclick="unlockHistoryEdit()">✏️ 編輯歷史班表</button>
        <button id="compFixBtn" style="display:none;background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;" onclick="runHistoricalCompFix()">🔧 補休修復</button>
      </div>

      <!-- 畫筆選色列 -->
      <div class="paint-bar" id="paintBar">
        <span class="paint-bar-label">🖌️ 選擇班別：</span>
        <div id="paintBtns"></div>
      </div>

      <!-- 班表 -->
      <div class="table-wrap">
        <table id="scheduleTable">
          <thead><tr id="headerRow">
            <th>員工</th>
            <th>週一</th><th>週二</th><th>週三</th><th>週四</th><th>週五</th><th>週六</th><th>週日</th>
            <th>統計</th>
          </tr></thead>
          <tbody id="tableBody"></tbody>
          <tfoot id="tableFoot" style="display:none;">
            <tr class="total-row">

// ===== 全域狀態 =====
let currentUser = null;

const dayNames = ['週一','週二','週三','週四','週五','週六','週日'];
// weekStr + dayName → 'YYYY-MM-DD'
function dayToFullDate(weekStr, dayName) {
  const dIdx = dayNames.indexOf(dayName);
  if(dIdx < 0) return '';
  const mon = weekStringToDate(weekStr);
  const d = new Date(mon);
  d.setDate(mon.getDate() + dIdx);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getWeekDates(wStr) {
  let p = wStr.split('-W'); let yr = parseInt(p[0]); let wk = parseInt(p[1]);
  let d = new Date(yr, 0, 1); let day = d.getDay();
  d.setDate(d.getDate() + (wk - 1) * 7);
  let offset = day <= 4 ? 1 - day : 8 - day;
  d.setDate(d.getDate() + offset);
  let res = [];
  for(let i=0; i<7; i++) { res.push((d.getMonth()+1)+'/'+d.getDate()); d.setDate(d.getDate()+1); }
  return res;
}
function getNextWeekString() {
  let d = new Date(); d.setDate(d.getDate() + 7);
  let yr = d.getFullYear(); let first = new Date(yr, 0, 1);
  let w = Math.ceil((((d - first) / 86400000) + first.getDay() + 1) / 7);
  return `${yr}-W${w < 10 ? '0'+w : w}`;
}
function getCurrentWeekString() {
  let d = new Date();
  let yr = d.getFullYear(); let first = new Date(yr, 0, 1);
  let w = Math.ceil((((d - first) / 86400000) + first.getDay() + 1) / 7);
  return `${yr}-W${w < 10 ? '0'+w : w}`;
}
// 計算某年有幾週（ISO 8601：有 52 或 53 週）
function weeksInYear(yr) {
  const dec28 = new Date(yr, 11, 28); // 12/28 永遠在最後一週
  const first = new Date(yr, 0, 1);
  return Math.ceil((((dec28 - first) / 86400000) + first.getDay() + 1) / 7);
}

function weekStringToDate(wStr) {
  let p = wStr.split('-W'); let yr = parseInt(p[0]); let wk = parseInt(p[1]);
  let d = new Date(yr, 0, 1); let day = d.getDay();
  d.setDate(d.getDate() + (wk - 1) * 7);
  let offset = day <= 4 ? 1 - day : 8 - day;
  d.setDate(d.getDate() + offset);
  return d;
}
// ✅ 調職週判斷 Helper（全域）
// 直接複用 weekStringToDate，確保與系統其他週計算一致
function getWeekMondayStr(ws) {
  const mon = weekStringToDate(ws); // weekStringToDate 回傳週一
  return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
}
function getWeekSundayStr(ws) {
  const mon = weekStringToDate(ws);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  return `${sun.getFullYear()}-${String(sun.getMonth()+1).padStart(2,'0')}-${String(sun.getDate()).padStart(2,'0')}`;
}

function weekLabelFromStr(wStr) {
  const dates = getWeekDates(wStr);
  return `${dates[0]} ～ ${dates[6]}`;
}

// 判斷是否已自動發布：每週五 00:00 自動發布「下週」班表
// 對給定的 weekStr，其「上週五」= 該週週一 - 3 天
// 若今天 >= 上週五 00:00，代表到了可發布的時間點
function isAutoPublished(weekStr) {
  const weekMon = weekStringToDate(weekStr);
  const prevFri = new Date(weekMon);
  prevFri.setDate(weekMon.getDate() - 3); // 週一 - 3 = 上週五
  prevFri.setHours(0, 0, 0, 0);
  return new Date() >= prevFri;
}

// 判斷畫休是否已鎖定（週五前三天=週二？依原程式：往前3天=週四）
function isWeekLocked(weekStr) {
  const weekMon = weekStringToDate(weekStr);
  const lockDate = new Date(weekMon);
  lockDate.setDate(weekMon.getDate() - 3); // 前一週週五
  lockDate.setHours(0, 0, 0, 0);
  return new Date() >= lockDate;
}

// ===== 初始化 =====
window.onload = async () => {
  showLoading('驗證登入狀態...');

  // 驗證登入狀態
  // 先查 localStorage（記住我），再查 sessionStorage
  const saved = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
  if(!saved) {
    localStorage.setItem('redirectAfterLogin', 'schedule-V2.html');
    window.location.replace('home.html');
    return;
  }
  try {
    currentUser = JSON.parse(saved);
  } catch(e) {
    localStorage.removeItem('currentUser');
    sessionStorage.removeItem('currentUser');
    window.location.replace('home.html');
    return;
  }

  showLoading('載入系統設定...');
  try {
    // 先用 localStorage 快取快速顯示，同時背景讀 Firebase
    const cachedConfig = localStorage.getItem('appConfig');
    if(cachedConfig) {
      try { appConfig = JSON.parse(cachedConfig); } catch(e) {}
    }

    // 讀取設定（加 timeout 保護）
    try {
      const snap = await Promise.race([
        window.db.collection('settings').doc('globalConfig').get(),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
      ]);
      if(snap.exists) {
        appConfig = snap.data();
        localStorage.setItem('appConfig', JSON.stringify(appConfig));
      }
    } catch(e) {
      console.warn('設定讀取失敗，使用快取：', e.message);
      // 若有快取就繼續，否則用預設
      if(!appConfig.stores || appConfig.stores.length === 0) {
        appConfig = { stores: [currentUser.store || '門市'], shifts: ['7-15','15-23','23-07','18-23','指休','排休'], shiftHours: {'7-15':8,'15-23':8,'23-07':8,'18-23':5} };

    {

      empWeekStr = isAutoPublished(_nextWk) ? _nextWk : getCurrentWeekString();

      document.getElementById('empView').style.display = 'none';

      // 店長：可切換所有門市查看，但只有本店可以編輯/發布

      // 系統管理員顯示補休修復按鈕

        const fixBtn = document.getElementById('compFixBtn');
        if(fixBtn) fixBtn.style.display = 'inline-block';
      }
      await fetchAllStoreData();
    } else {
      // 查閱模式：所有人都進員工視角（查看圖片）
      document.getElementById('adminView').style.display = 'none';
      document.getElementById('empView').style.display = 'block';
      document.getElementById('appTitle').textContent = '📅 查看班表';

      // 門市選擇器初始化
      const empStoreSel = document.getElementById('empStoreSelector');
      const empStoreWrap = document.getElementById('empStoreSelectWrap');
      if(canSchedule()) {
        // 店長以上：顯示門市選擇器
        empStoreWrap.style.display = 'block';
        empStoreSel.innerHTML = '';

          empStoreSel.innerHTML += `<option value="${s}">${s}</option>`;

        // 員工：隱藏選擇器，鎖定本店

        const myStore = currentUser.store || appConfig.stores[0];
        sel.value = myStore;
      }

      // 初始化：跳到含今天的週次
      empWeekStr = getCurrentWeekString();
      updateEmpWeekLabel();
      await loadEmpView();
    }

    document.getElementById('appShell').classList.add('active');
    updateHeaderInfo();
    // 預覽模式提示
    const isPreview = sessionStorage.getItem('isPreviewMode') === '1';
    const pb = document.getElementById('previewBanner');
    if(pb) pb.classList.toggle('show', isPreview);
    hideLoading();
  } catch(e) {
    hideLoading();
    alert('載入失敗：' + e.message);
  }
};

// ===== 發布功能 =====
let weekPublishData = {}; // weekStr -> { published, publishedAt, publishedBy }

async function fetchPublishStatus(store, weekStr) {
  try {
    const snap = await window.db.collection('stores').doc(store).collection('weeks').doc(weekStr).get();
    if(snap.exists) {
      const d = snap.data();
      weekPublishData[weekStr] = {
        published: d.published || false,
        publishedAt: d.publishedAt || null,
        publishedBy: d.publishedBy || ''
      };
    } else {
      weekPublishData[weekStr] = { published: false, publishedAt: null, publishedBy: '' };
    }
    updatePublishBtn(store, weekStr);
  } catch(e) {}
}

function updatePublishBtn(store, weekStr) {
  const btn = document.getElementById('publishBtn');
  const pd = weekPublishData[weekStr] || {};
  const isPublished = pd.published || isAutoPublished(weekStr);
  // 店長只能發布本店
  if(!canScheduleStore(store)) {
    btn.style.display = 'none';
    return;
  }
  btn.style.display = 'flex';
  if(isPublished) {
    btn.classList.add('published');
    document.getElementById('publishBtnIcon').textContent = '✅';
    document.getElementById('publishBtnText').textContent = '已發布';
  } else {
    btn.classList.remove('published');
    document.getElementById('publishBtnIcon').textContent = '🚀';
    document.getElementById('publishBtnText').textContent = '發布';
  }
}

async function togglePublish() {
  const store = document.getElementById('storeSelector').value;
  const weekStr = document.getElementById('weekSelector').value;
  if(!canScheduleStore(store)) { showToast('❌ 您無權限發布此門市班表'); return; }

  const pd = weekPublishData[weekStr] || {};
  const isPublished = pd.published || isAutoPublished(weekStr);

  if(isPublished && pd.published) {
    if(!confirm('確定要取消發布嗎？員工將看不到班表。')) return;
  } else if(!isPublished) {
    if(!confirm('確定要發布此週班表嗎？員工將可以看到。')) return;
  } else {

    return;
  }

  showLoading('更新發布狀態...');

      published: newPublished,
      publishedAt: newPublished ? now.toISOString() : null,
      publishedBy: newPublished ? (currentUser.displayName || currentUser.empName) : ''
    }, { merge: true });

    };

// 歷史班表解鎖狀態（每次切換週次後重置）
let historyEditUnlocked = false;

function changeWeek(offset) {
  const input = document.getElementById('weekSelector');
  if(!input.value) return;

  // 往前限制：管理者最多查閱 2 個月前
  if(offset < 0) {
    const p = input.value.split('-W');
    let yr = parseInt(p[0]), wk = parseInt(p[1]);
    wk += offset;
    if(wk < 1) { yr--; wk = weeksInYear(yr); }
    const newWeekStr = `${yr}-W${wk < 10 ? '0'+wk : wk}`;
    const newMon = weekStringToDate(newWeekStr);
    const now = new Date();
    // 2個月前的第一天
    const limitDate = new Date(now.getFullYear(), now.getMonth() - 2, 1);
    if(newMon < limitDate) {
      showToast('⚠️ 最多只能查閱 2 個月前的班表');
      return;
    }
  }

  historyEditUnlocked = false; // 切換週次後重置解鎖狀態
  input.stepUp(offset);
  fetchAllStoreData();
}

// weekSelector 直接輸入時也套用 2 個月往前限制
function onWeekSelectorChange() {
  const val = document.getElementById('weekSelector').value;
  if(!val) return;
  const newMon = weekStringToDate(val);
  const now = new Date();
  const limitDate = new Date(now.getFullYear(), now.getMonth() - 2, 1);
  if(newMon < limitDate) {
    showToast('⚠️ 最多只能查閱 2 個月前的班表');
    // 恢復到 2 個月前的第一週
    const limitYr = limitDate.getFullYear();
    const limitFirst = new Date(limitYr, 0, 1);
    const limitWk = Math.ceil((((limitDate - limitFirst) / 86400000) + limitFirst.getDay() + 1) / 7);
    document.getElementById('weekSelector').value = `${limitYr}-W${String(limitWk).padStart(2,'0')}`;
  }
  historyEditUnlocked = false;
  fetchAllStoreData();
}

// 判斷目前選取的週次是否為已過的歷史班表
function isHistoryWeek(weekStr) {
  const weekMon = weekStringToDate(weekStr);
  const weekSun = new Date(weekMon);
  weekSun.setDate(weekMon.getDate() + 6);
  weekSun.setHours(23, 59, 59, 999);
  return new Date() > weekSun;
}

// ===== ✅ 特休/補休扣天數（全自動雙軌同步 - 終極防錯版）=====
async function deductLeave(empName, day, weekStr, prevShift, newShift) {
  const prevIsAnnual = prevShift === '特休';
  const prevIsComp   = prevShift === '補休';
  const newIsAnnual  = newShift  === '特休';
  const newIsComp    = newShift  === '補休';
  if(prevIsAnnual === newIsAnnual && prevIsComp === newIsComp) return;

  // 精確計算這格的日期 (處理跨年)
  const dIdx = dayNames.indexOf(day);
  if(dIdx < 0) return;
  const weekMon = weekStringToDate(weekStr);
  const cellDate = new Date(weekMon);
  cellDate.setDate(weekMon.getDate() + dIdx);
  const cy = cellDate.getFullYear();
  const cm = String(cellDate.getMonth()+1).padStart(2,'0');
  const cd = String(cellDate.getDate()).padStart(2,'0');
  const fullDate = `${cy}-${cm}-${cd}`;
  const ym = fullDate.slice(0, 7);
  const yearStr = String(cy);
  const savedBy = currentUser?.displayName || currentUser?.empName || '';
  
  // 🌟 關鍵修正：加入專屬時間戳記，防止資料庫吃掉重複的開關動作
  const ts = new Date().getTime(); 

  try {
    const leaveRef = window.db.collection('employees').doc(empName).collection('leaves').doc(yearStr);
    const compRef  = window.db.collection('employees').doc(empName).collection('comp').doc(yearStr);
    const logRef   = window.db.collection('employees').doc(empName).collection('leaveLog').doc(ym);
    const batchesRef = window.db.collection('employees').doc(empName).collection('leaveBatches');

    const [leaveSnap, compSnap, bSnap] = await Promise.all([
      leaveRef.get(), compRef.get(), batchesRef.get()
    ]);
    const ld = leaveSnap.exists ? leaveSnap.data() : {};
    const cdData = compSnap.exists ? compSnap.data() : {};

    // --- 特休處理 ---
    if(prevIsAnnual && !newIsAnnual) {
      await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
        date: fullDate, type: 'annual_use_cancel', days: 1, note: `${fullDate} 特休取消（排班退還）`, savedBy, ts
      })}, { merge: true });
      
      let targetBatch = null;
      bSnap.forEach(doc => {
        const b = { id: doc.id, ...doc.data() };
        if(b.used > 0 && (!targetBatch || b.grantDate > targetBatch.grantDate)) targetBatch = b;
      });
      if(targetBatch) await batchesRef.doc(targetBatch.id).update({ used: Math.max(0, targetBatch.used - 1) });
      
    } else if(!prevIsAnnual && newIsAnnual) {
      // 檢查特休餘額
      let totalAnnualRemain = 0;
      let targetBatch = null, latestBatch = null;
      bSnap.forEach(doc => {
        const b = { id: doc.id, ...doc.data() };
        if(!latestBatch || b.createdAt > latestBatch.createdAt) latestBatch = b;
        if(!b.settled) {
          const rem = (b.days||0) - (b.used||0);
          totalAnnualRemain += rem;
          if(rem > 0 && (!targetBatch || b.grantDate < targetBatch.grantDate)) targetBatch = b;
        }
      });
      if(totalAnnualRemain <= 0) {
        const proceed = confirm(`⚠️ ${getDisplayName(empName)} 特休餘額不足（剩餘 0 天）

確定要排特休嗎？餘額將變為負數。`);
        if(!proceed) {
          // 還原班別
          document.getElementById('modalShift').value = prevShift || '';
          return;
        }
      }
      await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
        date: fullDate, type: 'annual_use', days: 1, note: `${fullDate} 使用特休`, savedBy, ts
      })}, { merge: true });
      const batchToDeduct = targetBatch || latestBatch;
      if(batchToDeduct) {
        await batchesRef.doc(batchToDeduct.id).update({ used: (batchToDeduct.used||0) + 1 });
      }
    }

    // --- 補休處理 ---
    if(prevIsComp && !newIsComp) {
      await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
        date: fullDate, type: 'comp_use_cancel', days: 1, note: `${fullDate} 補休取消（排班退還）`, savedBy, ts
      })}, { merge: true });
    } else if(!prevIsComp && newIsComp) {
      // 檢查補休餘額
      const compEarned = parseFloat(cdData.earned || 0);
      const compUsed   = parseFloat(cdData.used   || 0);
      const compRemain = compEarned - compUsed;
      if(compRemain <= 0) {
        const proceed = confirm(`⚠️ ${getDisplayName(empName)} 補休餘額不足（剩餘 ${compRemain} 天）

確定要排補休嗎？餘額將變為負數。`);
        if(!proceed) {
          document.getElementById('modalShift').value = prevShift || '';
          return;
        }
      }
      await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
        date: fullDate, type: 'comp_use', days: 1,
        note: `${fullDate} 使用補休`,
        source: `schedule:${fullDate}`, // ✅ Bug6 S1：記錄使用日期，方便追溯
        savedBy, ts
      })}, { merge: true });
    }

    // --- 🌟 重新加總雙軌統計 (嚴格防錯版：分類加總後才相減) ---
    const logSnaps = await window.db.collection('employees').doc(empName).collection('leaveLog').get();
    let aUse=0, aCan=0, cEarn=0, cUse=0, cCan=0, cUseCan=0;
    
    logSnaps.forEach(doc => {
      if(!doc.id.startsWith(yearStr)) return;
      (doc.data().records || []).forEach(r => {
        const rd = parseFloat(r.days) || 0;
        if(r.type === 'annual_use')        aUse += rd;
        if(r.type === 'annual_use_cancel') aCan += rd;
        if(r.type === 'comp_earn')         cEarn += rd;
        if(r.type === 'comp_cancel')       cCan += rd;
        if(r.type === 'comp_use')          cUse += rd;
        if(r.type === 'comp_use_cancel')   cUseCan += rd;
      });
    });
    
    const finalAnnualUse = Math.max(0, aUse - aCan);
    const finalCompEarn = Math.max(0, cEarn - cCan);
    const finalCompUse = Math.max(0, cUse - cUseCan);

    await Promise.all([
      leaveRef.set({ ...ld, usedAnnual: finalAnnualUse, earnedComp: finalCompEarn, usedComp: finalCompUse, updatedAt: new Date().toISOString() }, { merge: true }),
      compRef.set({ earned: finalCompEarn, used: finalCompUse }, { merge: true })
    ]);

    // --- 🌟 強制更新畫面上的統計數字 (延遲 0.5 秒讓 DB 寫入完成) ---
    setTimeout(() => {
      const eIdx = appData.employees.findIndex(e => e.name === empName);
      if(eIdx !== -1) updateSummary(eIdx, appData.employees[eIdx]);
    }, 500);

  } catch(e) {
    console.warn('deductLeave 失敗:', e.message);
  }
}
// ===== 國定假日補休：發放 =====
async function grantHolidayComp(empName, fullDate, holidayName) {
  const year = fullDate.slice(0,4);
  const ym   = fullDate.slice(0,7);
  const savedBy = currentUser?.displayName || currentUser?.empName || '';
  const logRef  = window.db.collection('employees').doc(empName).collection('leaveLog').doc(ym);
  const compRef = window.db.collection('employees').doc(empName).collection('comp').doc(year);
  const leaveRef= window.db.collection('employees').doc(empName).collection('leaves').doc(year);

  // 防重複：檢查 leaveLog 是否已有此日 comp_earn
  const logSnap = await logRef.get();
  const existing = (logSnap.exists ? logSnap.data().records||[] : [])
    .some(r => r.type === 'comp_earn' && r.date === fullDate && (r.note||'').includes('國定假日'));
  if(existing) { showToast(`⚠️ ${empName} ${fullDate} 補休已發放過`); return false; }

  const note = `${fullDate} ${holidayName} 國定假日補休`;
  await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
    date: fullDate, type: 'comp_earn', days: 1, note,
    source: 'holiday', // ✅ Bug6 S2：標記為國定假日補休來源
    savedBy
  })}, { merge: true });

  // 同步 comp/{year}
  const compSnap = await compRef.get();
  const cd = compSnap.exists ? compSnap.data() : { earned:0, used:0 };
  await compRef.set({ earned: (cd.earned||0)+1, used: cd.used||0 }, { merge: true });

  // 同步 leaves/{year}
  const leaveSnap = await leaveRef.get();
  const ld = leaveSnap.exists ? leaveSnap.data() : {};
  await leaveRef.set({ ...ld, earnedComp: (ld.earnedComp||0)+1, updatedAt: new Date().toISOString() }, { merge: true });

  return true;
}

// ===== 國定假日補休：撤銷 =====
async function revokeHolidayComp(empName, fullDate, holidayName) {
  const year = fullDate.slice(0,4);
  const ym   = fullDate.slice(0,7);
  const savedBy = currentUser?.displayName || currentUser?.empName || '';
  const logRef  = window.db.collection('employees').doc(empName).collection('leaveLog').doc(ym);
  const compRef = window.db.collection('employees').doc(empName).collection('comp').doc(year);
  const leaveRef= window.db.collection('employees').doc(empName).collection('leaves').doc(year);

  const note = `${fullDate} ${holidayName} 國定假日補休撤銷`;
  await logRef.set({ records: firebase.firestore.FieldValue.arrayUnion({
    date: fullDate, type: 'comp_cancel', days: 1, note, savedBy
  })}, { merge: true });

  const compSnap = await compRef.get();
  const cd = compSnap.exists ? compSnap.data() : { earned:0, used:0 };
  await compRef.set({ earned: Math.max(0,(cd.earned||0)-1), used: cd.used||0 }, { merge: true });

  const leaveSnap = await leaveRef.get();
  const ld = leaveSnap.exists ? leaveSnap.data() : {};
  await leaveRef.set({ ...ld, earnedComp: Math.max(0,(ld.earnedComp||0)-1), updatedAt: new Date().toISOString() }, { merge: true });
}

// ===== 國定假日偵測：這格儲存時檢查是否需要發/撤銷補休 =====
async function checkHolidayCompOnSave(empName, fullDate, prevShift, newShift, emp) {
  // 工讀生不處理補休
  if(!emp || (emp.role||'').includes('工讀')) return;

  const holidayName = TW_HOLIDAYS_SCHED[fullDate];
  if(!holidayName) return; // 不是國定假日

  const wasWorking = prevShift && prevShift !== '排休' && prevShift !== '指休' && prevShift !== '特休' && prevShift !== '補休';
  const isWorking  = newShift  && newShift  !== '排休' && newShift  !== '指休' && newShift  !== '特休' && newShift  !== '補休';

  if(!wasWorking && isWorking) {
    // 新增上班 → 提示發放補休
    if(confirm(`🎌 ${fullDate} 是${holidayName}（國定假日）
${getDisplayName(empName)} 有上班，是否發放 1 天補休？`)) {
      const ok = await grantHolidayComp(empName, fullDate, holidayName);
      if(ok) showToast(`✅ 已發放 ${getDisplayName(empName)} ${fullDate} 補休`);
    }
  } else if(wasWorking && !isWorking) {
    // 取消上班 → 檢查是否已發補休
    const ym = fullDate.slice(0,7);
    const logSnap = await window.db.collection('employees').doc(empName).collection('leaveLog').doc(ym).get();
    const hasComp = (logSnap.exists ? logSnap.data().records||[] : [])
      .some(r => r.type === 'comp_earn' && r.date === fullDate && (r.note||'').includes('國定假日'));
    if(hasComp) {
      if(confirm(`⚠️ ${fullDate} ${holidayName} 已發放補休
${getDisplayName(empName)} 取消上班，是否一併撤銷補休？`)) {
        await revokeHolidayComp(empName, fullDate, holidayName);
        showToast(`已撤銷 ${getDisplayName(empName)} ${fullDate} 補休`);
      }
    }
  }
}

// ===== 朔及既往補休修復（系統管理員）詳細報告版 =====
async function runHistoricalCompFix() {
  if(!['admin'].includes(currentUser?.permission)) { showToast('⚠️ 僅系統管理員可執行'); return; }

  const TARGET_HOLIDAYS = {
    '2026-04-04': '兒童節',
    '2026-04-05': '清明節',
    '2026-05-01': '勞動節'
  };

  if(!confirm('即將掃描「所有門市」的 4/4、4/5、5/1 班表，補發漏掉的國定假日補休。\n\n確定執行嗎？')) return;

  showLoading('朔及既往補休修復中...');
  let report = "📊 【補休修復詳細報告】\n\n";

  try {
    let totalFixCount = 0;
    const storesToFix = (appConfig.stores && appConfig.stores.length > 0) ? appConfig.stores : [currentUser.store];
    
    // 讀取 4, 5 月涵蓋週次
    const targetWeeks = [];
    ['2026-04', '2026-05'].forEach(ym => {
      const [y, mo] = ym.split('-').map(Number);
      const firstDay = new Date(y, mo-1, 1);
      const lastDay  = new Date(y, mo, 0);
      let d = new Date(firstDay);
      while(d <= lastDay) {
        const mon = new Date(d);
        const day = mon.getDay() || 7;
        mon.setDate(mon.getDate() - day + 1);
        const yr2 = mon.getFullYear();
        const first = new Date(yr2, 0, 1);
        const w = Math.ceil((((mon - first) / 86400000) + first.getDay() + 1) / 7);
        const wStr = `${yr2}-W${w < 10 ? '0'+w : w}`;
        if(!targetWeeks.includes(wStr)) targetWeeks.push(wStr);
        d.setDate(d.getDate() + 7);
      }
    });

    const dNames = ['週一','週二','週三','週四','週五','週六','週日'];

    for(const store of storesToFix) {
      report += `🏠 門市：${store}\n`;
      let storeFixCount = 0;
      let skippedPartTime = 0;
      let noWorkCount = 0;
      let alreadyGivenCount = 0;

      const empSnap = await window.db.collection('stores').doc(store).collection('employees').get();
      const emps = [];
      empSnap.forEach(d => {
        const data = d.data();
        if(!['離職','調走'].includes(data.status)) {
          if((data.role||'').includes('工讀')) {
            skippedPartTime++;
          } else {
            emps.push({ name: d.id, ...data });
          }
        }
      });

      const weekData = {};
      await Promise.all(targetWeeks.map(async ws => {
        const snap = await window.db.collection('stores').doc(store).collection('weeks').doc(ws).get();
        weekData[ws] = snap.exists ? (snap.data().records || []) : [];
      }));

      for(const [dateStr, holName] of Object.entries(TARGET_HOLIDAYS)) {
        const [hy, hm, hd] = dateStr.split('-').map(Number);
        for(const emp of emps) {
          let hasWork = false;
          for(const [ws, recs] of Object.entries(weekData)) {
            const wsYear = parseInt(ws.split('-W')[0]);
            const wsWeek = parseInt(ws.split('-W')[1]);
            const jan1 = new Date(wsYear, 0, 1);
            const offset = (jan1.getDay() <= 4 ? 1 - jan1.getDay() : 8 - jan1.getDay());
            const mon = new Date(wsYear, 0, 1 + offset + (wsWeek-1)*7);
            
            for(let i=0; i<7; i++) {
              const cellDate = new Date(mon);
              cellDate.setDate(mon.getDate() + i);
              if(cellDate.getFullYear()===hy && cellDate.getMonth()+1===hm && cellDate.getDate()===hd) {
                const rec = recs.find(r => r.name===emp.name && r.day===dNames[i]);
                if(rec && rec.shift && !['排休','指休','特休','補休'].includes(rec.shift)) {
                  hasWork = true;
                }
              }
            }
          }

          if(hasWork) {
            const ok = await grantHolidayComp(emp.name, dateStr, holName);
            if(ok) { 
              storeFixCount++; 
              totalFixCount++;
              const loadingEl = document.getElementById('loadingSub');
              if(loadingEl) loadingEl.textContent = `修復中(${store})... 已處理 ${totalFixCount} 筆`; 
            } else {
              alreadyGivenCount++;
            }
          } else {
            noWorkCount++;
          }
        }
      }
      
      report += `   ✅ 成功補發：${storeFixCount} 筆\n`;
      report += `   ⏩ 略過工讀生：${skippedPartTime} 人\n`;
      report += `   ⏩ 沒排班或已休：${noWorkCount} 人次（每假計算）\n`;
      report += `   ⏩ 先前已發放：${alreadyGivenCount} 筆\n\n`;
    }

    report += `🎉 總計成功補發：${totalFixCount} 筆`;
    
    // 更新紀錄
    await window.db.collection('settings').doc('compFixFlag').set({ 
      done: true, doneAt: new Date().toISOString(), by: currentUser.empName, count: totalFixCount 
    });

    alert(report);
    showToast(`✅ 全門市掃描完畢！`);

  } catch(e) { 
    alert('❌ 發生錯誤：\n' + e.message); 
  }
  hideLoading();
}

async function saveScheduleData(isManual) {
  syncUIToMemory();
  const store = document.getElementById('storeSelector').value;
  const weekStr = document.getElementById('weekSelector').value;
  if(!store || !weekStr) return;
  try {
    const schedule = appData.records.filter(r => r.week === weekStr);

    let extra = {};
    if(pd.published || isAutoPublished(weekStr)) {
      extra = {
        publishedAt: new Date().toISOString(),
        publishedBy: currentUser.displayName || currentUser.empName
      };
      weekPublishData[weekStr] = { ...weekPublishData[weekStr], ...extra };
      updatePublishBtn(store, weekStr);
    }
    await window.db.collection('stores').doc(store).collection('weeks').doc(weekStr).set(
      { records: schedule, ...extra }, { merge: true }
    );
    setSyncStatus('ok', `已儲存 ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`);
    if(isManual) showToast('💾 儲存成功！');
  } catch(e) {
    setSyncStatus('err', '儲存失敗');
    showToast('❌ 儲存失敗：' + e.message);
  }
}

// ===== 操作紀錄 =====
async function loadLogs() {
  const el = document.getElementById('logContent');
  if(!el) return;
  const store = document.getElementById('storeSelector').value;
  const weekStr = document.getElementById('weekSelector').value;
  el.innerHTML = '載入中...';
  try {
    // 取得本週七天的日期範圍
    const dates = getWeekDates(weekStr); // ['M/D', ...]
    const year  = parseInt(weekStr.split('-W')[0]);
    const dateStrs = dates.map(md => {
      const [m, d] = md.split('/');
      return `${year}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    });
    const [startDate, endDate] = [dateStrs[0], dateStrs[6]];

    // 讀 leaveRequests（不需索引：直接讀全部，JS 端過濾日期範圍）
    const lrSnapAll = await window.db.collection('stores').doc(store)
      .collection('leaveRequests').get().catch(() => null);

    const typeLabel = { off:'排休', annual:'特休', comp:'補休' };
    const statusLabel = { pending:'申請中', noted:'已核', cancelled:'已取消', unfulfilled:'未實現' };
    const shiftLabel = { full:'', morning:' 早班', evening:' 晚班' };

    const logs = [];
    if(lrSnapAll) {
      lrSnapAll.forEach(d => {
        const r = d.data();
        if(r.date < startDate || r.date > endDate) return; // JS 端過濾
        const name = r.empName || '--';
        const type = typeLabel[r.type] || r.type;
        const shift = shiftLabel[r.shift] || '';
        const status = statusLabel[r.status] || r.status;
        const dateObj = new Date(r.date);
        const dateLabel = `${dateObj.getMonth()+1}/${dateObj.getDate()}`;
        const dow = ['日','一','二','三','四','五','六'][dateObj.getDay()];
        const createdAt = r.createdAt ? r.createdAt.substring(0,10) : '';
        logs.push({ date: r.date, msg:
          `<span style="color:var(--text-muted);font-size:11px;">${dateLabel}(${dow})</span>　` +
          `<strong>${name}</strong>　${type}${shift}　` +
          `<span style="background:${r.status==='noted'?'#e8f5e9':r.status==='cancelled'?'#fce8e6':'#fff3e0'};` +
          `color:${r.status==='noted'?'#2e7d32':r.status==='cancelled'?'var(--danger)':'#e65100'};` +
          `padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700;">${status}</span>` +
          (r.note ? `　<span style="font-size:11px;color:var(--text-muted);">${r.note}</span>` : '') +
          (createdAt ? `　<span style="font-size:10px;color:#ccc;">${createdAt}申請</span>` : '')
        });
      });
    }

    // 手動按日期排序（取代原本的 orderBy）
    logs.sort((a, b) => a.date.localeCompare(b.date));
    if(!logs.length) {
      el.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px 0;">本週尚無紀錄</div>';
    } else {
      el.innerHTML = logs.map(l=>`<div class="log-item">${l.msg}</div>`).join('');
    }
  } catch(e) { el.innerHTML = `<div style="color:var(--danger);">讀取失敗：${e.message}</div>`; }
}

// ===== 資料載入 =====
async function fetchAllStoreData() {
  const store = document.getElementById('storeSelector').value;
  const weekStr = document.getElementById('weekSelector').value;
  if(!store || !weekStr) return;

  localStorage.setItem('lastStore', store);
  document.getElementById('headerStoreBadge').textContent = store;
  setSyncStatus('syncing', '同步中...');
  historyEditUnlocked = false; // 切換門市或重新載入時重置解鎖狀態

  // 店長切換到非本店時，工具列改為唯讀提示
  const isMyStore = canScheduleStore(store);
  const toolBar = document.getElementById('adminToolBar');
  if(toolBar) {
    toolBar.style.opacity = isMyStore ? '1' : '0.4';
    toolBar.style.pointerEvents = isMyStore ? 'auto' : 'none';
  }
  const readonlyBanner = document.getElementById('readonlyBanner');
  if(readonlyBanner) readonlyBanner.style.display = isMyStore ? 'none' : 'flex';

  appData.allStoresRecords = [];
  appData.allStoresEmployees = {};

  showLoading('讀取班表資料...');
  try {
    // ✅ 計算「目前選取週次所在月份」涵蓋的所有週次供月統計使用
    // 例：查 6/19 那週（2026-W25），就讀 6 月的所有週次
    const weekMon = weekStringToDate(weekStr);
    const schedYr = weekMon.getFullYear();
    const schedMo = weekMon.getMonth(); // 0-indexed
    const currentMonthStr = `${schedYr}-${String(schedMo+1).padStart(2,'0')}`;

    // 收集班表週次所在月份的所有週次
    const monthWeeks = new Set([weekStr]); // 當前班表週一定要讀（顯示用）
    const daysInMonth = new Date(schedYr, schedMo+1, 0).getDate();
    for(let d = 1; d <= daysInMonth; d++) {
      const dateObj = new Date(schedYr, schedMo, d);
      const yr2 = dateObj.getFullYear();
      const first2 = new Date(yr2, 0, 1);
      const w2 = Math.ceil((((dateObj - first2) / 86400000) + first2.getDay() + 1) / 7);
      monthWeeks.add(`${yr2}-W${w2 < 10 ? '0'+w2 : w2}`);
    }

    // 平行讀取：本店員工 + 本週班表 + 跨店支援（其他店本週）+ displayName + 班別設定
    const [mainEmpSnap, mainWeekSnap, cfgSnap, accSnap] = await Promise.all([
      window.db.collection('stores').doc(store).collection('employees').get(),
      window.db.collection('stores').doc(store).collection('weeks').doc(weekStr).get(),
      window.db.collection('stores').doc(store).collection('config').doc('shifts').get().catch(()=>null),
      window.db.collection('account').where('store','==',store).get().catch(()=>null)
    ]);

    // 員工名單
    appData.employees = [];
    const mainWeekRecs = (mainWeekSnap.exists && mainWeekSnap.data().records) ? mainWeekSnap.data().records : [];
    const scheduledNames = mainWeekRecs.filter(r => r.shift && r.shift !== '').map(r=>r.name);

    // ✅ 排班系統生效日用「下週一」判斷
    const todaySched = new Date(); todaySched.setHours(0,0,0,0);
    const dow = todaySched.getDay() || 7;
    const nextMon = new Date(todaySched); nextMon.setDate(todaySched.getDate() + (8 - dow));
    const nextMonStr = `${nextMon.getFullYear()}-${String(nextMon.getMonth()+1).padStart(2,'0')}-${String(nextMon.getDate()).padStart(2,'0')}`;

    // ✅ 調職顯示邏輯：
    // - 已發布的週：一律正常顯示
    // - 未發布，transferDate 當週：顯示＋標注（已調職）
    // - 未發布，transferDate 之後：隱藏
    const isPublished = mainWeekSnap.exists && (mainWeekSnap.data().published || false);
    const weekMonStr = getWeekMondayStr(weekStr);
    const weekSunStr = getWeekSundayStr(weekStr);

    mainEmpSnap.forEach(d => {
      const data = d.data();
      const status = data.status;

      // 正常員工：直接顯示
      if(!['離職','調走'].includes(status)) {
        appData.employees.push({ name: d.id, ...data });
        return;
      }

      // 離職：永遠隱藏（不管有無 retireDate、不管是否已發布）
      if(status === '離職') return;

      // 調走：依 transferDate 判斷
      const effectDate = data.transferDate;
      if(!effectDate) return; // 沒有生效日視為已生效，隱藏

      if(isPublished) {
        // 已發布的週：調走員工一律正常顯示（方便核對歷史）
        appData.employees.push({ name: d.id, ...data });
      } else if(effectDate > weekSunStr) {
        // transferDate 在本週之後：正常顯示
        appData.employees.push({ name: d.id, ...data });
      } else if(effectDate >= weekMonStr && effectDate <= weekSunStr) {
        // transferDate 在本週：顯示＋標注（已調職）
        appData.employees.push({ name: d.id, ...data, _transferThisWeek: true });
      }
      // transferDate 已過本週：隱藏
    });
    appData.employees.sort((a,b) => (a.sortKey||0)-(b.sortKey||0));

    // displayName 對應表
    appData.displayNameMap = {};
    if(accSnap) accSnap.forEach(d => {
      const acc = d.data();
      if(acc.empName && acc.displayName) appData.displayNameMap[acc.empName] = acc.displayName;
    });

    // 班別設定
    if(cfgSnap && cfgSnap.exists) {
      const cfg = cfgSnap.data();
      appConfig.shifts = cfg.shifts || appConfig.shifts;
      appConfig.shiftHours = cfg.shiftHours || appConfig.shiftHours;
      appConfig.quickNotes = cfg.quickNotes || appConfig.quickNotes;
    }

    // 讀取本店當月所有週次 + 其他店本週（跨店支援用）
    appData.allStoresRecords = [];
    const otherStores = (appConfig.stores||[]).filter(s => s !== store);

    const allFetches = [];
    // 本店當月週次
    [...monthWeeks].forEach(wk => {
      allFetches.push(
        window.db.collection('stores').doc(store).collection('weeks').doc(wk).get()
          .then(snap => { if(snap.exists && snap.data().records) snap.data().records.forEach(r => appData.allStoresRecords.push({...r,_store:store,week:wk})); })
          .catch(()=>{})
      );
    });
    // 其他店員工名單 + 本月所有週次班表（跨店支援用）
    // ✅ 修正：doc(s) 讀其他店；同時讀本月每週而非只讀當週，確保月累計工時正確
    otherStores.forEach(s => {
      allFetches.push(
        window.db.collection('stores').doc(s).collection('employees').get()
          .then(snap => {
            const emps=[];
            snap.forEach(d=>{ if(!['離職','調走'].includes(d.data().status)) emps.push(d.id); });
            appData.allStoresEmployees[s]=emps;
          })
          .catch(()=>{})
      );
      // ✅ 讀其他門市的 displayName，補入 displayNameMap
      allFetches.push(
        window.db.collection('account').where('store','==',s).get()
          .then(snap => {
            snap.forEach(d => {
              const acc = d.data();
              if(acc.empName && acc.displayName) appData.displayNameMap[acc.empName] = acc.displayName;
            });
          })
          .catch(()=>{})
      );
      // 讀其他店「本月所有週次」，只取有支援本店員工的記錄（含 pending + approved）
      [...monthWeeks].forEach(wk => {
        allFetches.push(
          window.db.collection('stores').doc(s).collection('weeks').doc(wk).get()
            .then(snap => {
              if(snap.exists && snap.data().records) {
                snap.data().records
                  // ✅ 同時讀 pending（待審核徽章用）和 approved（跨店支援顯示用）
                  .filter(r => r.supportEmp && r.supportEmp.startsWith(store + '-') &&
                    (r.approvalStatus === 'approved' || r.approvalStatus === 'pending'))
                  .forEach(r => appData.allStoresRecords.push({...r, _store:s, week:wk}));
              }
            })
            .catch(()=>{})
        );
      });
    });

    await Promise.all(allFetches);

    // leaveRequests: 讀本週七天（改用 store 單欄索引 + JS 端過濾日期，不需複合索引）
    try {
      const wMon = weekStringToDate(weekStr);
      const wSun = new Date(wMon); wSun.setDate(wMon.getDate() + 6);
      const pad = n => String(n).padStart(2,"0");
      const dateFrom = wMon.getFullYear()+"-"+pad(wMon.getMonth()+1)+"-"+pad(wMon.getDate());
      const dateTo   = wSun.getFullYear()+"-"+pad(wSun.getMonth()+1)+"-"+pad(wSun.getDate());
      // 不加任何 where 條件，直接讀整個子集合再 JS 過濾日期（不需任何索引）
      const lrSnap = await window.db.collection("stores").doc(store).collection("leaveRequests").get();
      appData.leaveRequests = [];
      lrSnap.forEach(d => {
        const r = d.data();
        if(r.date >= dateFrom && r.date <= dateTo)
          appData.leaveRequests.push({ id: d.id, ...r });
      });
      console.log('[leaveRequests] loaded:', appData.leaveRequests.length, 'records for', dateFrom, '~', dateTo);
    } catch(e) {
      console.error('[leaveRequests] 讀取失敗:', e.message);
      appData.leaveRequests = [];
    }

    appData.allStoresEmployees[store] = appData.employees.map(e=>e.name);
    appData.records = appData.allStoresRecords.filter(r => r._store === store);
    virtualRowNames = [...new Set(mainWeekRecs.map(r=>r.name).filter(n=>n&&n.startsWith('🆘')))];

    // 發布狀態
    await fetchPublishStatus(store, weekStr);

    // 唯讀提示
    const curStore = document.getElementById('storeSelector').value;
    const isReadonlyStore = (currentUser.permission === 'manager' && curStore !== currentUser.store);
    const pubBtn = document.getElementById('publishBtn');
    if(pubBtn) pubBtn.style.display = isReadonlyStore ? 'none' : 'flex';

    let roBar = document.getElementById('readonlyBar');
    if(isReadonlyStore) {
      if(!roBar) {
        roBar = document.createElement('div');
        roBar.id = 'readonlyBar';
        roBar.style.cssText = 'background:#fff3e0;color:#e65100;font-size:12px;font-weight:700;text-align:center;padding:6px;border-bottom:1px solid #ffcc80;';
        document.getElementById('adminView').insertBefore(roBar, document.querySelector('.week-bar'));
      }
      roBar.textContent = `👁️ 目前查看 ${curStore}（唯讀，無法編輯）`;
      roBar.style.display = 'block';
    } else {
      if(roBar) roBar.style.display = 'none';
    }

    renderSupportDropdown();
    renderTable();
    setSyncStatus('ok', '已同步');
  } catch(e) {
    setSyncStatus('err', '同步失敗');
    showToast('❌ 讀取失敗：' + e.message);
    console.error(e);
  }
  hideLoading();
}

function empChangeWeek(offset) {
  const p = empWeekStr.split('-W');
  let yr = parseInt(p[0]), wk = parseInt(p[1]);
  wk += offset;
  if(wk < 1) { yr--; wk = weeksInYear(yr); }
  if(wk > weeksInYear(yr)) { yr++; wk = 1; }
  const newWeekStr = `${yr}-W${wk < 10 ? '0'+wk : wk}`;
  const perm = currentUser?.permission || 'employee';
  const isOwnerAdmin = ['owner','admin'].includes(perm);

  // ===== 往前限制：最多到上個月 =====
  if(offset < 0 && !isOwnerAdmin) {
    const now = new Date();
    const limitMonth = now.getMonth() === 0
      ? `${now.getFullYear()-1}-12`
      : `${now.getFullYear()}-${String(now.getMonth()).padStart(2,'0')}`;
    const newDates = getWeekDates(newWeekStr);
    const newYr = newWeekStr.split('-W')[0];
    const weekMonths = newDates.map(d => {
      const mo = d.split('/')[0].padStart(2,'0');
      return `${newYr}-${mo}`;
    });
    if(!weekMonths.some(m => m >= limitMonth)) {
      showToast('⚠️ 最多只能查閱上個月的班表');
      return;
    }
  }

  // ===== 往後限制 =====
  if(offset > 0) {
    // 計算下下週的週字串
    const curWeekStr = getCurrentWeekString();
    const cp = curWeekStr.split('-W');
    let cy = parseInt(cp[0]), cw = parseInt(cp[1]);
    // 最大週次：加盟主/管理者→下下週，員工/店長→下下週（皆同）
    const maxOffset = isOwnerAdmin ? 2 : 2;
    let maxW = cw + maxOffset, maxY = cy;
    if(maxW > weeksInYear(maxY)) { maxW -= weeksInYear(maxY); maxY++; }
    const maxWeekStr = `${maxY}-W${maxW < 10 ? '0'+maxW : maxW}`;
    if(newWeekStr > maxWeekStr) {
      showToast('⚠️ 最多只能查閱到下下週');
      return;
    }
  }

  empWeekStr = newWeekStr;
  updateEmpWeekLabel();
  loadEmpView();
}

function getWeekNumber(date) {
  const d = new Date(date);
  const firstDay = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - firstDay) / 86400000) + firstDay.getDay() + 1) / 7);
}

  const store = (empStoreSel?.value) || (adminStoreSel?.value) || currentUser.store;
  if(!store) return;

  showLoading('載入班表...');

  const infoCard = document.getElementById('publishInfoCard');
  const notPubCard = document.getElementById('notPublishedCard');
  const imgWrap = document.getElementById('scheduleImgWrap');
  try {
    // 平行讀取：班表 + 員工名單 + 其他門市本週記錄 + displayName（跨店支援用）
    const otherStores = (appConfig.stores || []).filter(s => s !== store);
    const [weekSnap, empSnap, accSnap, ...otherSnaps] = await Promise.all([
      window.db.collection('stores').doc(store).collection('weeks').doc(empWeekStr).get(),
      window.db.collection('stores').doc(store).collection('employees').get(),
      window.db.collection('account').where('store','==',store).get().catch(()=>null),
      ...otherStores.map(s =>
        window.db.collection('stores').doc(s).collection('weeks').doc(empWeekStr).get()
          .catch(() => null)
      )
    ]);

    // ✅ 建立 displayNameMap（員工視角也需要顯示正確姓名）
    appData.displayNameMap = {};
    if(accSnap) accSnap.forEach(d => {
      const acc = d.data();
      if(acc.empName && acc.displayName) appData.displayNameMap[acc.empName] = acc.displayName;
    });

    const data = weekSnap.exists ? weekSnap.data() : {};
    const records = data.records || [];
    const published = data.published || false;
    const publishedAt = data.publishedAt || null;
    const isVisible = published || isAutoPublished(empWeekStr);

    if(isVisible) {
      infoCard.style.display = 'block';
      notPubCard.style.display = 'none';
      imgWrap.style.display = 'block';

      document.getElementById('publishInfoTitle').textContent = `📅 ${weekLabelFromStr(empWeekStr)} 班表`;
      if(publishedAt) {
        const d = new Date(publishedAt);
        document.getElementById('publishInfoTime').textContent =
          `最後更新：${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} · ${data.publishedBy || ''}`;
      } else {
        document.getElementById('publishInfoTime').textContent = '已自動發布（週五後自動公開）';
      }

      let emps = [];
      // ✅ 員工視角 transferDate 判斷（與管理員視角邏輯一致）
      const empViewPublished = weekSnap.exists && (weekSnap.data().published || false);
      const evWeekMonStr = getWeekMondayStr(empWeekStr);
      const evWeekSunStr = getWeekSundayStr(empWeekStr);
      empSnap.forEach(d => {
        const data = d.data();
        const status = data.status;
        if(!['離職','調走'].includes(status)) { emps.push({ name: d.id, ...data }); return; }

        // 離職：永遠隱藏
        if(status === '離職') return;

        // 調走：依 transferDate 判斷
        const effectDate = data.transferDate;
        if(!effectDate) return;

        if(empViewPublished) {
          emps.push({ name: d.id, ...data });
        } else if(effectDate > evWeekSunStr) {
          emps.push({ name: d.id, ...data });
        } else if(effectDate >= evWeekMonStr && effectDate <= evWeekSunStr) {
          emps.push({ name: d.id, ...data, _transferThisWeek: true });
        }
        // 已過調職日：隱藏
      });
      emps.sort((a,b) => (a.sortKey||0) - (b.sortKey||0));

      // ✅ 收集其他門市的支援記錄（supportEmp 指向本店 且 approved）
      const supportRecords = []; // 格式與本店 records 一致
      const supportEmpsAdded = new Set(); // 避免重複加入員工列

      otherSnaps.forEach((snap, idx) => {
        if(!snap || !snap.exists) return;
        const fromStore = otherStores[idx];
        (snap.data().records || []).forEach(r => {
          // 找出「要來本店支援」且已核准的記錄
          if(r.supportEmp === `${store}-${r.name}` && r.approvalStatus === 'approved') {
            // 把這筆記錄轉換成本店視角：name 就是支援者本人
            supportRecords.push({ ...r, _fromStore: fromStore });
            supportEmpsAdded.add(`${fromStore}-${r.name}`);
          }
        });
      });

      // ✅ 把支援人員加入員工列（如果本店沒有這個人）
      const supportEmpObjs = [];
      supportEmpsAdded.forEach(key => {
        const [fromStore, empName] = key.split('-');
        if(!emps.find(e => e.name === empName)) {
          supportEmpObjs.push({
            name: empName,
            _isSupport: true,
            _fromStore: fromStore,
            sortKey: 9999
          });
        }
      });

      // 支援人員排在本店員工後面
      const allEmps = [...emps, ...supportEmpObjs];

      // ✅ 合併 records：本店記錄 + 支援者在本店的班別記錄
      // 支援者的記錄以 supportRecords 為主（因為班別存在對方門市）
      const mergedRecords = [...records];
      supportRecords.forEach(sr => {
        // 只有在 mergedRecords 沒有這個人這天的記錄時才加
        const exists = mergedRecords.find(r => r.name === sr.name && r.day === sr.day);
        if(!exists) {
          mergedRecords.push({
            name: sr.name,
            day: sr.day,
            week: sr.week,
            shift: sr.shift,
            location: `來自${sr._fromStore}`,
            note: sr.note || '',
            actualHours: sr.actualHours || 0,
            isOT: sr.isOT || false,
            supportEmp: '',
            approvalStatus: 'approved',
            requestOff: false
          });
        }
      });

      renderEmpCanvas(store, empWeekStr, mergedRecords, allEmps);
    } else {
      infoCard.style.display = 'none';
      notPubCard.style.display = 'block';
      imgWrap.style.display = 'none';
    }
  } catch(e) {
    showToast('載入失敗：' + e.message);
    infoCard.style.display = 'none';
    notPubCard.style.display = 'block';
    imgWrap.style.display = 'none';
  }
  hideLoading();
}

function renderEmpCanvas(store, weekStr, records, emps) {
  const canvas = document.getElementById('scheduleCanvas');
  const dates = getWeekDates(weekStr);
  // 加入 virtual rows（🆘 緊急人力），與店長產圖保持一致
  const virtualRows = [...new Set(records.map(r=>r.name).filter(n=>n&&n.startsWith('🆘')))];
  const allEmpsWithVirtual = [...emps];
  virtualRows.forEach(n => { if(!allEmpsWithVirtual.find(e=>e.name===n)) allEmpsWithVirtual.push({ name:n, role:'待補' }); });
  drawScheduleCanvas(canvas, store, weekStr, records, allEmpsWithVirtual, dates, records);
  canvas.style.maxWidth = '100%';
  canvas.style.height = 'auto';
}

async function toggleReqOff(day, current) {
  const store = currentUser.store;
  const weekStr = empWeekStr;
  const empName = currentUser.empName;
  if(!confirm(current ? `取消 ${day} 的排休申請？` : `申請 ${day} 排休？`)) return;

  showLoading('更新中...');
  try {
    const snap = await window.db.collection('stores').doc(store).collection('weeks').doc(weekStr).get();
    let records = (snap.exists && snap.data().records) ? snap.data().records : [];
    const idx = records.findIndex(r => r.name === empName && r.day === day && r.week === weekStr);
    const newVal = !current;
    if(idx !== -1) records[idx].requestOff = newVal;
    else records.push({ week: weekStr, day, name: empName, shift: '', location: '本店', note: '', requestOff: newVal });

    const now = new Date();
    const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    const logMsg = `[${timeStr}] ${currentUser.displayName} 對 ${day} ${newVal?'提出申請':'取消申請'}`;

    await window.db.collection('stores').doc(store).collection('weeks').doc(weekStr).set({
      records,
      logs: firebase.firestore.FieldValue.arrayUnion(logMsg)
    }, { merge: true });

    showToast(newVal ? `✅ 已申請 ${day} 排休` : `已取消 ${day} 排休申請`);
    await loadEmpView();
  } catch(e) {
    showToast('❌ 失敗：' + e.message);
  }
  hideLoading();
}

function updateCellUI(btn, extraHtml='') {
  const s=btn.dataset.shift, h=btn.dataset.hours, l=btn.dataset.loc, n=btn.dataset.note;
  const isOT=(btn.dataset.ot==='true'), isHourly=(btn.dataset.hourly==='true'), w=btn.dataset.warn||'';
  const supportEmp=btn.dataset.support, approvalStatus=btn.dataset.approval;
  const requestOff=(btn.dataset.reqoff==='true');
  const isVirtual=btn.dataset.emp.startsWith('🆘');
  const hVal=parseFloat(h)||0;

  btn.classList.remove('unfilled','zhi-xiu','pai-xiu','shift-night','shift-morning','conflict','annual-leave','comp-leave');

  let txt='';
  if(isVirtual && !supportEmp && s && s!=='排休' && s!=='指休') {
    btn.classList.add('unfilled');
    txt=`<span class="ot-text">${s}</span>`;
    if(n) txt+=`<br><small style="color:#0088aa;">${n}</small>`;
    btn.innerHTML=txt+extraHtml; return;
  }

  if(s==='指休') { txt='休'; btn.classList.add('zhi-xiu'); }
  else if(s==='排休') { txt='休'; btn.classList.add('pai-xiu'); }
  // ✅ 特休/補休：專屬樣式，不走 shift-morning/night
  else if(s==='特休') { txt='🏖️<br><small>特休</small>'; btn.classList.add('annual-leave'); }
  else if(s==='補休') { txt='🗓️<br><small>補休</small>'; btn.classList.add('comp-leave'); }
  else if(s) {
    if(isOT) txt=`<span class="ot-text">${s}</span>`;
    else if(hVal>8 && s.includes('-')) {
      const p=s.split('-');
      txt=p.length===2 ? `${p[0]}-<span class="ot-text">${p[1]}</span>` : s;
    } else txt=s;
    const start=parseInt(s);
    if(start>=15||start<6) btn.classList.add('shift-night');
    else btn.classList.add('shift-morning');
  } else { txt='+'; }

  if(h && parseFloat(h)!==(appConfig.shiftHours||{})[s] && s!=='排休' && s!=='指休' && s!=='特休' && s!=='補休' && s)
    txt+=`<br><small>(${Math.round(parseFloat(h))}h)</small>`;

  if(isVirtual && supportEmp) {
    const empOnly=supportEmp.split('-')[1]||supportEmp;
    txt+=approvalStatus==='pending'
      ? `<br><small style="color:#e65100;font-weight:700;">${empOnly}<br>(待審)</small>`
      : `<br><small style="color:var(--primary);font-weight:900;">${empOnly}</small>`;
  }
  if(l && l!=='本店' && !isVirtual) txt+=`<br><small style="color:var(--danger);font-weight:800;">📍${l}</small>`;
  if(n) txt+=`<br><small style="color:#0088aa;">${n}</small>`;

  const hasConflict=(s && s!=='排休' && s!=='指休' && requestOff);
  if(hasConflict) { btn.classList.add('conflict'); txt+=`<br><span style="background:var(--danger);color:white;padding:1px 3px;border-radius:3px;font-size:10px;">⚠️ 衝突</span>`; }
  else if(requestOff) txt+=`<br><span class="req-tag">🙋‍♀️ 排休</span>`;
  // 時薪另計：休假樣式 + 顯示時數
  if(isHourly) {
    const hVal = btn.dataset.hours || '0';
    txt += `<br><span style="background:#f3e8ff;color:#7c3aed;padding:1px 4px;border-radius:3px;font-size:10px;font-weight:700;">時 ${hVal}h</span>`;
  }

  // ✅ 疊加 leaveRequests 劃休申請標籤（只在管理者視角 + 班別尚未填入時顯示）
  if(!isVirtual && (appData.leaveRequests||[]).length > 0) {
    const empName = btn.dataset.emp;
    const day = btn.dataset.day;
    const weekStr = document.getElementById('weekSelector')?.value;
    const fullDate = dayToFullDate(weekStr, day);
    const lr = appData.leaveRequests.find(r =>
      r.empName === empName && r.date === fullDate &&
      !['cancelled','unfulfilled'].includes(r.status)
    );
    if(lr) {
      // 若班別已對應假別 → 申請已處理，不再顯示標籤
      const alreadyHandled =
        (lr.type === 'annual' && s === '特休') ||
        (lr.type === 'comp'   && s === '補休') ||
        (lr.type === 'off'    && (s === '排休' || s === '指休'));
      if(!alreadyHandled) {
        const lrLabel = lr.type==='annual'?'🏖️特休申請':lr.type==='comp'?'🗓️補休申請':'📝排休許願';
        const lrColor = lr.type==='annual'?'#9334e6':lr.type==='comp'?'#0891b2':'var(--primary)';
        const lrBg   = lr.type==='annual'?'#f3e8ff':lr.type==='comp'?'#ecfeff':'#e8f0fe';
        txt += `<br><span style="background:${lrBg};color:${lrColor};padding:1px 4px;border-radius:4px;font-size:10px;font-weight:700;">${lrLabel}</span>`;
      }
    }
  }

  btn.innerHTML=txt+extraHtml;
}

// ===== 排班衝突偵測 =====
function detectScheduleConflicts(empName, day, weekStr, newShift, newHours) {
  const warnings = [];
  const errors   = [];
  if(!newShift || newShift === '排休' || newShift === '指休' || newShift === '清空') return { warnings, errors };

  const dates    = getWeekDates(weekStr);
  const dayIdx   = dayNames.indexOf(day);
  const [m, d]   = (dates[dayIdx] || '').split('/');
  const year     = weekStr.split('-W')[0];
  const dateStr  = `${year}-${(m||'').padStart(2,'0')}-${(d||'').padStart(2,'0')}`;

  // 1. 同天跨門市衝突（強制錯誤）
  const crossConflict = appData.allStoresRecords.filter(r =>
    r.name === empName && r.day === day && r.week === weekStr &&
    r._store !== document.getElementById('storeSelector').value &&
    r.shift && r.shift !== '排休' && r.shift !== '指休'
  );
  if(crossConflict.length > 0) {
    const otherStore = crossConflict[0]._store;
    errors.push(`🔴 ${empName} 同天已在「${otherStore}」排班，無法同時排在兩個門市！`);
  }

  // 2. 加班超時（單日 > 12h，警告）
  const h = parseFloat(newHours) || 0;
  if(h > 12) {
    warnings.push(`⚠️ ${empName} 單日工時 ${h}h，超過 12 小時`);
  }

  // 3. 連續工作天數（第七天，警告）
  if(dayIdx >= 0) {
    let consecutive = 0;
    // 往前數連續工班天數（含今天）
    for(let i = dayIdx; i >= 0; i--) {
      const checkDay = dayNames[i];
      const checkRec = appData.records.find(r =>
        r.name === empName && r.day === checkDay && r.week === weekStr
      );
      const checkShift = (i === dayIdx) ? newShift : (checkRec?.shift || '');
      if(checkShift && checkShift !== '排休' && checkShift !== '指休' && checkShift !== '清空') {
        consecutive++;
      } else { break; }
    }
    // 往後數（下週的連續情況不在本週計算，簡化處理）
    if(consecutive >= 7) {
      warnings.push(`⚠️ ${empName} 本週連續出勤已達 ${consecutive} 天（第七天）`);
    }
  }

  // 4. 距上次下班未達 11 小時（警告）
  // 從班別字串解析下班時間，例如 "7-15" → 下班 15:00
  function parseEndHour(shift) {
    if(!shift || !shift.includes('-')) return null;
    const parts = shift.split('-');
    return parseInt(parts[1]);
  }
  function parseStartHour(shift) {
    if(!shift || !shift.includes('-')) return null;
    return parseInt(shift.split('-')[0]);
  }

  const prevDayIdx = dayIdx - 1;
  if(prevDayIdx >= 0) {
    const prevDay = dayNames[prevDayIdx];
    const prevRec = appData.records.find(r =>
      r.name === empName && r.day === prevDay && r.week === weekStr
    );
    const prevEnd   = parseEndHour(prevRec?.shift || '');
    const curStart  = parseStartHour(newShift);
    if(prevEnd !== null && curStart !== null) {
      // 夜班跨日計算（ex: 前天 15-23，今天 7-15 → 間隔 8h < 11h）
      let gap = curStart - prevEnd;
      if(gap < 0) gap += 24; // 跨日
      if(gap < 11 && gap >= 0) {
        warnings.push(`⚠️ ${empName} 距前一班下班僅 ${gap} 小時（未達 11 小時休息）`);
      }
    }
  }

  return { warnings, errors };
}

function applyShift() {
  pushToUndo(currentCell);
  const isVirtual = currentCell.dataset.emp.startsWith('🆘');

  // ✅ 排班衝突偵測（非虛擬行才檢查）
  if(!isVirtual) {
    const empName  = currentCell.dataset.emp;
    const day      = currentCell.dataset.day;
    const weekStr  = document.getElementById('weekSelector').value;
    const newShift = document.getElementById('modalShift').value;
    const newHours = document.getElementById('modalHours').value;

    if(newShift && newShift !== '排休' && newShift !== '指休' && newShift !== '清空') {
      const { warnings, errors } = detectScheduleConflicts(empName, day, weekStr, newShift, newHours);

      // 強制錯誤（同時間不同門市）→ 必須中止
      if(errors.length > 0) {
        alert(errors.join('\n\n') + '\n\n請修正後再儲存。');
        return;
      }

      // 警告（允許繼續，但提示）
      if(warnings.length > 0) {
        const proceed = confirm(warnings.join('\n') + '\n\n確定要繼續排班嗎？');
        if(!proceed) return;
      }
    }
  }

  const prevShift = currentCell.dataset.shift;
  currentCell.dataset.shift=document.getElementById('modalShift').value;
  currentCell.dataset.hours=document.getElementById('modalHours').value;
  currentCell.dataset.ot=document.getElementById('modalOT').checked;
  currentCell.dataset.hourly=document.getElementById('modalHourly').checked;
  currentCell.dataset.note=document.getElementById('modalNote').value;
  if(isVirtual) {
    currentCell.dataset.loc='本店';
    currentCell.dataset.support=document.getElementById('modalSupportEmp').value;
    currentCell.dataset.approval=document.getElementById('modalApproval').value;
  } else {
    currentCell.dataset.loc=document.getElementById('modalLocation').value;
    if(document.getElementById('clearReqWrap').style.display!=='none' && document.getElementById('clearReqCheck').checked) {
      currentCell.dataset.reqoff='false';
      // ✅ bug fix：取消 requestOff 後，若格子無任何實際資料，清除 records 裡的空記錄
      // 防止備註欄（或其他欄位）殘留空字串導致 updateCellUI 顯示異常
      const _weekStr = document.getElementById('weekSelector').value;
      const _empName = currentCell.dataset.emp;
      const _day = currentCell.dataset.day;
      const _newShift = document.getElementById('modalShift').value.trim();
      const _newNote = document.getElementById('modalNote').value.trim();
      if(!_newShift && !_newNote) {
        const _idx = appData.records.findIndex(r =>
          r.name===_empName && r.day===_day && r.week===_weekStr
        );
        if(_idx !== -1) {
          const _rec = appData.records[_idx];
          // 若沒有其他有意義的資料，直接移除
          if(!_rec.shift && !_rec.note && !_rec.supportEmp) {
            appData.records.splice(_idx, 1);
          }
        }
      }
    }
  }
  // ✅ 特休/補休：扣天數（非虛擬行才扣）
  if(!isVirtual) {
    const newShift = currentCell.dataset.shift;
    const empName  = currentCell.dataset.emp;
    const day      = currentCell.dataset.day;
    const weekStr  = document.getElementById('weekSelector').value;
    deductLeave(empName, day, weekStr, prevShift, newShift);

    // 🎌 國定假日補休偵測
    const dates2 = getWeekDates(weekStr);
    const dIdx2  = dayNames.indexOf(day);
    if(dIdx2 >= 0) {
      const [m2, d2] = dates2[dIdx2].split('/');
      const fullDate2 = `${weekStr.split('-W')[0]}-${m2.padStart(2,'0')}-${d2.padStart(2,'0')}`;
      const emp2 = appData.employees?.find(e => e.name === empName);
      checkHolidayCompOnSave(empName, fullDate2, prevShift, newShift, emp2);
    }
  }
  syncUIToMemory();
  renderTable();
  closeModal('shiftModal');
  triggerAutoSave();
}

function updateDailyTotals() {
  const sums=[0,0,0,0,0,0,0];
  document.querySelectorAll('.cell-btn').forEach(b=>{
    const idx=dayNames.indexOf(b.dataset.day);
    // 支援別間（location 非本店）不計入當日門市工時

  });
