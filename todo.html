<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--accent:#34a853;
  --danger:#d93025;--warn:#f9ab00;--purple:#9334e6;
  --orange:#e67e22;--bg:#f4f6fb;--text:#1e293b;
  --text-muted:#64748b;--border:#e2e8f0;--header-h:56px;--radius:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--text);}

#loadingOverlay{display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#1a73e8,#0d47a1);z-index:99999;flex-direction:column;justify-content:center;align-items:center;color:white;transition:opacity 0.4s;}
#loadingOverlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}

#appShell{display:none;flex-direction:column;height:100%;}
#appShell.active{display:flex;}

/* Header */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:0 16px;height:var(--header-h);display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(26,115,232,0.25);z-index:100;}
.header-back{background:rgba(255,255,255,0.18);border:none;color:white;height:34px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 12px;gap:4px;}
.header-title{font-size:17px;font-weight:800;flex:1;}
.header-add-btn{background:rgba(255,255,255,0.18);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.header-add-btn:active{background:rgba(255,255,255,0.35);}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 90px;}

/* 月曆條 */
.calendar-bar{background:white;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;transition:max-height 0.35s ease;}
.calendar-bar.collapsed{max-height:44px;}
.calendar-bar:not(.collapsed){max-height:420px;}
.calendar-toggle{display:flex;align-items:center;padding:10px 16px;cursor:pointer;gap:8px;user-select:none;}
.cal-month-nav{display:flex;align-items:center;gap:8px;flex:1;}
.cal-nav-btn{background:none;border:none;color:var(--primary);font-size:18px;cursor:pointer;padding:0 4px;font-weight:700;}
.cal-month-label{font-size:13px;font-weight:800;}
.cal-toggle-icon{font-size:11px;color:var(--text-muted);transition:transform 0.25s;}
.calendar-bar:not(.collapsed) .cal-toggle-icon{transform:rotate(180deg);}
.cal-label-text{font-size:11px;font-weight:700;color:var(--text-muted);}
.calendar-grid{padding:4px 12px 10px;}
.cal-week-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-wday{text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;position:relative;color:var(--text);}
.cal-day:hover{background:#f1f3f4;}
.cal-day.today{background:var(--primary);color:white;font-weight:800;}
.cal-day.selected{background:#e8f0fe;color:var(--primary);font-weight:800;}
.cal-day.today.selected{background:var(--primary);color:white;}
.cal-day.other-month{color:var(--text-muted);opacity:0.35;}
.cal-dots{display:flex;gap:2px;position:absolute;bottom:1px;}
.cal-dot{width:4px;height:4px;border-radius:50%;}
.cal-dot.task{background:var(--primary);}
.cal-dot.announce{background:var(--orange);}
.cal-dot.recurring{background:var(--purple);}

/* Section */
.sec-header{display:flex;align-items:center;padding:14px 16px 6px;gap:8px;}
.sec-title{font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:0.6px;text-transform:uppercase;flex:1;}
.sec-count{font-size:11px;font-weight:700;background:#f1f3f4;color:var(--text-muted);padding:2px 8px;border-radius:10px;}

/* Todo Card */
.todo-card{background:white;border-radius:14px;margin:0 12px 8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;overflow:hidden;position:relative;}
.todo-card:active{transform:scale(0.98);}
.todo-card.is-done{opacity:0.5;}
.todo-card.drag-over{border-top:2px solid var(--primary);}
.todo-card.dragging{opacity:0.4;background:#e8f0fe;}

/* 左色條 */
.stripe{width:5px;flex-shrink:0;}
.stripe.task{background:var(--primary);}
.stripe.announce{background:var(--orange);}
.stripe.rec-task{background:var(--purple);}
.stripe.rec-announce{background:#c0392b;}

/* 勾選 */
.chk-wrap{width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.2s;}
.chk.done{background:var(--accent);border-color:var(--accent);color:white;}
.chk.no-chk{background:#f8fafc;cursor:default;color:var(--text-muted);font-size:10px;}
.chk-wrap:hover .chk:not(.no-chk){border-color:var(--accent);}

/* 內容 */
.todo-body{flex:1;padding:12px 8px 12px 4px;min-width:0;}
.todo-title{font-size:14px;font-weight:700;line-height:1.4;}
.todo-title.done-txt{text-decoration:line-through;color:var(--text-muted);}
.todo-note{font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.5;}
.todo-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;}
.tag.dl{background:#fff3cd;color:#856404;border:1px solid #ffc107;}
.tag.dl-soon{background:#fce8e6;color:var(--danger);border:1px solid var(--danger);animation:pulse 1.5s infinite;}
.tag.scope{background:#e8f0fe;color:var(--primary);}
.tag.rec{background:#ede7f6;color:var(--purple);}
.tag.priv{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.55;}}
.todo-persons{font-size:10px;color:var(--text-muted);margin-top:2px;}

/* 拖曳控點 */
.drag-handle{width:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:14px;cursor:grab;touch-action:none;}
.drag-handle:active{cursor:grabbing;}

/* 折疊 */
.collapse-hdr{display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px 16px;user-select:none;}
.collapse-arrow{font-size:11px;transition:transform 0.2s;color:var(--text-muted);}
.collapse-arrow.open{transform:rotate(90deg);}

.empty-block{text-align:center;padding:24px 20px;color:var(--text-muted);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.active{opacity:1;pointer-events:all;}
.modal-box{background:white;border-radius:24px 24px 0 0;width:100%;max-width:520px;padding-bottom:env(safe-area-inset-bottom,0);max-height:92vh;overflow-y:auto;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:12px auto 0;}
.modal-hdr{display:flex;align-items:center;padding:14px 20px 0;gap:10px;}
.modal-title{font-size:17px;font-weight:900;flex:1;}
.modal-close{background:#f1f3f4;border:none;width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:16px 20px 24px;}
.form-field{margin-bottom:14px;}
.form-field label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:5px;letter-spacing:0.3px;}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;outline:none;background:#f8fafc;font-family:inherit;color:var(--text);}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--primary);background:white;}
.form-field textarea{resize:none;height:68px;}

/* Pill row */
.pill-row{display:flex;gap:8px;margin-top:6px;}
.pill{flex:1;padding:9px 4px;border:1.5px solid var(--border);border-radius:10px;background:white;font-size:13px;font-weight:700;cursor:pointer;text-align:center;color:var(--text-muted);transition:all 0.15s;}
.pill.on{border-color:var(--primary);background:#e8f0fe;color:var(--primary);}
.pill.on.orange{border-color:var(--orange);background:#fff3e0;color:var(--orange);}
.pill.on.purple{border-color:var(--purple);background:#f3e8ff;color:var(--purple);}

/* 私密提示 */
.private-hint{display:none;align-items:center;gap:6px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;margin-top:8px;font-size:12px;color:#166534;font-weight:600;}
.private-hint.show{display:flex;}

/* Target preview */
.target-preview{background:#f0f4ff;border-radius:8px;padding:8px 12px;margin-top:8px;display:none;}
.target-preview.show{display:block;}
.tp-label{font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;}
.tp-names{font-size:12px;color:var(--text);line-height:1.7;}

/* Chips */
.target-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.target-chip{padding:7px 12px;border-radius:9px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:700;cursor:pointer;color:var(--text-muted);transition:all 0.15s;}
.target-chip.on{border-color:var(--primary);background:#e8f0fe;color:var(--primary);}
.person-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.person-chip{padding:5px 10px;border-radius:8px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.person-chip.on{border-color:var(--purple);background:#f3e8ff;color:var(--purple);}

/* Recurring sub */
.rec-sub{background:#f8fafc;border-radius:10px;padding:12px;margin-top:8px;display:none;}
.rec-sub.show{display:block;}

/* Modal actions */
.modal-action{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px;}
.modal-cancel{width:100%;padding:10px;background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;margin-top:6px;}

/* Detail */
.det-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;margin-bottom:10px;}
.det-badge.task{background:#e8f0fe;color:var(--primary);}
.det-badge.announce{background:#fff3e0;color:var(--orange);}
.det-badge.rec-task{background:#ede7f6;color:var(--purple);}
.det-badge.rec-announce{background:#fce8e6;color:var(--danger);}
.det-actions{display:flex;gap:8px;margin-top:14px;}
.det-btn{flex:1;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
.det-btn.edit{background:#e8f0fe;color:var(--primary);}
.det-btn.del{background:#fce8e6;color:var(--danger);}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><div id="loadingText">載入中...</div></div>

<div id="appShell">
  <div class="header">
    <button class="header-back" onclick="handleBack()">← 首頁</button>
    <div class="header-title">🗒️ 代辦事項</div>
    <button class="header-add-btn" id="headerAddBtn" onclick="openAddModal()" style="display:none;">＋</button>
  </div>

  <!-- 月曆條 -->
  <div class="calendar-bar collapsed" id="calBar">
    <div class="calendar-toggle" onclick="toggleCal()">
      <div class="cal-month-nav">
        <button class="cal-nav-btn" onclick="event.stopPropagation();changeCalMonth(-1)">‹</button>
        <div class="cal-month-label" id="calLabel">--</div>
        <button class="cal-nav-btn" onclick="event.stopPropagation();changeCalMonth(1)">›</button>
      </div>
      <span class="cal-label-text">行事曆</span>
      <span class="cal-toggle-icon">▼</span>
    </div>
    <div class="calendar-grid">
      <div class="cal-week-hdr" id="calHdr"></div>
      <div class="cal-days" id="calDays"></div>
    </div>
  </div>

  <div class="content" id="mainContent"></div>
</div>

<!-- 新增/編輯 Modal -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeModal('addModal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div class="modal-title" id="addTitle">新增代辦</div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label>類型</label>
        <div class="pill-row">
          <button class="pill on" id="pillTask" onclick="setType('task')">☐ 代辦</button>
          <button class="pill" id="pillAnn"  onclick="setType('announcement')">📢 公告</button>
        </div>
      </div>
      <div class="form-field">
        <label>週期</label>
        <div class="pill-row">
          <button class="pill on" id="pillOnce" onclick="setRec(false)">📌 單次</button>
          <button class="pill purple" id="pillRec" onclick="setRec(true)">🔄 週期</button>
        </div>
      </div>
      <div class="form-field">
        <label>標題 *</label>
        <input type="text" id="fTitle" placeholder="代辦事項標題" autocomplete="off">
      </div>
      <div class="form-field">
        <label>備註說明</label>
        <textarea id="fNote" placeholder="詳細說明（選填）"></textarea>
      </div>
      <div class="form-field">
        <label>開始顯示日</label>
        <input type="date" id="fStart">
      </div>
      <div class="form-field" id="fEndGroup" style="display:none;">
        <label>截止日 <span style="font-size:10px;color:var(--text-muted);">（公告到期自動消失）</span></label>
        <input type="date" id="fEnd">
      </div>

      <!-- 週期子表單 -->
      <div class="rec-sub" id="recSub">
        <div class="form-field" style="margin-bottom:10px;">
          <label>週期類型</label>
          <select id="fRecType" onchange="onRecTypeChange()">
            <option value="weekly">每週</option>
            <option value="monthly">每月</option>
            <option value="custom">自訂間隔</option>
          </select>
        </div>
        <div class="form-field" style="margin-bottom:10px;" id="recDayGrp">
          <label id="recDayLbl">星期幾</label>
          <select id="fRecDay">
            <option value="1">週一</option><option value="2">週二</option>
            <option value="3">週三</option><option value="4">週四</option>
            <option value="5">週五</option><option value="6">週六</option>
            <option value="7">週日</option>
          </select>
        </div>
        <div class="form-field" style="margin-bottom:10px;display:none;" id="recIntGrp">
          <label>每隔幾天</label>
          <input type="number" id="fRecInt" min="1" value="7">
        </div>
        <div class="form-field" style="margin-bottom:0;">
          <label>週期結束日（選填）</label>
          <input type="date" id="fRecEnd">
        </div>
      </div>

      <!-- 指派對象 -->
      <div id="targetGrp" style="display:none;">
        <div class="form-field">
          <label>指派對象</label>
          <div class="target-chips" id="tgtChips"></div>
          <!-- ✅ 只有我 的私密提示 -->
          <div class="private-hint" id="privateHint">
            🔒 只有您自己看得到，其他人（包含店長）無法查看此代辦
          </div>
        </div>
        <div class="form-field" id="storeGrp" style="display:none;">
          <label>選擇門市</label>
          <div class="target-chips" id="storeChips"></div>
        </div>
        <div class="form-field" id="personGrp" style="display:none;">
          <label>選擇人員</label>
          <div class="person-list" id="personChips"></div>
        </div>
        <div class="target-preview" id="tgtPreview">
          <div class="tp-label">👥 將通知以下人員</div>
          <div class="tp-names" id="tgtPreviewNames"></div>
        </div>
      </div>

      <!-- 員工私密提示（非店長） -->
      <div class="private-hint" id="empPrivateHint">
        🔒 此代辦只有您自己看得到
      </div>

      <button class="modal-action" id="addBtn" onclick="saveTodo()">確認新增</button>
      <button class="modal-cancel" onclick="closeModal('addModal')">取消</button>
    </div>
  </div>
</div>

<!-- 詳細 Modal -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal('detailModal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div class="modal-title" id="detTitle" style="font-size:16px;"></div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="detContent"></div>
      <div class="det-actions" id="detActions"></div>
      <button class="modal-cancel" onclick="closeModal('detailModal')">關閉</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser=null, appConfig={stores:[],shifts:[]};
let allTodos=[], myChecks={}, displayNameMap={}, empListCache={};
let editingId=null, curType='task', curRec=false;
let selTarget='self', selStores=[], selPersons=[];
let doneCollapsed=true, selCalDate=null;
let calY=new Date().getFullYear(), calM=new Date().getMonth();
let todoOrder=[], dragSrcId=null, touchDragId=null;

const isAdmin  =()=>['owner','admin'].includes(currentUser?.permission);
const isManager=()=>['manager','owner','admin'].includes(currentUser?.permission);
const myStore  =()=>currentUser?.store||'';
const myName   =()=>currentUser?.empName||'';
const myDisplay=()=>displayNameMap[myName()]||myName();

function showLoading(m){document.getElementById('loadingText').textContent=m||'載入中...';const o=document.getElementById('loadingOverlay');o.classList.remove('hidden');o.style.display='flex';}
function hideLoading(){document.getElementById('loadingOverlay').classList.add('hidden');setTimeout(()=>{document.getElementById('loadingOverlay').style.display='none';},400);}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function openModal(id){document.getElementById(id).classList.add('active');}
function closeModal(id){document.getElementById(id).classList.remove('active');}
function getDN(n){return displayNameMap[n]||n;}
function handleBack(){if(window.history.length>1)window.history.back();else window.location.href='home.html';}
function toDay(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dateLbl(s){if(!s)return '';const[,m,d]=s.split('-');return `${parseInt(m)}/${parseInt(d)}`;}
function daysUntil(s){if(!s)return null;const t=new Date(s);t.setHours(23,59,59);return Math.ceil((t-new Date())/86400000);}

// 週期下次觸發
function calcNext(todo,from){
  const base=from?new Date(from):new Date();base.setHours(0,0,0,0);
  const start=todo.startDate?new Date(todo.startDate):base;
  const end=todo.recurringEnd?new Date(todo.recurringEnd):null;
  if(end&&base>end)return null;
  if(todo.recurringType==='weekly'){
    const tgt=parseInt(todo.recurringDay||1);
    const dow=base.getDay()===0?7:base.getDay();
    let diff=tgt-dow; if(diff<0)diff+=7;
    const next=new Date(base);next.setDate(base.getDate()+diff);
    if(next<start)next.setDate(next.getDate()+7);
    return(end&&next>end)?null:next;
  }
  if(todo.recurringType==='monthly'){
    const td=parseInt(todo.recurringDay||1);
    const next=new Date(base.getFullYear(),base.getMonth(),td);
    if(next<base)next.setMonth(next.getMonth()+1);
    if(next<start)next.setMonth(next.getMonth()+1);
    return(end&&next>end)?null:next;
  }
  if(todo.recurringType==='custom'){
    const iv=parseInt(todo.recurringInterval||7);
    let cur=new Date(start);while(cur<base)cur.setDate(cur.getDate()+iv);
    return(end&&cur>end)?null:cur;
  }
  return null;
}
function nextStr(todo){
  const d=calcNext(todo);
  return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`:null;
}
function recChkKey(id){const n=nextStr(allTodos.find(t=>t.id===id)||{});return n?`${id}__${n}`:id;}
function recLbl(t){
  if(t.recurringType==='weekly'){const d=['','週一','週二','週三','週四','週五','週六','週日'];return `每週${d[t.recurringDay]||''}`;}
  if(t.recurringType==='monthly')return `每月${t.recurringDay}號`;
  if(t.recurringType==='custom')return `每${t.recurringInterval}天`;
  return '週期';
}

// 可見判斷
function visible(todo){
  const td=toDay();
  if(todo.startDate&&td<todo.startDate)return false;
  if(todo.deleted)return false;
  // 截止日判斷（非週期公告）
  if(!todo.isRecurring&&todo.type==='announcement'&&todo.endDate&&td>todo.endDate)return false;
  // 週期型：先判斷是否有下一次，再判斷 targetType
  if(todo.isRecurring&&calcNext(todo)===null)return false;

  // ✅ targetType 判斷（週期型也要走這裡）
  const tt=todo.targetType;
  if(tt==='self')return todo.createdBy===myName();
  if(tt==='all')return true;
  if(tt==='store')return todo.targetStore===myStore()||(todo.targetStores||[]).includes(myStore());
  if(tt==='stores_manager'){if(!isManager())return false;const s=todo.targetStores||[];return s.length===0||s.includes(myStore())||todo.targetStore===myStore();}
  if(tt==='specific')return(todo.targetEmps||[]).includes(myName());
  return false;
}
function canManage(todo){
  if(todo.targetType==='self'&&todo.createdBy!==myName())return false;
  if(todo.createdBy===myName())return true;
  if(isAdmin())return true;
  if(isManager()){const s=todo.targetStores||[];return todo.targetStore===myStore()||s.includes(myStore());}
  return false;
}

async function loadTodos(){
  showLoading('載入代辦事項...');
  try{
    const[snap,chkSnap,ordSnap]=await Promise.all([
      window.db.collection('todos').where('deleted','==',false).get(),
      window.db.collection('todoChecks').where('empName','==',myName()).get(),
      window.db.collection('todoOrders').doc(myName()).get().catch(()=>null)
    ]);
    allTodos=[];
    snap.forEach(d=>allTodos.push({id:d.id,...d.data()}));
    allTodos.sort((a,b)=>(b.createdAt?.toDate?.()?.getTime()??0)-(a.createdAt?.toDate?.()?.getTime()??0));
    myChecks={};
    chkSnap.forEach(d=>{const dt=d.data();if(dt.checked)myChecks[dt.checkKey||dt.todoId]=true;});
    todoOrder=(ordSnap&&ordSnap.exists)?(ordSnap.data().order||[]):[];
    renderAll();
  }catch(e){showToast('讀取失敗：'+e.message);}
  hideLoading();
}

function renderAll(){
  const el=document.getElementById('mainContent');
  let vis=allTodos.filter(t=>visible(t)&&!t.deleted);
  if(selCalDate){
    vis=vis.filter(t=>{
      if(t.isRecurring)return nextStr(t)===selCalDate;
      if(t.startDate&&t.startDate>selCalDate)return false;
      if(t.endDate&&t.endDate<selCalDate)return false;
      return true;
    });
  }
  const ann=vis.filter(t=>t.type==='announcement'&&!t.isRecurring);
  const tasks=vis.filter(t=>!(t.type==='announcement'&&!t.isRecurring));
  const pending=tasks.filter(t=>!myChecks[t.isRecurring?recChkKey(t.id):t.id]);
  const done=tasks.filter(t=>!!myChecks[t.isRecurring?recChkKey(t.id):t.id]);

  ann.sort((a,b)=>{if(!a.endDate&&!b.endDate)return 0;if(!a.endDate)return 1;if(!b.endDate)return -1;return a.endDate.localeCompare(b.endDate);});
  pending.sort((a,b)=>{const ia=todoOrder.indexOf(a.id),ib=todoOrder.indexOf(b.id);if(ia===-1&&ib===-1)return 0;if(ia===-1)return 1;if(ib===-1)return -1;return ia-ib;});

  let html='';
  if(ann.length){
    html+=`<div class="sec-header"><div class="sec-title">📢 公告事項</div><div class="sec-count">${ann.length}</div></div>`;
    html+=ann.map(t=>card(t)).join('');
  }
  html+=`<div class="sec-header"><div class="sec-title">☐ 待辦清單</div><div class="sec-count">${pending.length}</div></div>`;
  if(pending.length){
    html+=`<div id="taskList">${pending.map(t=>card(t)).join('')}</div>`;
  }else{
    html+=`<div class="empty-block"><div style="font-size:32px;margin-bottom:8px;">✅</div><div>沒有待辦事項</div></div>`;
  }
  if(done.length){
    html+=`<div class="collapse-hdr" onclick="toggleDone()">
      <span class="collapse-arrow ${doneCollapsed?'':'open'}" id="doneArrow">›</span>
      <span class="sec-title">✓ 已完成</span>
      <span class="sec-count">${done.length}</span>
    </div>
    <div id="doneList" style="display:${doneCollapsed?'none':'block'};">${done.map(t=>card(t,true)).join('')}</div>`;
  }
  el.innerHTML=html;
  bindDrag();
  renderCal();
}

function toggleDone(){
  doneCollapsed=!doneCollapsed;
  const l=document.getElementById('doneList'),a=document.getElementById('doneArrow');
  if(l)l.style.display=doneCollapsed?'none':'block';
  if(a)a.classList.toggle('open',!doneCollapsed);
}

function card(todo,isDone=false){
  const isAnn=todo.type==='announcement'&&!todo.isRecurring;
  const isRec=todo.isRecurring;
  const ck=isRec?recChkKey(todo.id):todo.id;
  const chked=!!myChecks[ck];
  let sc='task'; if(isAnn)sc='announce'; else if(isRec)sc=(todo.type==='announcement'?'rec-announce':'rec-task');
  const chkHtml=isAnn
    ?`<div class="chk-wrap"><div class="chk no-chk">📢</div></div>`
    :`<div class="chk-wrap" onclick="event.stopPropagation();doCheck('${todo.id}',${isRec})"><div class="chk ${chked?'done':''}">${chked?'✓':''}</div></div>`;

  let dlTag='';
  if(todo.endDate){const d=daysUntil(todo.endDate);const lbl=d===null?'':d<0?'已截止':d===0?'今天截止':`${d}天後截止`;dlTag=`<span class="tag ${d!==null&&d<=2?'dl-soon':'dl'}">📅 ${dateLbl(todo.endDate)} ${lbl}</span>`;}
  let recTag=isRec?`<span class="tag rec">🔄 ${recLbl(todo)}${calcNext(todo)?` · 下次${calcNext(todo).getMonth()+1}/${calcNext(todo).getDate()}`:''}</span>`:'';
  let scopeTag=''; const tt=todo.targetType;
  if(tt==='all')scopeTag=`<span class="tag scope">全體</span>`;
  else if(tt==='store')scopeTag=`<span class="tag scope">${todo.targetStore||'指定門市'}</span>`;
  else if(tt==='stores_manager')scopeTag=`<span class="tag scope">店長群</span>`;
  else if(tt==='specific')scopeTag=`<span class="tag scope">指定人員</span>`;
  const privTag=todo.targetType==='self'?`<span class="tag priv">🔒 僅自己可見</span>`:'';
  const emps=todo.targetEmps||[];
  const personsHtml=emps.length?`<div class="todo-persons">👤 ${emps.map(n=>getDN(n)).join('、')}</div>`:'';
  const dragHtml=!isAnn&&!isDone?`<div class="drag-handle" data-id="${todo.id}" ontouchstart="tStart(event,'${todo.id}')" ontouchmove="tMove(event)" ontouchend="tEnd(event)">⠿</div>`:'';

  return `<div class="todo-card ${isDone?'is-done':''}" id="card-${todo.id}" data-id="${todo.id}" onclick="openDet('${todo.id}')">
    <div class="stripe ${sc}"></div>
    ${chkHtml}
    <div class="todo-body">
      <div class="todo-title ${isDone?'done-txt':''}">${todo.title}</div>
      ${todo.note?`<div class="todo-note">${todo.note}</div>`:''}
      <div class="todo-foot">${dlTag}${recTag}${scopeTag}${privTag}</div>
      ${personsHtml}
    </div>
    ${dragHtml}
  </div>`;
}

// 勾選
async function doCheck(id,isRec=false){
  const ck=isRec?recChkKey(id):id;
  const nv=!myChecks[ck]; myChecks[ck]=nv; renderAll();
  try{
    const docId=`${ck}__${myName()}`;
    await window.db.collection('todoChecks').doc(docId).set({todoId:id,checkKey:ck,empName:myName(),checked:nv,checkedAt:toDay()});
  }catch(e){showToast('儲存失敗');}
}

// 拖曳（桌面）
function bindDrag(){
  document.querySelectorAll('.drag-handle[data-id]').forEach(h=>{
    const c=h.closest('.todo-card');
    h.draggable=true;
    h.addEventListener('dragstart',e=>{dragSrcId=c.dataset.id;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    h.addEventListener('dragend',()=>{c.classList.remove('dragging');document.querySelectorAll('.todo-card').forEach(x=>x.classList.remove('drag-over'));saveTodoOrder();});
  });
  document.querySelectorAll('.todo-card[id^="card-"]').forEach(c=>{
    c.addEventListener('dragover',e=>{e.preventDefault();if(c.dataset.id===dragSrcId)return;document.querySelectorAll('.todo-card').forEach(x=>x.classList.remove('drag-over'));c.classList.add('drag-over');});
    c.addEventListener('drop',e=>{e.preventDefault();if(!dragSrcId||c.dataset.id===dragSrcId)return;reorder(dragSrcId,c.dataset.id);});
  });
}
function reorder(src,tgt){
  if(!todoOrder.includes(src))todoOrder.push(src);
  if(!todoOrder.includes(tgt))todoOrder.push(tgt);
  const si=todoOrder.indexOf(src);todoOrder.splice(si,1);
  const ti=todoOrder.indexOf(tgt);todoOrder.splice(ti,0,src);
  renderAll();
}
async function saveTodoOrder(){
  try{await window.db.collection('todoOrders').doc(myName()).set({order:todoOrder,updatedAt:toDay()});}catch(e){}
}

// 拖曳（手機）
function tStart(e,id){touchDragId=id;e.stopPropagation();}
function tMove(e){
  if(!touchDragId)return;e.preventDefault();
  const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);
  const c=el?.closest('.todo-card');
  document.querySelectorAll('.todo-card').forEach(x=>x.classList.remove('drag-over'));
  if(c&&c.dataset.id!==touchDragId)c.classList.add('drag-over');
}
function tEnd(){
  if(!touchDragId)return;
  const ov=document.querySelector('.todo-card.drag-over');
  if(ov)reorder(touchDragId,ov.dataset.id);
  document.querySelectorAll('.todo-card').forEach(x=>x.classList.remove('drag-over'));
  touchDragId=null;saveTodoOrder();
}

// 詳細 Modal

  else if(isRec){bc='rec-task';bt='🔄 週期代辦';}
  const nxt=isRec?calcNext(todo):null;

  const dl=todo.endDate?daysUntil(todo.endDate):null;
  document.getElementById('detContent').innerHTML=`
    <div class="det-badge ${bc}">${bt}</div>
    ${todo.note?`<div style="background:#f8fafc;border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.7;margin-bottom:10px;">${todo.note}</div>`:''}
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">

      ${todo.startDate?`<span class="tag scope">顯示從 ${dateLbl(todo.startDate)}</span>`:''}
      ${isRec?`<span class="tag rec">${recLbl(todo)}</span>`:''}
      ${isRec&&nxt?`<span class="tag dl">下次：${nxt.getMonth()+1}/${nxt.getDate()}</span>`:''}
      ${todo.targetType==='self'?`<span class="tag priv">🔒 僅自己可見</span>`:''}
    </div>
    ${(todo.targetEmps||[]).length?`<div class="todo-persons" style="margin-bottom:8px;">👤 ${todo.targetEmps.map(n=>getDN(n)).join('、')}</div>`:''}
    <div style="font-size:11px;color:var(--text-muted);">由 ${todo.createdByDisplay||getDN(todo.createdBy)} ${todo.createdByStore?`（${todo.createdByStore}）`:''} 建立</div>`;

async function updateTgtPreview(){

  if(!prev||!names)return;
  if(selTarget==='self'){prev.classList.remove('show');return;}
  if(selTarget==='all'){prev.classList.add('show');names.textContent='全體員工';return;}
  if(selTarget==='stores_manager'){
    // ✅ 從 account 讀取實際店長名字
    const stores=selStores.length>0?selStores:(appConfig.stores||[]);
    try{
      const accSnap=await window.db.collection('account').where('permission','==','manager').get();
      const mgrs=[];
      accSnap.forEach(d=>{
        const a=d.data();
        if(stores.includes(a.store)){mgrs.push(getDN(a.empName)||a.displayName||a.empName||'');}
      });
      if(mgrs.length>0){prev.classList.add('show');names.textContent=mgrs.join('、');return;}
    }catch(e){}
    prev.classList.add('show');names.textContent='各門市店長';return;
  }
  const stores=selTarget==='store'?(selStores.length>0?selStores:[myStore()]):[myStore()];
  let ns=[];
  if(selTarget==='specific'){ns=selPersons.map(n=>getDN(n));}
  else{for(const s of stores){if(!empListCache[s]){const snap=await window.db.collection('stores').doc(s).collection('employees').get().catch(()=>null);empListCache[s]=[];if(snap)snap.forEach(d=>{if(!['離職','調走'].includes(d.data().status))empListCache[s].push(d.id);});}empListCache[s].forEach(n=>ns.push(getDN(n)));}}
  if(!ns.length){prev.classList.remove('show');return;}
  prev.classList.add('show');names.textContent=ns.join('、');
}

// 儲存
async function saveTodo(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){showToast('⚠️ 請輸入標題');return;}
  const recDayEl=document.getElementById('fRecDay');
  let tStore='',tStores=[],tEmps=[];
  if(['store','stores_manager'].includes(selTarget)){
    if(isAdmin()||selTarget==='stores_manager'){tStores=selStores.length>0?[...selStores]:[...(appConfig.stores||[])];}
    else tStore=myStore();
  }
  if(selTarget==='specific')tEmps=[...selPersons];
  const data={
    type:curType,isRecurring:curRec,title,
    note:document.getElementById('fNote').value.trim(),
    startDate:document.getElementById('fStart').value||toDay(),
    endDate:curType==='announcement'?(document.getElementById('fEnd').value||''):'',
    targetType:isManager()?selTarget:'self',
    targetStore:tStore,targetStores:tStores,targetEmps:tEmps,
    createdBy:myName(),createdByDisplay:myDisplay(),createdByStore:myStore(),
    deleted:false,
  };
  if(curRec){
    data.recurringType=document.getElementById('fRecType').value;
    data.recurringDay=recDayEl?recDayEl.value:'1';
    data.recurringInterval=parseInt(document.getElementById('fRecInt').value)||7;
    data.recurringEnd=document.getElementById('fRecEnd').value||'';
  }
  showLoading('儲存中...');
  try{
    if(editingId){
      await window.db.collection('todos').doc(editingId).update({...data,updatedAt:new Date().toISOString()});
      const i=allTodos.findIndex(t=>t.id===editingId);if(i>=0)allTodos[i]={...allTodos[i],...data};
      showToast('✅ 已更新');
    }else{
      data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
      const ref=await window.db.collection('todos').add(data);
      allTodos.unshift({id:ref.id,...data});showToast('✅ 已新增');
    }
    closeModal('addModal');renderAll();
  }catch(e){showToast('❌ 儲存失敗：'+e.message);}
  hideLoading();
}

// 月曆
function toggleCal(){document.getElementById('calBar').classList.toggle('collapsed');}
function changeCalMonth(o){calM+=o;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}

let longPressTimer=null;
function calDayLongPress(ds){
  longPressTimer=setTimeout(()=>{
    longPressTimer=null;
    // 長按某天 → 開啟新增 Modal 並帶入日期
    openAddModal();
    document.getElementById('fStart').value=ds;
    showToast(`📅 已選擇 ${dateLbl(ds)}，填入開始日期`);
  },500);
}
function calDayLongPressCancel(){if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}}

function renderCal(){
  document.getElementById('calLabel').textContent=`${calY}年${calM+1}月`;
  const hdr=document.getElementById('calHdr'),days=document.getElementById('calDays');
  if(!hdr||!days)return;
  hdr.innerHTML=['一','二','三','四','五','六','日'].map(d=>`<div class="cal-wday">${d}</div>`).join('');
  const today=toDay();
  const events={};
  allTodos.filter(t=>visible(t)).forEach(t=>{
    const add=(ds,type)=>{if(!events[ds])events[ds]=new Set();events[ds].add(type);};
    if(t.isRecurring){
      // 掃描本月所有週，找出所有觸發日
      const firstDay=new Date(calY,calM,1);
      const lastDay=new Date(calY,calM+1,0);
      if(t.recurringType==='weekly'||t.recurringType==='monthly'){
        // 只掃一次本月的觸發
        let cur=new Date(firstDay);
        while(cur<=lastDay){
          const n=calcNext(t,cur);
          if(!n||n>lastDay)break;
          const ds=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
          add(ds,t.type==='announcement'?'announce':'recurring');
          cur=new Date(n);cur.setDate(cur.getDate()+1);
          if(t.recurringType==='monthly')break; // 每月只有一次
        }
      } else if(t.recurringType==='custom'){
        const iv=parseInt(t.recurringInterval||7);
        const start=t.startDate?new Date(t.startDate):firstDay;
        let cur=new Date(start);
        while(cur<firstDay)cur.setDate(cur.getDate()+iv);
        while(cur<=lastDay){
          const ds=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
          add(ds,t.type==='announcement'?'announce':'recurring');
          cur.setDate(cur.getDate()+iv);
        }
      }
    } else {
      const mo=`${calY}-${String(calM+1).padStart(2,'0')}`;
      if(t.type==='announcement'&&t.endDate&&t.endDate.startsWith(mo))add(t.endDate,'announce');
      if(t.startDate&&t.startDate.startsWith(mo))add(t.startDate,t.type==='announcement'?'announce':'task');
    }
  });
  const firstDow=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const prev=new Date(calY,calM,0).getDate();
  const off=(firstDow+6)%7; // 週一為第一天
  let html='';
  for(let i=off-1;i>=0;i--)html+=`<div class="cal-day other-month">${prev-i}</div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===today,isSel=ds===selCalDate;
    const ev=events[ds]?[...events[ds]]:[];
    const dots=ev.map(t=>`<div class="cal-dot ${t}"></div>`).join('');
    // 長按新增代辦
    html+=`<div class="cal-day${isT?' today':''}${isSel?' selected':''}"
      onclick="selDate('${ds}')"
      onmousedown="calDayLongPress('${ds}')" onmouseup="calDayLongPressCancel()" onmouseleave="calDayLongPressCancel()"
      ontouchstart="calDayLongPress('${ds}')" ontouchend="calDayLongPressCancel()" ontouchmove="calDayLongPressCancel()">
      ${d}${ev.length?`<div class="cal-dots">${dots}</div>`:''}
    </div>`;
  }
  // ✅ 補滿最後一週，確保 6 行全部顯示（避免最後一週被切掉）
  const totalCells=off+dim;
  const rem=totalCells%7===0?0:7-(totalCells%7);
  for(let d=1;d<=rem;d++)html+=`<div class="cal-day other-month">${d}</div>`;
  days.innerHTML=html;
}
function selDate(ds){
  if(longPressTimer)return; // 長按中不觸發選擇
  selCalDate=(selCalDate===ds)?null:ds;
  if(selCalDate&&document.getElementById('calBar').classList.contains('collapsed'))document.getElementById('calBar').classList.remove('collapsed');
  renderAll();
}
